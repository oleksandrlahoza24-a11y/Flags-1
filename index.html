<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- iPad Standalone Mode Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Screen">
    
    <title>Cozy Floating Shapes</title>
    <style>
        :root {
            /* Warm, cozy palette: Cream, Peach, Soft Terracotta, Dust */
            --bg-color: #fdf6ec;
            --shape-1: rgba(232, 202, 166, 0.5);
            --shape-2: rgba(211, 154, 106, 0.4);
            --shape-3: rgba(164, 96, 61, 0.3);
            --dust-color: rgba(74, 43, 34, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container for the blobs */
        .stage {
            position: absolute;
            width: 100%;
            height: 100%;
            filter: blur(40px); /* Creates the soft, organic "melting" look */
            z-index: 1;
        }

        /* Large morphing blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--shape-1);
            animation: float 25s infinite ease-in-out alternate, morph 15s infinite ease-in-out alternate;
        }

        .blob:nth-child(2) {
            background: var(--shape-2);
            width: 400px;
            height: 400px;
            left: 10%;
            top: 20%;
            animation-duration: 35s, 20s;
        }

        .blob:nth-child(3) {
            background: var(--shape-3);
            width: 350px;
            height: 350px;
            right: 15%;
            bottom: 10%;
            animation-duration: 45s, 25s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(100px, 50px) rotate(90deg); }
            100% { transform: translate(-50px, 150px) rotate(180deg); }
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; }
            33% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
            66% { border-radius: 30% 70% 70% 30% / 50% 50% 30% 30%; }
            100% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; }
        }

        /* Dust particles (Canvas) */
        #dustCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Subtle Instruction Overlay */
        #ui-overlay {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(0,0,0,0.2);
            font-size: 14px;
            z-index: 10;
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="blob" style="width: 500px; height: 500px; left: 30%; top: 40%;"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <canvas id="dustCanvas"></canvas>

    <div id="ui-overlay">Tap once to keep screen awake</div>

    <script>
        const canvas = document.getElementById('dustCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        // Resize canvas to iPad screen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Create "Dust" particles
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.2 - 0.1;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(74, 43, 34, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Prevent Screen Dimming (Screen Wake Lock API)
        let wakeLock = null;
        const requestWakeLock = async () => {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('ui-overlay').style.opacity = '0';
                console.log('Wake Lock active');
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        };

        // Needs a user gesture to start
        window.addEventListener('click', () => {
            requestWakeLock();
        });

        // Re-request if app is minimized and opened again
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
