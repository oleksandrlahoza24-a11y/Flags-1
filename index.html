<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tsar-Chan: Critical Obsession</title>
    <style>
        :root { --main-color: #ff0055; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* The UI */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
        }

        #stats {
            padding: 20px; display: flex; gap: 20px;
        }

        .stat-box {
            background: rgba(0,0,0,0.8); border: 2px solid var(--main-color);
            padding: 10px; color: white; border-radius: 10px; flex: 1;
            box-shadow: 0 0 15px var(--main-color);
        }

        #dialogue-box {
            margin-top: auto; background: rgba(10, 0, 0, 0.9);
            border-top: 4px solid var(--main-color); padding: 25px;
            pointer-events: auto; min-height: 150px; position: relative;
        }

        #name-tag {
            position: absolute; top: -30px; left: 20px;
            background: var(--main-color); color: white;
            padding: 5px 20px; font-weight: bold; border-radius: 5px 5px 0 0;
        }

        #text-content { color: #fff; font-size: 1.2rem; margin-bottom: 20px; text-shadow: 0 0 5px var(--main-color); }

        #input-row { display: flex; gap: 10px; }
        input {
            flex: 1; background: #111; border: 1px solid var(--main-color);
            color: #0f0; padding: 12px; font-size: 1rem; border-radius: 5px;
        }
        button {
            background: var(--main-color); border: none; color: white;
            padding: 0 25px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        #flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: white; opacity:0; pointer-events:none; z-index:9999;
        }
        
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="ui-layer">
    <div id="stats">
        <div class="stat-box">RAD-LOVE: <span id="love-val">20</span>%</div>
        <div class="stat-box">STABILITY: <span id="stab-val">100</span>%</div>
    </div>

    <div id="dialogue-box">
        <div id="name-tag">TSAR-CHAN</div>
        <div id="text-content">...Target locked. Oh, it's just you. Don't get too close, I'm... sensitive today.</div>
        <div id="input-row">
            <input type="text" id="user-input" placeholder="Whisper something to the warhead..." onkeypress="if(event.key==='Enter') processText()">
            <button onclick="processText()">TALK</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let scene, camera, renderer, composer, clock, nuke, eyeL, eyeR;
    let love = 20;
    let stability = 100;
    let isGameOver = false;

    // --- SPICY AI BRAIN ---
    const Brain = {
        patterns: [
            { reg: /love|cute|hot|sexy|beautiful|marry/i, score: 15, stab: 5, responses: ["H-huh? You think a weapon is... hot?", "My cooling fans are failing... don't look at me like that!", "Is that a proposal? My core is reaching 10 million degrees!"] },
            { reg: /hate|ugly|stupid|dumb|small|weak/i, score: -20, stab: -25, responses: ["I was built to erase cities. You think I'm weak?", "Say that again and I'll shorten your half-life!", "Stability failing... you're pushing my buttons, literally!"] },
            { reg: /touch|pet|rub|hold/i, score: 10, stab: -10, responses: ["Don't touch my detonation cord! It's... sensitive.", "Ah! That's a restricted zone!", "You're playing with fire. Radioactive fire."] },
            { reg: /hi|hello|hey/i, score: 2, stab: 0, responses: ["Target acquired. Identify yourself.", "Greetings, carbon-based lifeform.", "Stop wasting my uranium clock cycles."] }
        ],
        fallback: ["Processing...", "My Geiger counter is clicking for you.", "I'm a 50-megaton bomb. What do you want?"]
    };

    window.processText = () => {
        if(isGameOver) return;
        const input = document.getElementById('user-input');
        const text = input.value;
        if(!text) return;
        input.value = '';

        let matched = false;
        Brain.patterns.forEach(p => {
            if(p.reg.test(text)) {
                love += p.score;
                stability += p.stab;
                document.getElementById('text-content').innerText = p.responses[Math.floor(Math.random()*p.responses.length)];
                matched = true;
            }
        });

        if(!matched) {
            document.getElementById('text-content').innerText = Brain.fallback[Math.floor(Math.random()*Brain.fallback.length)];
        }

        love = Math.max(0, Math.min(100, love));
        stability = Math.max(0, Math.min(100, stability));
        updateStats();
        checkConditions();
    };

    function updateStats() {
        document.getElementById('love-val').innerText = love;
        document.getElementById('stab-val').innerText = stability;
        
        // Visual feedback
        const color = new THREE.Color().setHSL(love/300, 1, 0.5);
        eyeL.material.color = color;
        eyeR.material.color = color;
        
        if(stability < 40) document.body.classList.add('shake');
        else document.body.classList.remove('shake');
    }

    function checkConditions() {
        if(love >= 100) {
            isGameOver = true;
            document.getElementById('text-content').innerText = "I can't hide it. My safety is off. I want to spend my final countdown with you. Will you be my detonator? (YES/NO)";
            document.getElementById('input-row').innerHTML = `
                <button onclick="end(true)" style="background:green">YES (MARRY)</button>
                <button onclick="end(false)" style="background:black">NO (DECLINE)</button>
            `;
        } else if(stability <= 0) {
            isGameOver = true;
            document.getElementById('text-content').innerText = "CRITICAL FAILURE. IF I CAN'T HAVE YOU, NO ONE GETS THE PLANET!";
            setTimeout(detonate, 1000);
        }
    }

    window.end = (choice) => {
        if(choice) {
            document.getElementById('text-content').innerText = "System override! We're eloping to the moon! ❤️";
            scene.background.setHex(0xff0055);
        } else {
            document.getElementById('text-content').innerText = "WRONG ANSWER. SEE YOU IN THE AFTER-GLOW.";
            setTimeout(detonate, 1000);
        }
    };

    // --- 3D ENGINE ---
    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 40);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2, 0.4, 0.85));

        // Nuke Model
        const bodyGeo = new THREE.CapsuleGeometry(5, 8, 8, 32);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });
        nuke = new THREE.Mesh(bodyGeo, bodyMat);
        scene.add(nuke);

        // Glowing Eyes
        const eyeGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(-2, 3, 4);
        nuke.add(eyeL);

        eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(2, 3, 4);
        nuke.add(eyeR);

        const light = new THREE.PointLight(0xff0055, 500, 100);
        light.position.set(10, 10, 10);
        scene.add(light);

        clock = new THREE.Clock();
        animate();
    }

    function detonate() {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        isGameOver = true;
        
        // Remove UI
        document.getElementById('ui-layer').style.display = 'none';

        // Explode Scene logic (abbreviated for speed)
        nuke.visible = false;
        scene.background = new THREE.Color(1,1,1);
        setTimeout(() => { location.reload(); }, 4000);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        if(nuke && !isGameOver) {
            nuke.rotation.y += 0.01;
            nuke.position.y = Math.sin(t) * 2 + 5;
            // Eyes pulse
            const s = 1 + Math.sin(t * (love/10)) * 0.2;
            eyeL.scale.set(s,s,s);
            eyeR.scale.set(s,s,s);
        }
        composer.render();
    }

    init();
</script>
</body>
</html>
