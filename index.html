<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Voxel Farm Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; touch-action: none; }
        
        #game-ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10;
        }

        .stat-box {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6);
            color: white; padding: 10px; border: 3px solid #fff; pointer-events: none;
        }

        #action-log {
            position: absolute; top: 10px; right: 10px; text-align: right;
            color: #ffff00; font-weight: bold; font-size: 14px;
        }

        #inventory-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0,0,0,0.8);
            padding: 10px; border: 3px solid white; pointer-events: auto;
        }

        .slot {
            width: 55px; height: 55px; background: #333; border: 2px solid #777;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-size: 20px;
        }
        .slot-count { font-size: 12px; color: #0f0; }

        .btn {
            pointer-events: auto; background: #2ecc71; border: 3px solid white;
            color: white; padding: 12px; font-weight: bold; cursor: pointer;
        }

        #craft-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; border: 4px solid white; padding: 20px;
            display: none; color: white; pointer-events: auto;
        }

        canvas { display: block; image-rendering: pixelated; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="stat-box">
            LVL: <span id="lvl">1</span> | XP: <span id="xp">0</span>
        </div>
        
        <div id="action-log">WELCOME TO THE FARM</div>

        <div style="position:absolute; top: 10px; right: 10px; pointer-events: auto;">
            <button class="btn" onclick="toggleCraft()">KITCHEN 🍳</button>
        </div>

        <div id="craft-panel">
            <h3>RECIPES</h3>
            <p>Juice: 1x 🍉 <button class="btn" onclick="craft('juice')">MAKE</button></p>
            <p>Salad: 1x 🍉 + 1x ☁️ <button class="btn" onclick="craft('salad')">MAKE</button></p>
            <button class="btn" style="background:#e74c3c" onclick="toggleCraft()">CLOSE</button>
        </div>

        <div id="inventory-bar">
            <div class="slot">🪨<span class="slot-count" id="count-rock">0</span></div>
            <div class="slot">☁️<span class="slot-count" id="count-cotton">0</span></div>
            <div class="slot">🍉<span class="slot-count" id="count-melon">0</span></div>
            <div class="slot" onclick="eat('juice')">🍹<span class="slot-count" id="count-juice">0</span></div>
            <div class="slot" onclick="eat('salad')">🥗<span class="slot-count" id="count-salad">0</span></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- GAME STATE ---
        const inv = { rock: 0, cotton: 0, melon: 0, juice: 0, salad: 0 };
        let xp = 0, lvl = 1;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x40a6e0);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.6); sun.position.set(10, 20, 10); scene.add(sun);

        const clickableObjects = [];

        // --- GROUND & FARM ---
        const ground = new THREE.Mesh(new THREE.BoxGeometry(30, 1, 30), new THREE.MeshLambertMaterial({color: 0x56a04e}));
        ground.position.y = -0.5;
        scene.add(ground);

        const soil = new THREE.Mesh(new THREE.BoxGeometry(8, 1.1, 8), new THREE.MeshLambertMaterial({color: 0x4b342a}));
        soil.position.set(0, -0.5, 3);
        soil.userData = { type: 'soil' };
        scene.add(soil);
        clickableObjects.push(soil);

        // --- SPAWN SYSTEM ---
        function createItem(type, x, z) {
            let geo, mat;
            if(type === 'rock') {
                geo = new THREE.DodecahedronGeometry(0.7, 0);
                mat = new THREE.MeshLambertMaterial({color: 0x888888});
            } else if(type === 'cotton') {
                geo = new THREE.SphereGeometry(0.5, 4, 4);
                mat = new THREE.MeshLambertMaterial({color: 0xffffff});
            } else if(type === 'melon') {
                geo = new THREE.BoxGeometry(0.8, 0.6, 0.9);
                mat = new THREE.MeshLambertMaterial({color: 0x1d8348});
            }

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.5, z);
            mesh.userData = { type: type, health: (type === 'rock' ? 3 : 1) };
            
            scene.add(mesh);
            clickableObjects.push(mesh);
        }

        // Spawn initially
        for(let i=0; i<5; i++){
            createItem('rock', Math.random()*14-7, Math.random()*-6-2);
            createItem('cotton', Math.random()*14-7, Math.random()*-6-2);
        }

        // --- CORE MECHANICS ---
        function log(txt) {
            const el = document.getElementById('action-log');
            el.innerText = txt;
            setTimeout(()=> { if(el.innerText === txt) el.innerText = ""; }, 2000);
        }

        function handleHit(obj, point) {
            // Flash Effect
            const originalColor = obj.material.color.getHex();
            obj.material.color.setHex(0xffffff);
            setTimeout(() => obj.material.color.setHex(originalColor), 100);

            if(obj.userData.type === 'soil') {
                log("PLANTED SEED 🍉");
                const plant = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshLambertMaterial({color: 0x2ecc71}));
                plant.position.set(point.x, 0.1, point.z);
                plant.userData = { type: 'growing', age: 0 };
                scene.add(plant);
                clickableObjects.push(plant);
                return;
            }

            if(obj.userData.type === 'growing') {
                if(obj.userData.age >= 100) {
                    inv.melon++; log("+1 WATERMELON!");
                    removeObj(obj);
                } else {
                    log("STILL GROWING...");
                }
                updateUI();
                return;
            }

            // Normal harvesting
            obj.userData.health--;
            if(obj.userData.health <= 0) {
                inv[obj.userData.type]++;
                log("GATHERED " + obj.userData.type.toUpperCase());
                const t = obj.userData.type;
                removeObj(obj);
                setTimeout(() => createItem(t, Math.random()*14-7, Math.random()*-6-2), 3000);
                addXP(25);
            }
            updateUI();
        }

        function removeObj(obj) {
            scene.remove(obj);
            const idx = clickableObjects.indexOf(obj);
            if(idx > -1) clickableObjects.splice(idx, 1);
        }

        function addXP(amt) {
            xp += amt;
            if(xp >= 100) { xp = 0; lvl++; log("LEVEL UP! 🌟"); }
            updateUI();
        }

        function updateUI() {
            document.getElementById('count-rock').innerText = inv.rock;
            document.getElementById('count-cotton').innerText = inv.cotton;
            document.getElementById('count-melon').innerText = inv.melon;
            document.getElementById('count-juice').innerText = inv.juice;
            document.getElementById('count-salad').innerText = inv.salad;
            document.getElementById('xp').innerText = xp;
            document.getElementById('lvl').innerText = lvl;
        }

        // --- CONTROLS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onTouch(e) {
            // Logic to prevent clicking through UI
            if (e.target.tagName !== "CANVAS") return;

            const t = e.changedTouches ? e.changedTouches[0] : e;
            mouse.x = (t.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(t.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if(intersects.length > 0) {
                handleHit(intersects[0].object, intersects[0].point);
            }
        }

        window.toggleCraft = () => {
            const panel = document.getElementById('craft-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        };

        window.craft = (item) => {
            if(item === 'juice' && inv.melon >= 1) {
                inv.melon--; inv.juice++; log("MIXED JUICE 🍹");
            } else if(item === 'salad' && inv.melon >= 1 && inv.cotton >= 1) {
                inv.melon--; inv.cotton--; inv.salad++; log("MADE SALAD 🥗");
            } else {
                log("NOT ENOUGH ITEMS!");
            }
            updateUI();
        };

        window.eat = (item) => {
            if(inv[item] > 0) {
                inv[item]--;
                log("YUM! Delicious.");
                updateUI();
            }
        };

        window.addEventListener('mousedown', onTouch);
        window.addEventListener('touchstart', onTouch);

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Handle Watermelon Growth
            clickableObjects.forEach(obj => {
                if(obj.userData.type === 'growing' && obj.userData.age < 100) {
                    obj.userData.age += 0.2;
                    const s = 1 + (obj.userData.age / 50);
                    obj.scale.set(s, s, s);
                    if(obj.userData.age >= 100) obj.material.color.set(0x1d8348);
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
