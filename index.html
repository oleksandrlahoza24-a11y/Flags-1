<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woodwork Studio</title>
    <style>
        :root {
            --wood-color: #8b5a2b;
            --bg-color: #2c3e50;
            --ui-panel: rgba(0, 0, 0, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #game-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: #1a1a1a;
            border: 4px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
        }

        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: var(--ui-panel);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #555;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #ddd;
            border-radius: 50%;
            flex-shrink: 0;
            border: 3px solid #ffd700;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
        }

        #dialogue-text {
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .instructor-note {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="instructor-note">Touch the wood to carve your design</div>
    <canvas id="latheCanvas"></canvas>

    <div id="ui-overlay">
        <div class="avatar" id="classmate-avatar">Classmate</div>
        <div id="dialogue-text">"Hey! Looking good so far. That piece is really coming together."</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('latheCanvas');
    const ctx = canvas.getContext('2d');
    const dialogueEl = document.getElementById('dialogue-text');
    const avatarEl = document.getElementById('classmate-avatar');

    // Setup dimensions for iPad
    canvas.width = 600;
    canvas.height = 300;

    const woodData = {
        segments: 60,
        radii: [],
        color: '#d2b48c',
        width: 500,
        height: 150,
        x: 50,
        y: 75
    };

    // Initialize wood segments
    for (let i = 0; i < woodData.segments; i++) {
        woodData.radii.push(woodData.height / 2);
    }

    const classmates = [
        { name: "Alex", lines: ["Nice technique! You've got a steady hand.", "The grain on that oak looks perfect."] },
        { name: "Jordan", lines: ["Looking sharp! Want me to pass you the varnish later?", "Almost done with the base? I'm just starting mine."] }
    ];

    let currentClassmate = 0;
    let lineIndex = 0;

    function updateDialogue() {
        const c = classmates[currentClassmate];
        avatarEl.innerText = c.name;
        dialogueEl.innerText = `"${c.lines[lineIndex]}"`;
        
        lineIndex = (lineIndex + 1) % c.lines.length;
        if (lineIndex === 0) currentClassmate = (currentClassmate + 1) % classmates.length;
    }

    // Carving Logic
    function carve(touchX, touchY) {
        const rect = canvas.getBoundingClientRect();
        const x = (touchX - rect.left) * (canvas.width / rect.width);
        const y = (touchY - rect.top) * (canvas.height / rect.height);

        // Check if carving wood
        if (x >= woodData.x && x <= woodData.x + woodData.width) {
            const segmentWidth = woodData.width / woodData.segments;
            const index = Math.floor((x - woodData.x) / segmentWidth);
            
            if (index >= 0 && index < woodData.segments) {
                const centerY = canvas.height / 2;
                const distFromCenter = Math.abs(y - centerY);
                
                // If touching inside the current radius, carve it down
                if (distFromCenter < woodData.radii[index]) {
                    woodData.radii[index] = Math.max(10, distFromCenter);
                }
            }
        }
    }

    // Main Draw Loop
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Lathe Machine
        ctx.fillStyle = "#444";
        ctx.fillRect(20, 140, 30, 40); // Left mount
        ctx.fillRect(550, 140, 30, 40); // Right mount

        const segmentWidth = woodData.width / woodData.segments;
        const centerY = canvas.height / 2;

        // Draw Wood Segments
        ctx.fillStyle = woodData.color;
        for (let i = 0; i < woodData.segments; i++) {
            const r = woodData.radii[i];
            const xPos = woodData.x + (i * segmentWidth);
            
            // Draw segment with wood grain effect
            ctx.globalAlpha = 1.0;
            ctx.fillRect(xPos, centerY - r, segmentWidth + 1, r * 2);
            
            // Add highlights
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.fillRect(xPos, centerY - r, segmentWidth + 1, r * 0.3);
            ctx.fillStyle = woodData.color;
        }

        requestAnimationFrame(draw);
    }

    // Touch Interaction
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        carve(e.touches[0].clientX, e.touches[0].clientY);
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        carve(e.touches[0].clientX, e.touches[0].clientY);
    });

    // Mouse Fallback for testing
    canvas.addEventListener('mousedown', (e) => {
        const moveHandler = (me) => carve(me.clientX, me.clientY);
        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('mouseup', () => window.removeEventListener('mousemove', moveHandler), {once: true});
        carve(e.clientX, e.clientY);
    });

    // Rotation effect: Periodically change dialogue
    setInterval(updateDialogue, 8000);

    draw();
</script>

</body>
</html>
