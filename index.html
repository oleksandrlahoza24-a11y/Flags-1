<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #ffffff;
      --bg-secondary:#f5f5f4;
      --bg-bubble-ai:#f0f0ef;
      --bg-bubble-user:#dbeafe;
      --text:        #1c1c1b;
      --text-muted:  #6b7280;
      --text-hint:   #9ca3af;
      --text-user:   #1e40af;
      --border:      rgba(0,0,0,0.10);
      --border-md:   rgba(0,0,0,0.18);
      --accent:      #3b82f6;
      --radius:      14px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #1a1a19;
        --bg-secondary:#242422;
        --bg-bubble-ai:#2a2a28;
        --bg-bubble-user:#1e3a5f;
        --text:        #f0efed;
        --text-muted:  #9ca3af;
        --text-hint:   #6b7280;
        --text-user:   #93c5fd;
        --border:      rgba(255,255,255,0.08);
        --border-md:   rgba(255,255,255,0.14);
      }
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-secondary);
      color: var(--text);
    }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
      background: var(--bg);
      border-left: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 11px; }
    #avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #dbeafe; color: #1e40af;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; flex-shrink: 0;
    }
    @media (prefers-color-scheme: dark) {
      #avatar { background: #1e3a5f; color: #93c5fd; }
    }
    #header-title  { font-weight: 600; font-size: 16px; line-height: 1.2; }
    #header-sub    { font-size: 12px; color: var(--text-muted); }
    #header-stats  { display: flex; gap: 14px; }
    .stat          { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
    .stat svg      { width: 14px; height: 14px; opacity: 0.65; }

    /* ── Messages ──────────────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 78%; animation: pop 0.18s ease; }
    @keyframes pop { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai   { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 10px;
      color: var(--text-hint);
      padding: 0 5px;
      letter-spacing: 0.02em;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--text);
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--bg-bubble-user);
      color: var(--text-user);
      border-bottom-right-radius: 4px;
    }
    .msg.ai .bubble {
      background: var(--bg-bubble-ai);
      border-bottom-left-radius: 4px;
    }

    .learned-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--bg-secondary);
      color: var(--text-hint);
      border: 0.5px solid var(--border);
      margin-top: 2px;
    }

    /* ── Typing indicator ──────────────────────────────────────────────────── */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Hint bar ──────────────────────────────────────────────────────────── */
    #hint {
      font-size: 11px;
      color: var(--text-hint);
      padding: 6px 18px;
      text-align: center;
      border-top: 0.5px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    /* ── Input area ────────────────────────────────────────────────────────── */
    #input-area {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding: 12px 18px 16px;
      border-top: 0.5px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      resize: none;
      min-height: 40px;
      max-height: 110px;
      padding: 10px 14px;
      font-size: 14.5px;
      font-family: var(--font);
      line-height: 1.45;
      border-radius: 20px;
      border: 0.5px solid var(--border-md);
      background: var(--bg-secondary);
      color: var(--text);
      overflow-y: auto;
      outline: none;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-hint); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<div id="app" role="main">

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="avatar">N</div>
      <div>
        <div id="header-title">Nexus</div>
        <div id="header-sub">Personal AI</div>
      </div>
    </div>
    <div id="header-stats">
      <div class="stat">
        <!-- brain icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9.5 2a2.5 2.5 0 0 1 5 0M9 4.5C6.5 4.5 4 6.5 4 9c0 1.5.7 2.8 1.8 3.7C4.7 13.4 4 14.6 4 16c0 2.2 1.8 4 4 4h8c2.2 0 4-1.8 4-4 0-1.4-.7-2.6-1.8-3.3C19.3 11.8 20 10.5 20 9c0-2.5-2.5-4.5-5-4.5"/>
        </svg>
        <span id="stat-facts">0 facts</span>
      </div>
      <div class="stat">
        <!-- bolt icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span id="stat-triggers">0 triggers</span>
      </div>
    </div>
  </div>

  <!-- Message feed -->
  <div id="messages" aria-live="polite" aria-label="Conversation"></div>

  <!-- Hint -->
  <div id="hint">Try: "My name is Alex" · "Coffee is energising" · "When I say hi, say Hello friend!"</div>

  <!-- Input -->
  <div id="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="Talk to Nexus…"
      aria-label="Message input"
    ></textarea>
    <button id="send-btn" aria-label="Send message" disabled>
      <!-- send icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<!-- Nexus AI engine -->
<script src="nexus-ai.js"></script>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const statFacts   = document.getElementById('stat-facts');
  const statTriggers = document.getElementById('stat-triggers');

  // ── Stats ─────────────────────────────────────────────────────────────────
  function updateStats() {
    const s = NexusAI.getStats();
    statFacts.textContent    = s.facts    + ' fact'    + (s.facts    !== 1 ? 's' : '');
    statTriggers.textContent = s.triggers + ' trigger' + (s.triggers !== 1 ? 's' : '');
  }

  // ── Render helpers ────────────────────────────────────────────────────────
  function addMessage(role, text, learned) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Nexus';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);

    if (learned) {
      const tag = document.createElement('span');
      tag.className = 'learned-tag';
      tag.textContent = '✦ learned';
      wrap.appendChild(tag);
    }

    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typing';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-dots';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ── Send flow ─────────────────────────────────────────────────────────────
  function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    showTyping();

    // Small delay to feel natural
    const delay = 380 + Math.random() * 280;
    setTimeout(() => {
      removeTyping();
      const reply   = NexusAI.process(text);
      const learned = /noted|i've learned|i'll remember|got it|nice to meet/i.test(reply);
      addMessage('ai', reply, learned);
      updateStats();
      sendBtn.disabled = inputEl.value.trim() === '';
      inputEl.focus();
    }, delay);
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  inputEl.addEventListener('input', () => {
    // Auto-grow textarea
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
    sendBtn.disabled = inputEl.value.trim() === '';
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  addMessage('ai', "Hi! I'm Nexus. Teach me facts, set up custom responses, or just chat. I'll remember everything you tell me.");
  updateStats();
  inputEl.focus();
</script>

</body>
</html>
