<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ignis - A Silhouette Journey</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            user-select: none;
        }

        .instructions {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="instructions">Walk through the twilight. Spread the warmth.</div>
    </div>

<script>
/**
 * IGNIS - CORE GAME ENGINE
 * A self-contained atmospheric indie game.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- CONFIGURATION & STATE ---
const STATE = {
    width: 0,
    height: 0,
    cameraX: 0,
    player: null,
    objects: [],
    projectiles: [],
    particles: [],
    fireflies: [],
    parallaxLayers: [],
    input: {
        left: false,
        right: false,
        jump: false,
        joystick: { active: false, x: 0, y: 0, startX: 0, startY: 0, curX: 0, curY: 0 },
        throwBtn: { x: 0, y: 0, radius: 45, pressed: false }
    },
    shake: 0,
    worldWidth: 8000,
    groundY: 0.85 // Percentage of screen height
};

// --- UTILS ---
const random = (min, max) => Math.random() * (max - min) + min;
const lerp = (a, b, t) => a + (b - a) * t;

/**
 * CLASS: Particle
 * Used for flames, smoke, and leaves.
 */
class Particle {
    constructor(x, y, color, type = 'fire') {
        this.x = x;
        this.y = y;
        this.vx = random(-0.5, 0.5);
        this.vy = type === 'fire' ? random(-1, -3) : random(0.5, 1.5);
        this.life = 1.0;
        this.decay = random(0.01, 0.03);
        this.color = color;
        this.type = type;
        this.size = random(2, 5);
        this.angle = Math.random() * Math.PI * 2;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.type === 'leaf') {
            this.vx = Math.sin(Date.now() * 0.005) * 1;
            this.angle += 0.02;
        }
        this.life -= this.decay;
    }

    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.translate(this.x, this.y);
        ctx.fillStyle = this.color;
        
        if (this.type === 'fire') {
            // Flame teardrop shape
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-this.size, this.size, this.size, this.size, 0, -this.size * 1.5);
            ctx.fill();
        } else {
            ctx.rotate(this.angle);
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        }
        ctx.restore();
    }
}

/**
 * CLASS: World Object
 * Silhouette objects that can burn.
 */
class WorldObject {
    constructor(x, type) {
        this.x = x;
        this.type = type; // 'tree', 'house', 'fence', 'haystack'
        this.isBurnable = true;
        this.burning = false;
        this.burntAmount = 0; // 0 to 1
        this.ash = false;
        this.ignitionTimer = 0;
        
        // Visual properties
        this.width = type === 'house' ? 120 : (type === 'tree' ? 40 : 30);
        this.height = type === 'house' ? 100 : (type === 'tree' ? 180 : 40);
        this.y = STATE.height * STATE.groundY - this.height;
        this.seed = Math.random();
    }

    ignite() {
        if (!this.burning && !this.ash) {
            this.burning = true;
            STATE.shake = 10;
            // Initial burst
            for(let i=0; i<15; i++) {
                STATE.particles.push(new Particle(this.x + this.width/2, this.y + this.height/2, '#ffcc00'));
            }
        }
    }

    update() {
        if (this.burning && !this.ash) {
            this.burntAmount += 0.001;
            if (this.burntAmount >= 1) {
                this.burning = false;
                this.ash = true;
            }

            // Spawn flame particles
            if (Math.random() > 0.4) {
                const px = this.x + Math.random() * this.width;
                const py = this.y + Math.random() * this.height;
                STATE.particles.push(new Particle(px, py, Math.random() > 0.5 ? '#ff9900' : '#ffcc00'));
            }

            // Spread fire
            STATE.objects.forEach(other => {
                if (other !== this && other.isBurnable && !other.burning && !other.ash) {
                    const dist = Math.abs((this.x + this.width/2) - (other.x + other.width/2));
                    if (dist < 150) {
                        other.ignitionTimer += 1;
                        if (other.ignitionTimer > 180) { // ~3 seconds at 60fps
                            other.ignite();
                        }
                    }
                }
            });
        }
    }

    draw(ctx) {
        ctx.save();
        const screenX = this.x - STATE.cameraX;
        
        // Draw fire glow (Bloom)
        if (this.burning) {
            const pulse = Math.sin(Date.now() * 0.01) * 20;
            const grad = ctx.createRadialGradient(
                screenX + this.width/2, this.y + this.height/2, 10,
                screenX + this.width/2, this.y + this.height/2, 150 + pulse
            );
            grad.addColorStop(0, 'rgba(255, 100, 0, 0.4)');
            grad.addColorStop(1, 'rgba(255, 50, 0, 0)');
            ctx.fillStyle = grad;
            ctx.globalCompositeOperation = 'screen';
            ctx.fillRect(screenX - 200, this.y - 200, this.width + 400, this.height + 400);
            ctx.globalCompositeOperation = 'source-over';
        }

        // Object Silhouette
        ctx.fillStyle = '#0a0a0a';
        if (this.ash) ctx.globalAlpha = 0.3;
        
        ctx.translate(screenX, this.y);
        
        if (this.type === 'tree') {
            // Trunk
            ctx.fillRect(this.width/2 - 5, 20, 10, this.height);
            // Foliage (jagged triangles)
            ctx.beginPath();
            ctx.moveTo(this.width/2, 0);
            ctx.lineTo(0, this.height * 0.7);
            ctx.lineTo(this.width, this.height * 0.7);
            ctx.fill();
        } else if (this.type === 'house') {
            ctx.fillRect(0, 40, this.width, this.height - 40);
            ctx.beginPath(); // Roof
            ctx.moveTo(-10, 40);
            ctx.lineTo(this.width/2, 0);
            ctx.lineTo(this.width + 10, 40);
            ctx.fill();
        } else if (this.type === 'fence') {
            for(let i=0; i<4; i++) {
                ctx.fillRect(i * 10, 0, 4, this.height);
            }
            ctx.fillRect(0, 10, this.width, 4);
        } else if (this.type === 'haystack') {
            ctx.beginPath();
            ctx.arc(this.width/2, this.height, this.width/2, Math.PI, 0);
            ctx.fill();
        }

        ctx.restore();
    }
}

/**
 * CLASS: Player
 */
class Player {
    constructor() {
        this.x = 200;
        this.y = 0;
        this.vx = 0;
        this.vy = 0;
        this.width = 24;
        this.height = 42;
        this.grounded = false;
        this.facing = 1;
    }

    update() {
        // Controls
        const speed = 4;
        const jumpForce = -12;
        const gravity = 0.6;

        if (STATE.input.left) { this.vx = -speed; this.facing = -1; }
        else if (STATE.input.right) { this.vx = speed; this.facing = 1; }
        else { this.vx *= 0.8; }

        if (STATE.input.jump && this.grounded) {
            this.vy = jumpForce;
            this.grounded = false;
        }

        this.vy += gravity;
        this.x += this.vx;
        this.y += this.vy;

        const floor = STATE.height * STATE.groundY - this.height;
        if (this.y > floor) {
            this.y = floor;
            this.vy = 0;
            this.grounded = true;
        }

        // Camera follow
        const targetCam = this.x - STATE.width / 3;
        STATE.cameraX = lerp(STATE.cameraX, targetCam, 0.05);
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x - STATE.cameraX, this.y);
        
        // Gentle idle bob
        const bob = Math.sin(Date.now() * 0.005) * 2;
        ctx.translate(0, bob);

        ctx.fillStyle = '#050505';
        
        // Body (Limbo-esque small figure)
        ctx.beginPath();
        ctx.ellipse(this.width/2, this.height * 0.7, 10, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Head
        ctx.beginPath();
        ctx.arc(this.width/2, this.height * 0.3, 9, 0, Math.PI * 2);
        ctx.fill();

        // Eyes (Small glowing pinpricks)
        ctx.fillStyle = '#fff';
        const eyeOffset = this.facing * 3;
        ctx.fillRect(this.width/2 + eyeOffset - 1, this.height * 0.25, 2, 2);
        ctx.fillRect(this.width/2 + eyeOffset + 3, this.height * 0.25, 2, 2);

        ctx.restore();
    }

    throwFire() {
        STATE.projectiles.push({
            x: this.x + this.width/2,
            y: this.y + 10,
            vx: this.facing * 10,
            vy: -8,
            life: 200
        });
    }
}

// --- INITIALIZATION ---
function init() {
    resize();
    
    STATE.player = new Player();

    // Create Parallax Layers (hills)
    for (let l = 0; l < 4; l++) {
        const points = [];
        const step = 100 + (l * 50);
        for (let x = 0; x <= STATE.worldWidth + 1000; x += step) {
            points.push({ x, y: random(100, 300) - (l * 40) });
        }
        STATE.parallaxLayers.push({ points, speed: 0.2 + (l * 0.2), color: `hsl(260, 30%, ${15 - l * 3}%)` });
    }

    // Populate World
    for (let x = 600; x < STATE.worldWidth; x += random(300, 600)) {
        const types = ['tree', 'house', 'fence', 'haystack', 'tree', 'tree'];
        const type = types[Math.floor(Math.random() * types.length)];
        STATE.objects.push(new WorldObject(x, type));
    }

    // Fireflies
    for (let i = 0; i < 30; i++) {
        STATE.fireflies.push({
            x: Math.random() * STATE.width,
            y: Math.random() * STATE.height,
            originX: 0,
            originY: 0,
            phase: Math.random() * Math.PI * 2
        });
    }

    // Input Events
    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') STATE.input.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') STATE.input.right = true;
        if (e.code === 'Space' || e.code === 'ArrowUp') STATE.input.jump = true;
        if (e.code === 'KeyF') STATE.player.throwFire();
    });

    window.addEventListener('keyup', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') STATE.input.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') STATE.input.right = false;
        if (e.code === 'Space' || e.code === 'ArrowUp') STATE.input.jump = false;
    });

    // Touch Events for iPad/Mobile
    canvas.addEventListener('pointerdown', handlePointer);
    canvas.addEventListener('pointermove', handlePointer);
    canvas.addEventListener('pointerup', e => {
        STATE.input.joystick.active = false;
        STATE.input.left = false;
        STATE.input.right = false;
        STATE.input.jump = false;
        
        // Check throw button
        const dist = Math.hypot(e.clientX - STATE.input.throwBtn.x, e.clientY - STATE.input.throwBtn.y);
        if (dist < STATE.input.throwBtn.radius) {
            STATE.player.throwFire();
        }
    });

    requestAnimationFrame(loop);
}

function handlePointer(e) {
    if (e.type === 'pointerdown' || e.type === 'pointermove') {
        // Joystick logic (Left side)
        if (e.clientX < STATE.width / 2) {
            if (e.type === 'pointerdown') {
                STATE.input.joystick.active = true;
                STATE.input.joystick.startX = e.clientX;
                STATE.input.joystick.startY = e.clientY;
            }
            STATE.input.joystick.curX = e.clientX;
            STATE.input.joystick.curY = e.clientY;

            const dx = STATE.input.joystick.curX - STATE.input.joystick.startX;
            const dy = STATE.input.joystick.curY - STATE.input.joystick.startY;
            
            STATE.input.left = dx < -20;
            STATE.input.right = dx > 20;
            STATE.input.jump = dy < -30;
        }
    }
}

function resize() {
    STATE.width = canvas.width = window.innerWidth;
    STATE.height = canvas.height = window.innerHeight;
    STATE.input.throwBtn = { x: STATE.width - 100, y: STATE.height - 100, radius: 45 };
}

window.addEventListener('resize', resize);

// --- MAIN LOOP ---
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    STATE.player.update();

    // Screen Shake decay
    if (STATE.shake > 0) STATE.shake *= 0.9;

    // Projectiles
    for (let i = STATE.projectiles.length - 1; i >= 0; i--) {
        const p = STATE.projectiles[i];
        p.vx *= 0.99;
        p.vy += 0.4;
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        // Collision with objects
        STATE.objects.forEach(obj => {
            if (p.x > obj.x && p.x < obj.x + obj.width && p.y > obj.y && p.y < obj.y + obj.height) {
                obj.ignite();
                p.life = 0;
            }
        });

        if (p.y > STATE.height * STATE.groundY || p.life <= 0) {
            STATE.projectiles.splice(i, 1);
        }
    }

    // Objects
    STATE.objects.forEach(obj => obj.update());

    // Particles
    for (let i = STATE.particles.length - 1; i >= 0; i--) {
        STATE.particles[i].update();
        if (STATE.particles[i].life <= 0) STATE.particles.splice(i, 1);
    }

    // Fireflies
    STATE.fireflies.forEach(f => {
        f.phase += 0.02;
        f.x += Math.sin(f.phase) * 0.5;
        f.y += Math.cos(f.phase * 0.5) * 0.5;
        if (f.x < 0) f.x = STATE.width;
        if (f.x > STATE.width) f.x = 0;
    });
}

function draw() {
    // 1. Sky Gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, STATE.height);
    skyGrad.addColorStop(0, '#1a0a2e'); // Deep violet
    skyGrad.addColorStop(0.7, '#4a2a5e'); 
    skyGrad.addColorStop(1, '#e67e22'); // Amber twilight
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, STATE.width, STATE.height);

    // 2. Parallax Layers
    STATE.parallaxLayers.forEach(layer => {
        ctx.fillStyle = layer.color;
        ctx.beginPath();
        ctx.moveTo(0, STATE.height);
        const offsetX = -(STATE.cameraX * layer.speed) % 1000;
        ctx.lineTo(offsetX, STATE.height);
        
        layer.points.forEach((p, i) => {
            const px = (i * (STATE.worldWidth / layer.points.length)) - (STATE.cameraX * layer.speed);
            ctx.lineTo(px, STATE.height * STATE.groundY - p.y);
        });
        
        ctx.lineTo(STATE.width, STATE.height);
        ctx.fill();
    });

    // 3. Screen Shake
    ctx.save();
    if (STATE.shake > 0.5) {
        ctx.translate(random(-STATE.shake, STATE.shake), random(-STATE.shake, STATE.shake));
    }

    // 4. Ground
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, STATE.height * STATE.groundY, STATE.width, STATE.height * (1 - STATE.groundY));

    // 5. Objects & Player
    STATE.objects.forEach(obj => obj.draw(ctx));
    STATE.player.draw(ctx);

    // 6. Projectiles
    STATE.projectiles.forEach(p => {
        ctx.fillStyle = '#ffcc00';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff6600';
        ctx.beginPath();
        ctx.arc(p.x - STATE.cameraX, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    // 7. Particles
    STATE.particles.forEach(p => {
        const screenX = p.x - STATE.cameraX;
        // Only draw if on screen
        if (screenX > -50 && screenX < STATE.width + 50) {
            p.draw(ctx);
        }
    });
    
    ctx.restore();

    // 8. Fireflies (Atmospheric)
    ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
    STATE.fireflies.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, 1, 0, Math.PI * 2);
        ctx.fill();
    });

    // 9. UI - Controls (Joystick & Button)
    drawUI();

    // 10. Vignette
    const vig = ctx.createRadialGradient(STATE.width/2, STATE.height/2, STATE.width/4, STATE.width/2, STATE.height/2, STATE.width);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, STATE.width, STATE.height);
}

function drawUI() {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#fff';

    // Joystick
    if (STATE.input.joystick.active) {
        ctx.beginPath();
        ctx.arc(STATE.input.joystick.startX, STATE.input.joystick.startY, 50, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(STATE.input.joystick.curX, STATE.input.joystick.curY, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    // Throw Button
    ctx.beginPath();
    ctx.arc(STATE.input.throwBtn.x, STATE.input.throwBtn.y, STATE.input.throwBtn.radius, 0, Math.PI * 2);
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#fff';
    ctx.stroke();
    
    // Fire icon inside button
    ctx.beginPath();
    ctx.moveTo(STATE.input.throwBtn.x, STATE.input.throwBtn.y + 15);
    ctx.bezierCurveTo(STATE.input.throwBtn.x - 15, STATE.input.throwBtn.y + 15, STATE.input.throwBtn.x + 15, STATE.input.throwBtn.y + 15, STATE.input.throwBtn.x, STATE.input.throwBtn.y - 15);
    ctx.fill();

    ctx.globalAlpha = 1.0;
}

// Kick off
init();
</script>
</body>
</html>
