<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Proposal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        
        /* Proposal UI */
        #proposal-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            z-index: 1000;
            width: 80%;
            max-width: 400px;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease;
        }

        h1 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }

        .btn-container { display: flex; justify-content: space-around; gap: 20px; }

        button {
            padding: 15px 30px;
            border-radius: 15px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 120px;
        }

        #yes-btn { background: #ff4d6d; color: white; }
        #no-btn { background: #444; color: white; }
        button:active { transform: scale(0.9); }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 2000;
        }

        #status-msg {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; font-size: 24px; pointer-events: none; opacity: 0;
            transition: opacity 1s; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="flash"></div>
<div id="status-msg"></div>

<div id="proposal-card">
    <h1>I've been thinking...<br>Will you marry me?</h1>
    <div class="btn-container">
        <button id="yes-btn" onclick="accept()">YES</button>
        <button id="no-btn" onclick="decline()">NO</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Shader Logic ---
    const CloudShader = {
        uniforms: {
            time: { value: 0 },
            uColor: { value: new THREE.Color(0.2, 0.2, 0.2) },
            uHeat: { value: 0.0 },
            uOpacity: { value: 1.0 }
        },
        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            uniform float time;
            
            float hash(vec3 p) {
                p = fract(p * 0.3183099 + 0.1);
                p *= 17.0;
                return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
            }

            void main() {
                vNormal = normal;
                float noise = hash(position * 0.1 + time);
                vec3 newPos = position + normal * noise * 1.5;
                vec4 mvPosition = modelViewMatrix * vec4(newPos, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            uniform vec3 uColor;
            uniform float uHeat;
            uniform float uOpacity;
            void main() {
                float fresnel = pow(1.0 - dot(normalize(vNormal), normalize(vViewPosition)), 3.0);
                vec3 fireColor = vec3(1.0, 0.3, 0.05) * uHeat * 6.0;
                gl_FragColor = vec4(mix(uColor, fireColor, uHeat) + (fresnel * 0.1), uOpacity);
            }
        `
    };

    let scene, camera, renderer, composer, clock, mushroomCap, stem, shockwave, bombBody;
    let isExploding = false;
    let startTime = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.002);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 40, 200);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.25;
        bloomPass.strength = 1.0;
        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        clock = new THREE.Clock();

        // Environment
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(5000, 5000),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const light = new THREE.PointLight(0xffffff, 20);
        light.position.set(0, 20, 0);
        scene.add(light);

        // The "Nuke" Bomb Object
        const bombGeo = new THREE.CapsuleGeometry(5, 10, 4, 16);
        const bombMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 1, roughness: 0.2 });
        bombBody = new THREE.Mesh(bombGeo, bombMat);
        bombBody.position.y = 10;
        scene.add(bombBody);

        window.addEventListener('resize', onWindowResize);
    }

    window.accept = function() {
        document.getElementById('proposal-card').style.opacity = '0';
        setTimeout(() => document.getElementById('proposal-card').remove(), 500);
        
        const msg = document.getElementById('status-msg');
        msg.innerText = "❤️ I LOVE YOU TOO! ❤️";
        msg.style.opacity = '1';
        
        // Add some hearts
        for(let i=0; i<50; i++) {
            const heart = new THREE.Mesh(
                new THREE.SphereGeometry(1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            heart.position.set(Math.random()*100-50, Math.random()*50, Math.random()*100-50);
            scene.add(heart);
        }
    };

    window.decline = function() {
        document.getElementById('proposal-card').style.opacity = '0';
        setTimeout(() => document.getElementById('proposal-card').remove(), 500);
        
        const msg = document.getElementById('status-msg');
        msg.innerText = "WRONG ANSWER.";
        msg.style.color = "red";
        msg.style.opacity = '1';

        setTimeout(detonate, 1000);
    };

    function detonate() {
        scene.remove(bombBody);
        
        const capGeo = new THREE.SphereGeometry(1, 64, 64);
        const capMat = new THREE.ShaderMaterial({
            uniforms: THREE.UniformsUtils.clone(CloudShader.uniforms),
            vertexShader: CloudShader.vertexShader,
            fragmentShader: CloudShader.fragmentShader,
            transparent: true
        });
        mushroomCap = new THREE.Mesh(capGeo, capMat);
        scene.add(mushroomCap);

        const stemGeo = new THREE.CylinderGeometry(0.5, 1, 1, 32, 32, true);
        stem = new THREE.Mesh(stemGeo, capMat.clone());
        scene.add(stem);

        const ringGeo = new THREE.TorusGeometry(1, 0.05, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        shockwave = new THREE.Mesh(ringGeo, ringMat);
        shockwave.rotation.x = Math.PI / 2;
        scene.add(shockwave);

        isExploding = true;
        startTime = clock.getElapsedTime();
        
        const flashDiv = document.getElementById('flash');
        flashDiv.style.opacity = '1';
        setTimeout(() => { 
            flashDiv.style.transition = 'opacity 3s'; 
            flashDiv.style.opacity = '0'; 
            scene.background.setHex(0x87CEEB); // Sky turns blue after flash
            scene.fog.color.setHex(0x87CEEB);
        }, 100);
    }

    function updateSimulation() {
        if (!isExploding) return;
        const t = clock.getElapsedTime() - startTime;

        const capScale = Math.pow(t, 0.6) * 50;
        const capHeight = Math.pow(t, 0.7) * 70;
        mushroomCap.scale.set(capScale * 1.4, capScale * 0.8, capScale * 1.4);
        mushroomCap.position.y = capHeight;
        mushroomCap.material.uniforms.time.value = t;
        mushroomCap.material.uniforms.uHeat.value = Math.max(0, 1.0 - t/5);
        mushroomCap.material.uniforms.uOpacity.value = Math.max(0, 1.0 - t/15);

        const stemWidth = Math.pow(t, 0.4) * 12;
        stem.scale.set(stemWidth, capHeight, stemWidth);
        stem.position.y = capHeight / 2;
        stem.material.uniforms.uHeat.value = Math.max(0, 0.5 - t/5);

        const swScale = t * 500;
        shockwave.scale.set(swScale, swScale, 1);
        shockwave.material.opacity = Math.max(0, 0.8 - t/3);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        updateSimulation();
        composer.render();
    }
</script>
</body>
</html>
