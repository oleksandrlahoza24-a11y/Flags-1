<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gen-2: Logic Engine</title>
    <style>
        :root { --main: #00ff9d; --bg: #0a0a0c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        #ai-status { width: 90%; max-width: 600px; padding: 10px; font-size: 0.75rem; color: var(--main); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        
        #chat-window { width: 90%; max-width: 600px; height: 55vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 20px; border: 1px solid #1a1a1a; background: #0f0f12; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; }
        .user { align-self: flex-end; background: #1a1a1a; color: var(--main); border: 1px solid var(--main); }
        .ai { align-self: flex-start; background: #222; border-left: 4px solid var(--main); }
        
        #input-area { width: 90%; max-width: 600px; display: flex; margin-top: 20px; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--main); }
        button { background: var(--main); color: black; border: none; padding: 0 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #logic-log { width: 90%; max-width: 600px; font-size: 0.7rem; color: #555; margin-top: 10px; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="ai-status">Nexus Core: <span id="brain-state">Idle</span> | Knowledge: <span id="k-count">0</span></div>

    <div id="chat-window">
        <div class="msg ai">Neural pathways cleared. I am a blank slate. Feed me logic (e.g., "Fire is hot", "The sun is a star").</div>
    </div>

    <div id="logic-log" id="log-text">Waiting for input...</div>

    <form id="input-area">
        <input type="text" id="user-input" placeholder="Teach or Ask something..." autocomplete="off">
        <button type="submit">PROCESS</button>
    </form>

    <script src="ai-model.js"></script>
    <script>
        const chat = document.getElementById('chat-window');
        const form = document.getElementById('input-area');
        const input = document.getElementById('user-input');
        const kCount = document.getElementById('k-count');
        const brainState = document.getElementById('brain-state');

        form.onsubmit = (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if(!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            brainState.innerText = "THINKING...";

            setTimeout(() => {
                const response = CustomAI.process(text);
                chat.innerHTML += `<div class="msg ai">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
                kCount.innerText = CustomAI.getK();
                brainState.innerText = "READY";
            }, 500);
        };
    </script>
</body>
</html>
