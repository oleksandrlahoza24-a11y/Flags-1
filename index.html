<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMBERLIT — Silhouette Atmosphere</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050505;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
            pointer-events: auto;
        }
        .joystick-area {
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #stick {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            position: absolute;
            top: 45px;
            left: 45px;
        }
        .btn-action {
            width: 100px;
            height: 100px;
            background: rgba(255,100,0,0.15);
            border: 2px solid rgba(255,100,0,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,200,100,0.8);
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,100,0,0.5);
            backdrop-filter: blur(4px);
        }
        .btn-action:active { background: rgba(255,100,0,0.4); }
        
        @media (min-width: 1024px) {
            #controls { display: none; }
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="ui">
    <div class="vignette"></div>
    <div id="controls">
        <div class="joystick-area" id="joyArea">
            <div id="stick"></div>
        </div>
        <div class="btn-action" id="btnThrow">IGNITE</div>
    </div>
</div>

<script>
/**
 * EMBERLIT - CORE ENGINE
 * A hand-crafted silhouette experience.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const stick = document.getElementById('stick');
const joyArea = document.getElementById('joyArea');
const btnThrow = document.getElementById('btnThrow');

let width, height;
let camera = { x: 0, y: 0, shake: 0 };
let lastTime = 0;
let worldWidth = 6000;
let groundY = 0;

const CONFIG = {
    gravity: 0.6,
    friction: 0.8,
    playerSpeed: 0.6,
    jumpPower: 12,
    spreadRadius: 180,
    proximityRadius: 150
};

// --- MATH UTILS ---
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (min, max) => Math.random() * (max - min) + min;
const dist = (x1, y1, x2, y2) => Math.sqrt((x2-x1)**2 + (y2-y1)**2);

// --- INPUT SYSTEM ---
const keys = {};
const touch = { active: false, x: 0, y: 0, startX: 0, startY: 0, angle: 0, force: 0 };
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

joyArea.addEventListener('pointerdown', e => {
    touch.active = true;
    touch.startX = e.clientX;
    touch.startY = e.clientY;
});

window.addEventListener('pointermove', e => {
    if (!touch.active) return;
    const dx = e.clientX - touch.startX;
    const dy = e.clientY - touch.startY;
    const distance = Math.min(60, Math.sqrt(dx*dx + dy*dy));
    const angle = Math.atan2(dy, dx);
    touch.angle = angle;
    touch.force = distance / 60;
    
    stick.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
});

window.addEventListener('pointerup', () => {
    touch.active = false;
    touch.force = 0;
    stick.style.transform = `translate(0px, 0px)`;
});

// --- PARTICLE SYSTEM ---
class Particle {
    constructor(x, y, type, config = {}) {
        this.x = x; this.y = y;
        this.vx = config.vx || 0;
        this.vy = config.vy || 0;
        this.life = 1.0;
        this.decay = config.decay || 0.02;
        this.type = type; // 'leaf', 'ember', 'flame', 'smoke', 'firefly', 'projectile'
        this.color = config.color || '#fff';
        this.size = config.size || 2;
        this.angle = Math.random() * Math.PI * 2;
        this.rotSpeed = rand(-0.1, 0.1);
        this.gravity = config.gravity || 0;
    }
    update(dt) {
        this.x += this.vx * dt * 60;
        this.y += this.vy * dt * 60;
        this.vy += this.gravity * dt * 60;
        this.life -= this.decay * dt * 60;
        this.angle += this.rotSpeed;
    }
}

// --- WORLD OBJECTS (Silhouettes) ---
class WorldObject {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.scale = rand(0.8, 1.3);
        this.sway = 0;
        this.swaySpeed = rand(0.02, 0.05);
        this.swayOffset = Math.random() * 100;
        this.isBurning = false;
        this.burnProgress = 0;
        this.igniteTimer = 0;
        this.hasLeaves = (type === 'bush' || type === 'grass' || type.includes('tree'));
        this.leafCooldown = 0;
        this.isStructure = (type === 'cottage' || type === 'barn' || type === 'bridge');
    }

    draw(ctx, time) {
        const proximity = Math.abs((player.x) - (this.x));
        let proxMult = 1.0;
        if (proximity < CONFIG.proximityRadius) {
            proxMult = 3.0;
            if (this.hasLeaves && this.leafCooldown <= 0 && Math.abs(player.vx) > 0.1) {
                spawnLeafBurst(this.x, this.y - 20);
                this.leafCooldown = 1.0;
            }
        }
        if (this.leafCooldown > 0) this.leafCooldown -= 0.02;

        this.sway = Math.sin(time * this.swaySpeed + this.swayOffset) * (2 * proxMult);
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.sway * Math.PI) / 180);
        ctx.scale(this.scale, this.scale);
        
        // Erosion effect if burning
        if (this.isBurning) {
            ctx.globalAlpha = 1.0 - (this.burnProgress * 0.7);
        }

        ctx.fillStyle = '#000';
        ctx.beginPath();
        this.renderShape(ctx);
        ctx.fill();

        // Structure Windows
        if (this.type === 'cottage' || this.type === 'barn') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillRect(-15, -30, 10, 12);
            ctx.fillRect(5, -30, 10, 12);
            ctx.globalCompositeOperation = 'source-over';
        }

        ctx.restore();

        if (this.isBurning) {
            this.drawFire(ctx, time);
            this.burnProgress += 0.001;
            if (this.burnProgress > 1) this.burnProgress = 1;
        }
    }

    drawFire(ctx, time) {
        const fireCount = 12;
        for (let i = 0; i < fireCount; i++) {
            const bx = this.x + (Math.random() - 0.5) * 60;
            const by = this.y - (Math.random() * 40) - (this.burnProgress * 20);
            const size = (1.0 - this.burnProgress) * rand(10, 20);
            
            const grad = ctx.createRadialGradient(bx, by, 0, bx, by, size);
            grad.addColorStop(0, 'rgba(255, 255, 200, 0.8)');
            grad.addColorStop(0.4, 'rgba(255, 150, 0, 0.6)');
            grad.addColorStop(1, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(bx, by + Math.sin(time * 0.1 + i) * 5, size, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Ground glow
        const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 150);
        glow.addColorStop(0, 'rgba(255, 100, 0, 0.2)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fillRect(this.x - 150, this.y - 50, 300, 100);
    }

    renderShape(ctx) {
        const t = this.type;
        if (t === 'savanna') {
            ctx.moveTo(-5, 0); ctx.lineTo(-2, -80); ctx.lineTo(2, -80); ctx.lineTo(5, 0);
            // Layered lobes
            this.drawLobe(ctx, 0, -85, 80, 25);
            this.drawLobe(ctx, 0, -100, 60, 20);
        } else if (t === 'pine') {
            for (let i = 0; i < 4; i++) {
                const w = 50 - i * 10;
                const h = -i * 30;
                ctx.moveTo(0, h - 40); ctx.lineTo(-w, h); ctx.lineTo(w, h); ctx.closePath();
            }
        } else if (t === 'deciduous') {
            ctx.fillRect(-6, -40, 12, 40);
            this.drawLobe(ctx, 0, -60, 50, 45);
        } else if (t === 'jpine') {
            ctx.quadraticCurveTo(40, -40, 0, -80);
            this.drawLobe(ctx, 40, -40, 30, 15);
            this.drawLobe(ctx, -20, -70, 25, 12);
        } else if (t === 'baobab') {
            ctx.moveTo(-25, 0); ctx.bezierCurveTo(-30, -80, 30, -80, 25, 0);
            ctx.fillRect(-2, -90, 4, 20);
        } else if (t === 'palm') {
            ctx.quadraticCurveTo(20, -50, 10, -100);
            for(let i=0; i<6; i++) {
                ctx.save(); ctx.translate(10, -100); ctx.rotate(i);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(30, 10, 50, 0); ctx.stroke();
                ctx.restore();
            }
        } else if (t === 'poplar') {
            ctx.fillRect(-2, -120, 4, 120);
            ctx.ellipse(0, -70, 15, 60, 0, 0, Math.PI * 2);
        } else if (t === 'bush') {
            this.drawLobe(ctx, 0, -10, 40, 25);
        } else if (t === 'grass') {
            for(let i=0; i<5; i++) {
                ctx.moveTo(0,0); ctx.quadraticCurveTo(-10+i*5, -30, -15+i*7, 0);
            }
        } else if (t === 'cottage') {
            ctx.rect(-40, -40, 80, 40);
            ctx.moveTo(-50, -40); ctx.lineTo(0, -80); ctx.lineTo(50, -40);
        } else if (t === 'bridge') {
            ctx.rect(-100, -5, 200, 10);
            ctx.rect(-80, 0, 10, 40); ctx.rect(70, 0, 10, 40);
        }
    }

    drawLobe(ctx, x, y, rw, rh) {
        ctx.moveTo(x, y);
        for (let a = 0; a < Math.PI * 2; a += 0.8) {
            const cx = x + Math.cos(a) * rw;
            const cy = y + Math.sin(a) * rh;
            ctx.arc(cx, cy, rw/2, 0, Math.PI * 2);
        }
    }
}

// --- ENTITIES ---
const player = {
    x: 400, y: 0, vx: 0, vy: 0,
    width: 30, height: 45,
    grounded: false,
    dir: 1,
    walkFrame: 0,
    update(dt) {
        // Input
        let move = 0;
        if (keys['KeyA'] || keys['ArrowLeft']) move = -1;
        if (keys['KeyD'] || keys['ArrowRight']) move = 1;
        if (touch.active) move = Math.cos(touch.angle) * touch.force;

        this.vx += move * CONFIG.playerSpeed;
        this.vx *= CONFIG.friction;
        
        if ((keys['KeyW'] || keys['ArrowUp'] || keys['Space']) && this.grounded) {
            this.vy = -CONFIG.jumpPower;
            this.grounded = false;
        }

        this.vy += CONFIG.gravity;
        this.x += this.vx;
        this.y += this.vy;

        if (this.y > groundY) {
            this.y = groundY;
            this.vy = 0;
            this.grounded = true;
        }

        if (Math.abs(this.vx) > 0.1) {
            this.dir = this.vx > 0 ? 1 : -1;
            this.walkFrame += Math.abs(this.vx) * 0.1;
        }
        
        camera.x = lerp(camera.x, this.x - width/2, 0.1);
    },
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Rim Light
        const rimGrad = ctx.createRadialGradient(0, -20, 0, 0, -20, 40);
        rimGrad.addColorStop(0, 'rgba(255, 200, 100, 0.4)');
        rimGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = rimGrad;
        ctx.beginPath();
        ctx.arc(0, -25, 25, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.scale(this.dir, 1);
        
        // Body (Breathing)
        const bob = Math.sin(Date.now() * 0.005) * 2;
        ctx.fillRect(-10, -35 + bob, 20, 25);
        // Head
        ctx.beginPath(); ctx.arc(0, -42 + bob, 10, 0, Math.PI*2); ctx.fill();
        // Legs
        const leg1 = Math.sin(this.walkFrame) * 15;
        const leg2 = Math.sin(this.walkFrame + Math.PI) * 15;
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-5, -10); ctx.lineTo(-5 + leg1, 0);
        ctx.moveTo(5, -10); ctx.lineTo(5 + leg2, 0);
        ctx.stroke();

        ctx.restore();
    }
};

// --- SYSTEMS ---
let objects = [];
let particles = [];

function initWorld() {
    groundY = height - 100;
    player.y = groundY;
    
    const types = ['savanna', 'pine', 'deciduous', 'jpine', 'baobab', 'palm', 'poplar', 'bush', 'grass', 'cottage', 'bridge'];
    for (let i = 0; i < 60; i++) {
        const x = rand(100, worldWidth - 100);
        const type = types[Math.floor(Math.random() * types.length)];
        objects.push(new WorldObject(x, groundY, type));
    }
    
    // Sort by type for layering if needed, or just random
    objects.sort((a, b) => a.x - b.x);

    // Initial fireflies
    for(let i=0; i<30; i++) spawnFirefly();
}

function spawnFirefly() {
    particles.push(new Particle(rand(0, worldWidth), rand(200, groundY), 'firefly', {
        vx: rand(-0.5, 0.5), vy: rand(-0.5, 0.5), decay: 0.001, size: rand(1, 3)
    }));
}

function spawnLeafBurst(x, y) {
    for (let i = 0; i < 8; i++) {
        particles.push(new Particle(x, y, 'leaf', {
            vx: rand(-2, 2), vy: rand(-2, -1), gravity: 0.05, decay: 0.02, size: 4
        }));
    }
}

function throwFire() {
    const p = new Particle(player.x, player.y - 30, 'projectile', {
        vx: player.dir * 12, vy: -8, gravity: 0.4, decay: 0.005
    });
    particles.push(p);
}

btnThrow.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    throwFire();
});

window.addEventListener('mousedown', (e) => {
    if (e.target.tagName !== 'CANVAS') return;
    throwFire();
});

function triggerExplosion(x, y) {
    camera.shake = 10;
    // Light Bloom
    const bloom = { x, y, life: 1.0 };
    blooms.push(bloom);

    for (let i = 0; i < 25; i++) {
        particles.push(new Particle(x, y, 'ember', {
            vx: rand(-5, 5), vy: rand(-8, 2), gravity: 0.2, decay: 0.02, size: rand(2, 4)
        }));
    }

    // Ignite objects
    objects.forEach(obj => {
        if (!obj.isBurning && dist(x, y, obj.x, obj.y - 50) < 100) {
            obj.isBurning = true;
        }
    });
}

let blooms = [];

function update(time) {
    const dt = (time - lastTime) / 1000;
    lastTime = time;

    player.update(dt);

    if (camera.shake > 0) camera.shake *= 0.9;

    particles.forEach((p, i) => {
        p.update(dt);
        
        if (p.type === 'projectile') {
            // Trail
            if (Math.random() > 0.5) {
                particles.push(new Particle(p.x, p.y, 'ember', { vx: -p.vx*0.2, vy: rand(-1, 1), decay: 0.05 }));
            }
            // Hit ground
            if (p.y > groundY) {
                triggerExplosion(p.x, groundY);
                p.life = 0;
            }
        }

        if (p.life <= 0) particles.splice(i, 1);
    });

    blooms.forEach((b, i) => {
        b.life -= 0.05;
        if (b.life <= 0) blooms.splice(i, 1);
    });

    // Fire Spread Logic
    objects.forEach(obj => {
        if (obj.isBurning && obj.burnProgress < 0.8) {
            if (Math.random() < 0.01) { // Chance to spread
                objects.forEach(target => {
                    if (!target.isBurning && dist(obj.x, obj.y, target.x, target.y) < CONFIG.spreadRadius) {
                        target.isBurning = true;
                        // Visual arc
                        for(let i=0; i<5; i++) {
                            particles.push(new Particle(obj.x, obj.y-40, 'ember', {
                                vx: (target.x - obj.x) * 0.05 + rand(-1,1),
                                vy: -5 + rand(-2,2),
                                gravity: 0.3
                            }));
                        }
                    }
                });
            }
            // Spawn smoke/flame particles
            if (Math.random() > 0.7) {
                particles.push(new Particle(obj.x + rand(-20,20), obj.y - 40, 'smoke', {
                    vx: rand(-0.5, 0.5), vy: -rand(1, 2), decay: 0.01, size: rand(10, 20)
                }));
            }
        }
    });

    if (particles.length < 50 && Math.random() < 0.05) spawnFirefly();

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, width, height);

    // 1. SKY GRADIENT
    const skyGrad = ctx.createLinearGradient(0, 0, 0, height);
    skyGrad.addColorStop(0, '#1a0a2e'); // Deep Indigo
    skyGrad.addColorStop(0.5, '#4a1e3c'); // Dusty Rose
    skyGrad.addColorStop(0.8, '#d35400'); // Burnt Amber
    skyGrad.addColorStop(1, '#ff8c42'); // Coral
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    const shakeX = (Math.random() - 0.5) * camera.shake;
    const shakeY = (Math.random() - 0.5) * camera.shake;
    ctx.translate(-camera.x + shakeX, shakeY);

    // 2. PARALLAX LAYERS (simplified for performance)
    drawParallax(0.1, '#11081a', 150);
    drawParallax(0.25, '#1a0f26', 100);
    drawParallax(0.5, '#0d0d0d', 50);

    // 3. WORLD OBJECTS
    objects.forEach(obj => {
        if (obj.x > camera.x - 200 && obj.x < camera.x + width + 200) {
            obj.draw(ctx, lastTime * 0.001);
        }
    });

    // 4. PARTICLES
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        if (p.type === 'projectile') {
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 15);
            g.addColorStop(0, '#fff');
            g.addColorStop(0.4, '#ffaa00');
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, Math.PI*2); ctx.fill();
        } else if (p.type === 'ember') {
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(p.x, p.y, p.size, p.size);
        } else if (p.type === 'leaf') {
            ctx.fillStyle = '#000';
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size/2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        } else if (p.type === 'smoke') {
            ctx.fillStyle = 'rgba(20, 20, 20, 0.4)';
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (2-p.life), 0, Math.PI*2); ctx.fill();
        } else if (p.type === 'firefly') {
            const glow = Math.sin(lastTime * 0.002 + p.x) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(200, 255, 100, ${glow * p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        }
    });

    // 5. PLAYER
    player.draw(ctx);

    // 6. BLOOMS (Explosions)
    blooms.forEach(b => {
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 200 * (1-b.life));
        g.addColorStop(0, `rgba(255, 200, 50, ${b.life * 0.5})`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.globalCompositeOperation = 'screen';
        ctx.beginPath(); ctx.arc(b.x, b.y, 200 * (1-b.life), 0, Math.PI*2); ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
    });

    ctx.restore();

    // 7. GROUND (Foreground)
    ctx.fillStyle = '#000';
    ctx.fillRect(0, groundY, width, height - groundY);
}

function drawParallax(speed, color, hOffset) {
    ctx.save();
    ctx.translate(camera.x * (1 - speed), 0);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(camera.x - 100, height);
    for (let x = camera.x - 100; x < camera.x + width + 100; x += 100) {
        const y = groundY - hOffset + Math.sin(x * 0.002 * speed) * 50;
        ctx.lineTo(x, y);
    }
    ctx.lineTo(camera.x + width + 100, height);
    ctx.fill();
    ctx.restore();
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    groundY = height - 80;
}

window.addEventListener('resize', resize);
resize();
initWorld();
requestAnimationFrame(update);

</script>
</body>
</html>
