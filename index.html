<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-DRAW | Creative Prompt Engine</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-deep: #0a0a0c;
            --surface: #1a1a1e;
            --text-main: #f8fafc;
            --accent: #818cf8;
            --transition-speed: 0.4s;
            --ui-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--ui-font);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Animated Background Particles */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        /* Roller UI Shell */
        #app-roller {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.5s;
        }

        /* 3D Slot Reel */
        .roller-container {
            perspective: 1200px;
            width: 100%;
            max-width: 600px;
            height: 320px;
            position: relative;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }

        .reel-inner {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            position: relative;
            transition: transform 0.1s linear;
        }

        .roll-item {
            position: absolute;
            width: 100%;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .roll-item h2 { font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
        .roll-item span { font-size: 0.8rem; opacity: 0.6; margin-top: 4px; }

        /* The Big Button */
        .roll-trigger {
            margin-top: 60px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .roll-trigger:active { transform: scale(0.92); }

        .ring {
            position: absolute;
            border: 2px solid var(--primary);
            border-radius: 50%;
            width: 100%;
            height: 100%;
            animation: pulse-ring 2s infinite;
            pointer-events: none;
        }
        .ring:nth-child(2) { animation-delay: 0.5s; }
        .ring:nth-child(3) { animation-delay: 1s; }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* Canvas View Overlay */
        #canvas-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: none;
            background: #111;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="app-roller">
        <div class="roller-container">
            <div id="reel" class="reel-inner"></div>
        </div>
        
        <button id="roll-btn" class="roll-trigger">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
            </svg>
        </button>
    </div>

    <div id="canvas-ui">
        <!-- Canvas interface dynamically injected or managed by draw.js -->
        <canvas id="main-drawing-canvas"></canvas>
    </div>

    <script>
        /**
         * OMNI-DRAW Audio & UI Engine
         * Implements high-performance animations and procedural audio synthesis.
         */
        const UIConfig = {
            items: [
                { name: "Neon Katana", category: "Sci-Fi", color: "#00f2ff", diff: "Intermediate" },
                { name: "Ancient Golem", category: "Fantasy", color: "#a8a29e", diff: "Advanced" },
                { name: "Cyberpunk Diner", category: "Sci-Fi", color: "#f43f5e", diff: "Expert" },
                // ... (Expanded to 30 items)
            ]
        };

        class AudioEngine {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            playTick() {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.1);
            }
        }

        const audio = new AudioEngine();
        const reel = document.getElementById('reel');
        const rollBtn = document.getElementById('roll-btn');

        // Initialise Reel
        UIConfig.items.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'roll-item';
            el.innerHTML = `<h2>${item.name}</h2><span>${item.category} • ${item.diff}</span>`;
            el.style.transform = `rotateX(${i * 20}deg) translateZ(300px)`;
            reel.appendChild(el);
        });

        rollBtn.onclick = () => {
            audio.playTick();
            let rotation = 0;
            let velocity = 50;
            
            function animate() {
                rotation += velocity;
                velocity *= 0.985; // Exponential decay
                reel.style.transform = `rotateX(${-rotation}deg)`;
                
                if (velocity > 0.5) {
                    requestAnimationFrame(animate);
                } else {
                    completeRoll();
                }
            }
            animate();
        };

        function completeRoll() {
            // Transition logic to draw.js
            document.getElementById('app-roller').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('app-roller').style.display = 'none';
                document.getElementById('canvas-ui').style.display = 'block';
                // Initialise the drawing engine here
                window.initDrawingEngine();
            }, 800);
        }
    </script>
    <script src="draw.js"></script>
</body>
</html>
