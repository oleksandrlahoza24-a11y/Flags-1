<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Void-Hook: The Rolling Knight</title>
    <style>
        :root {
            --hk-blue: #1a1f2c;
            --hk-glow: #7ee7ff;
            --hk-white: #e0faff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevents iPad gestures from interfering */
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            user-select: none;
        }

        .game-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--hk-white);
            pointer-events: auto;
            transition: opacity 0.5s ease;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px var(--hk-glow);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--hk-glow);
            color: var(--hk-white);
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .btn:active {
            background: var(--hk-glow);
            color: var(--hk-blue);
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--hk-glow);
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(126, 231, 255, 0.5);
        }

        /* Touch Instruction Overlays */
        .touch-hint {
            position: absolute;
            bottom: 40px;
            color: var(--hk-glow);
            opacity: 0.4;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud">DISTANCE: 0m</div>

        <!-- Start Screen -->
        <div id="menu-screen" class="game-state">
            <h1>VOID HOOK</h1>
            <p>Roll through the abyss. Hook to the lanterns.</p>
            <button class="btn" onclick="startGame()">ENTER THE VOID</button>
            <div style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">
                LEFT SCREEN: MOVE | RIGHT SCREEN: HOOK
            </div>
        </div>

        <!-- Death Screen -->
        <div id="death-screen" class="game-state hidden">
            <h1>LOST</h1>
            <p id="final-score">Distance: 0m</p>
            <button class="btn" onclick="startGame()">RETRY</button>
        </div>

        <div class="touch-hint" style="left: 40px;">[ ROLL ]</div>
        <div class="touch-hint" style="right: 40px;">[ HOOK ]</div>
    </div>

<script>
/**
 * VOID-HOOK GAME ENGINE
 * A production-ready implementation of a physics-based "rolling" platformer.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

// --- CONFIGURATION ---
const CONFIG = {
    GRAVITY: 0.5,
    FRICTION: 0.98,
    ROLL_ACCEL: 0.8,
    MAX_ROLL_SPEED: 8,
    HOOK_FORCE: 1.2,
    MAX_HOOK_RANGE: 450,
    PLAYER_SIZE: 36,
    CHUNK_WIDTH: 1200,
    COLORS: {
        bgTop: '#0a0d14',
        bgBottom: '#1a1f2c',
        player: '#ffffff',
        accent: '#7ee7ff',
        ground: '#020205'
    }
};

// --- GAME STATE ---
let gameState = 'MENU';
let camera = { x: 0, y: 0 };
let score = 0;
let chunks = [];
let particles = [];
let lastTime = 0;

// --- INPUT HANDLING ---
const input = {
    leftSide: false, // For rolling
    rightSide: false, // For hooking
    touchX: 0,
    touchY: 0,
    moveDir: 0
};

// Event Listeners for iPad
window.addEventListener('touchstart', handleTouchStart, { passive: false });
window.addEventListener('touchmove', handleTouchMove, { passive: false });
window.addEventListener('touchend', handleTouchEnd, { passive: false });

function handleTouchStart(e) {
    e.preventDefault();
    for (let t of e.changedTouches) {
        if (t.clientX < window.innerWidth / 2) {
            input.leftSide = true;
            updateMoveDir(t.clientX);
        } else {
            input.rightSide = true;
            input.touchX = t.clientX;
            input.touchY = t.clientY;
            player.tryHook();
        }
    }
}

function handleTouchMove(e) {
    e.preventDefault();
    for (let t of e.changedTouches) {
        if (t.clientX < window.innerWidth / 2) {
            updateMoveDir(t.clientX);
        } else {
            input.touchX = t.clientX;
            input.touchY = t.clientY;
        }
    }
}

function handleTouchEnd(e) {
    for (let t of e.changedTouches) {
        if (t.clientX < window.innerWidth / 2) {
            input.leftSide = false;
            input.moveDir = 0;
        } else {
            input.rightSide = false;
            player.releaseHook();
        }
    }
}

function updateMoveDir(x) {
    // Relative to the left half center
    const center = window.innerWidth / 4;
    input.moveDir = x < center ? -1 : 1;
}

// --- CLASSES ---

class Particle {
    constructor(x, y, color, size = 2) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.color = color;
        this.size = Math.random() * size + 1;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.02;
    }

    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillRect(this.x - camera.x, this.y - camera.y, this.size, this.size);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }
}

class Player {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = 200;
        this.y = 200;
        this.vx = 0;
        this.vy = 0;
        this.rotation = 0;
        this.hookPoint = null;
        this.radius = CONFIG.PLAYER_SIZE / 2;
        this.onGround = false;
        this.isDead = false;
    }

    update() {
        if (this.isDead) return;

        // Apply Horizontal Movement (Rolling)
        if (input.leftSide) {
            this.vx += input.moveDir * CONFIG.ROLL_ACCEL;
        }
        this.vx *= CONFIG.FRICTION;

        // Apply Gravity
        this.vy += CONFIG.GRAVITY;

        // Hook Physics
        if (this.hookPoint) {
            const dx = this.hookPoint.x - this.x;
            const dy = this.hookPoint.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            // Pull towards hook
            this.vx += (dx / dist) * CONFIG.HOOK_FORCE;
            this.vy += (dy / dist) * CONFIG.HOOK_FORCE;

            // Spawn rope particles
            if (Math.random() > 0.8) {
                particles.push(new Particle(this.x + Math.random()*10, this.y + Math.random()*10, CONFIG.COLORS.accent, 1));
            }
        }

        // Limit speed
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (speed > 25) { // Terminal velocity
            this.vx *= 0.95;
            this.vy *= 0.95;
        }

        // Update Position
        this.x += this.vx;
        this.y += this.vy;

        // Rotate based on horizontal movement (Rolling effect)
        this.rotation += this.vx * 0.05;

        // Collision with Terrain
        this.checkCollisions();

        // Check Death (falling out of world)
        if (this.y > 1500) {
            this.die();
        }
    }

    checkCollisions() {
        this.onGround = false;
        
        // Simple bounding box collisions with platforms in chunks
        chunks.forEach(chunk => {
            chunk.platforms.forEach(p => {
                // Check if player is within platform horizontal bounds
                if (this.x + this.radius > p.x && this.x - this.radius < p.x + p.w) {
                    // Check if player is hitting the top of the platform
                    if (this.y + this.radius > p.y && this.y - this.radius < p.y + p.h) {
                        // Collision response
                        if (this.vy > 0 && this.y < p.y) { // Landing
                            this.y = p.y - this.radius;
                            this.vy *= -0.2; // Small bounce
                            this.onGround = true;
                        } else if (this.vy < 0 && this.y > p.y + p.h) { // Hit ceiling
                            this.y = p.y + p.h + this.radius;
                            this.vy = 0;
                        } else { // Hit side
                             this.vx *= -0.5;
                             this.x = (this.x < p.x) ? p.x - this.radius : p.x + p.w + this.radius;
                        }
                    }
                }
            });
        });
    }

    tryHook() {
        // Find nearest grapple point (Lantern)
        let nearest = null;
        let minDist = CONFIG.MAX_HOOK_RANGE;

        // Convert touch to world coords
        const worldTouchX = input.touchX + camera.x;
        const worldTouchY = input.touchY + camera.y;

        chunks.forEach(chunk => {
            chunk.points.forEach(pt => {
                const dx = pt.x - worldTouchX;
                const dy = pt.y - worldTouchY;
                const distToTouch = Math.sqrt(dx * dx + dy * dy);
                
                // If we tapped near a point
                if (distToTouch < 100) {
                    const pdx = pt.x - this.x;
                    const pdy = pt.y - this.y;
                    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                    
                    if (pdist < minDist) {
                        minDist = pdist;
                        nearest = pt;
                    }
                }
            });
        });

        if (nearest) {
            this.hookPoint = nearest;
            // Impact effect
            for(let i=0; i<5; i++) particles.push(new Particle(nearest.x, nearest.y, CONFIG.COLORS.accent, 3));
        }
    }

    releaseHook() {
        this.hookPoint = null;
    }

    die() {
        if (this.isDead) return;
        this.isDead = true;
        for(let i=0; i<30; i++) particles.push(new Particle(this.x, this.y, '#fff', 4));
        setTimeout(() => endGame(), 1000);
    }

    draw() {
        if (this.isDead) return;

        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);
        
        // Draw Hook Line
        if (this.hookPoint) {
            ctx.restore(); ctx.save();
            ctx.beginPath();
            ctx.moveTo(this.x - camera.x, this.y - camera.y);
            ctx.lineTo(this.hookPoint.x - camera.x, this.hookPoint.y - camera.y);
            ctx.strokeStyle = CONFIG.COLORS.accent;
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore(); ctx.save();
            ctx.translate(this.x - camera.x, this.y - camera.y);
        }

        ctx.rotate(this.rotation);

        // Draw the Cube (The Knight)
        ctx.fillStyle = CONFIG.COLORS.ground;
        ctx.strokeStyle = CONFIG.COLORS.player;
        ctx.lineWidth = 3;
        ctx.fillRect(-this.radius, -this.radius, CONFIG.PLAYER_SIZE, CONFIG.PLAYER_SIZE);
        ctx.strokeRect(-this.radius, -this.radius, CONFIG.PLAYER_SIZE, CONFIG.PLAYER_SIZE);

        // Eyes (Hollow Knight Style)
        ctx.fillStyle = CONFIG.COLORS.player;
        ctx.beginPath();
        ctx.ellipse(-8, -4, 4, 6, 0, 0, Math.PI * 2);
        ctx.ellipse(8, -4, 4, 6, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

// --- WORLD GENERATION ---

class Chunk {
    constructor(x) {
        this.x = x;
        this.platforms = [];
        this.points = []; // Grapple points
        this.generate();
    }

    generate() {
        const floorY = 600;
        // Basic ground
        this.platforms.push({
            x: this.x,
            y: floorY + Math.random() * 200,
            w: CONFIG.CHUNK_WIDTH,
            h: 500
        });

        // Floating platforms
        for (let i = 0; i < 3; i++) {
            this.platforms.push({
                x: this.x + (i * 400) + Math.random() * 100,
                y: 300 + Math.random() * 200,
                w: 150 + Math.random() * 100,
                h: 40
            });
        }

        // Hook points (Lanterns)
        for (let i = 0; i < 4; i++) {
            this.points.push({
                x: this.x + (i * 300) + 150,
                y: 100 + Math.random() * 200
            });
        }
    }

    draw() {
        ctx.fillStyle = CONFIG.COLORS.ground;
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#000';

        this.platforms.forEach(p => {
            ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, p.h);
            // Detail line on top
            ctx.strokeStyle = '#2a2e3a';
            ctx.lineWidth = 2;
            ctx.strokeRect(p.x - camera.x, p.y - camera.y, p.w, 2);
        });

        this.points.forEach(pt => {
            // Draw Lantern
            ctx.shadowBlur = 20;
            ctx.shadowColor = CONFIG.COLORS.accent;
            ctx.fillStyle = CONFIG.COLORS.accent;
            ctx.beginPath();
            ctx.arc(pt.x - camera.x, pt.y - camera.y, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Lantern Cage
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(pt.x - camera.x - 10, pt.y - camera.y - 10, 20, 20);
        });
    }
}

// --- CORE ENGINE ---

const player = new Player();

function startGame() {
    gameState = 'PLAYING';
    score = 0;
    player.reset();
    chunks = [new Chunk(0), new Chunk(CONFIG.CHUNK_WIDTH)];
    particles = [];
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('death-screen').classList.add('hidden');
    requestAnimationFrame(gameLoop);
}

function endGame() {
    gameState = 'GAMEOVER';
    document.getElementById('death-screen').classList.remove('hidden');
    document.getElementById('final-score').innerText = `Distance Reached: ${Math.floor(score)}m`;
}

function update(dt) {
    if (gameState !== 'PLAYING') return;

    player.update();

    // Camera follow
    camera.x += (player.x - camera.x - canvas.width * 0.3) * 0.1;
    camera.y += (player.y - camera.y - canvas.height * 0.6) * 0.1;

    // Procedural generation logic
    const currentChunkIndex = Math.floor(player.x / CONFIG.CHUNK_WIDTH);
    if (chunks[chunks.length - 1].x < player.x + canvas.width) {
        chunks.push(new Chunk(chunks[chunks.length - 1].x + CONFIG.CHUNK_WIDTH));
    }
    // Cleanup old chunks
    if (chunks.length > 5) chunks.shift();

    // Update particles
    particles.forEach((p, i) => {
        p.update();
        if (p.life <= 0) particles.splice(i, 1);
    });

    // Score based on distance
    if (player.x > score) score = player.x;
    hud.innerText = `DISTANCE: ${Math.floor(score / 10)}m`;
}

function draw() {
    // Clear & Background Gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, CONFIG.COLORS.bgTop);
    grad.addColorStop(1, CONFIG.COLORS.bgBottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Parallax background elements
    ctx.fillStyle = "rgba(255,255,255,0.03)";
    for(let i=0; i<20; i++) {
        let px = (i * 400 - (camera.x * 0.2)) % (canvas.width + 400);
        ctx.fillRect(px, 100 + (i*50), 100, 300);
    }

    // Draw world
    chunks.forEach(chunk => chunk.draw());
    
    // Draw particles
    particles.forEach(p => p.draw());

    // Draw player
    player.draw();

    // Post-processing: Vignette
    const vig = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,0.7)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function gameLoop(time) {
    if (gameState === 'GAMEOVER') return;
    
    const dt = time - lastTime;
    lastTime = time;

    update(dt);
    draw();

    requestAnimationFrame(gameLoop);
}

// Handle resizing for iPad rotation
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Initialization
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
draw(); // Draw initial frame

</script>
</body>
</html>
