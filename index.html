<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel 3D Rock & Cotton</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { 
            image-rendering: pixelated; /* Makes the low-res render look sharp */
            display: block; 
            width: 100vw !important; 
            height: 100vh !important; 
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 0px #000;
            pointer-events: none;
            font-size: 18px;
        }

        /* Inventory Bar */
        #inventory {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border: 4px solid #fff;
            border-radius: 0px;
        }

        .inv-slot {
            width: 60px;
            height: 60px;
            background: #444;
            border: 2px solid #888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
            cursor: pointer;
            touch-action: manipulation;
        }

        .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: white;
            font-size: 14px;
            pointer-events: none;
        }

        #eat-msg {
            position: absolute;
            top: -40px;
            width: 100%;
            text-align: center;
            color: #2ecc71;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        ROCKS: <span id="rockScore">0</span><br>
        COTTON: <span id="cottonScore">0</span>
    </div>

    <div id="inventory">
        <div id="eat-msg">YUM! +HEALTH</div>
        <div class="inv-slot" onclick="eatWatermelon()">
            🍉
            <span class="count" id="wmCount">5</span>
        </div>
        <div class="inv-slot">⛏️</div>
        <div class="inv-slot">🧺</div>
    </div>

    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- GAME STATE ---
        let rocksBroken = 0;
        let cottonPicked = 0;
        let watermelons = 5;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        // Low resolution for "Pixel" effect
        const pixelScale = 4; 
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth / pixelScale, window.innerHeight / pixelScale, false);
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 8, 10);
        camera.lookAt(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // Ground (Pixel Grass)
        const groundGeo = new THREE.BoxGeometry(20, 1, 20);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x2ecc71 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -0.5;
        scene.add(ground);

        const gameObjects = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // --- FACTORIES ---

        function createRock(x, z) {
            const group = new THREE.Group();
            const color = 0x7f8c8d;
            const mat = new THREE.MeshLambertMaterial({ color });
            
            // Random blocky rock shape
            for(let i=0; i<3; i++) {
                const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), mat);
                box.position.set(Math.random()*0.4, Math.random()*0.4, Math.random()*0.4);
                group.add(box);
            }
            
            group.position.set(x, 0.4, z);
            group.userData = { type: 'rock', health: 3 };
            scene.add(group);
            gameObjects.push(group);
        }

        function createCotton(x, z) {
            const group = new THREE.Group();
            
            // Stem
            const stem = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.1), new THREE.MeshLambertMaterial({color: 0x27ae60}));
            group.add(stem);
            
            // Cotton Top
            const puff = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.6), new THREE.MeshLambertMaterial({color: 0xffffff}));
            puff.position.y = 0.5;
            group.add(puff);

            group.position.set(x, 0.4, z);
            group.userData = { type: 'cotton', health: 1 };
            scene.add(group);
            gameObjects.push(group);
        }

        // Spawn initial items
        for(let i=0; i<8; i++) {
            createRock(Math.random()*14 - 7, Math.random()*14 - 7);
            createCotton(Math.random()*14 - 7, Math.random()*14 - 7);
        }

        // --- INTERACTION ---

        function onTouch(event) {
            // Get touch/mouse coordinates
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(gameObjects, true);

            if (intersects.length > 0) {
                // Find the parent group (the object)
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.type) {
                    obj = obj.parent;
                }

                if(obj.userData.type) {
                    handleHit(obj);
                }
            }
        }

        function handleHit(obj) {
            obj.userData.health--;
            
            // Visual feedback (jiggle)
            obj.scale.set(1.2, 1.2, 1.2);
            setTimeout(() => obj.scale.set(1, 1, 1), 100);

            if (obj.userData.health <= 0) {
                if(obj.userData.type === 'rock') {
                    rocksBroken++;
                    document.getElementById('rockScore').innerText = rocksBroken;
                    spawnNew('rock');
                } else {
                    cottonPicked++;
                    document.getElementById('cottonScore').innerText = cottonPicked;
                    spawnNew('cotton');
                }
                scene.remove(obj);
                gameObjects.splice(gameObjects.indexOf(obj), 1);
            }
        }

        function spawnNew(type) {
            setTimeout(() => {
                if(type === 'rock') createRock(Math.random()*14 - 7, Math.random()*14 - 7);
                else createCotton(Math.random()*14 - 7, Math.random()*14 - 7);
            }, 2000);
        }

        // --- INVENTORY LOGIC ---

        window.eatWatermelon = function() {
            if (watermelons > 0) {
                watermelons--;
                document.getElementById('wmCount').innerText = watermelons;
                
                // Show feedback
                const msg = document.getElementById('eat-msg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 1000);
                
                // Visual effect on camera
                camera.position.y -= 0.2;
                setTimeout(() => camera.position.y += 0.2, 100);
            }
        }

        window.addEventListener('touchstart', onTouch, false);
        window.addEventListener('mousedown', onTouch, false);

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth / pixelScale, window.innerHeight / pixelScale, false);
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Slow rotation of objects to look "fancy"
            gameObjects.forEach(obj => {
                obj.rotation.y += 0.01;
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
