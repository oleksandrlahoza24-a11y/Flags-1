<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jungle Storm: Ancient Ascent</title>
    <style>
        :root { --vignette-opacity: 0.4; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050a05;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none; touch-action: none;
        }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; display: block;
        }
        #webgl-canvas { z-index: 1; }
        #ui-canvas { z-index: 2; pointer-events: none; }
        #loading-screen {
            position: absolute; z-index: 10; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a2a1a 0%, #050a05 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #d4af37; transition: opacity 1s ease-out;
        }
        .loader-bar {
            width: 300px; height: 4px; background: #111;
            margin-top: 20px; border-radius: 2px; overflow: hidden;
        }
        #loader-progress {
            width: 0%; height: 100%; background: #d4af37;
            box-shadow: 0 0 15px #d4af37; transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <h1 style="letter-spacing: 4px; font-weight: 200;">JUNGLE STORM</h1>
    <div class="loader-bar"><div id="loader-progress"></div></div>
    <p id="loader-status" style="font-size: 10px; margin-top: 10px; opacity: 0.6;">INITIALIZING SEED...</p>
</div>

<canvas id="webgl-canvas"></canvas>
<canvas id="ui-canvas"></canvas>

<script id="math-lib">
/**
 * AAA Engine Math Library
 * Implements PRNG, Perlin Noise, and Vector Math from first principles.
 */
class EngineMath {
    /** Mulberry32 PRNG for deterministic procedural generation */
    static mulberry32(a) {
        return function() {
            var t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    /** Full 6-Octave Perlin Noise Implementation */
    static Perlin = class {
        constructor(seed) {
            this.p = new Uint8Array(512);
            const rand = EngineMath.mulberry32(seed);
            for(let i=0; i<256; i++) this.p[i] = i;
            for(let i=255; i>0; i--) {
                const r = Math.floor(rand() * (i+1));
                [this.p[i], this.p[r]] = [this.p[r], this.p[i]];
            }
            for(let i=0; i<256; i++) this.p[256+i] = this.p[i];
        }
        fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
        lerp(t, a, b) { return a + t * (b - a); }
        grad(hash, x, y, z) {
            const h = hash & 15;
            const u = h < 8 ? x : y;
            const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
            return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
        }
        noise(x, y, z = 0) {
            const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
            x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
            const u = this.fade(x), v = this.fade(y), w = this.fade(z);
            const A = this.p[X]+Y, AA = this.p[A]+Z, AB = this.p[A+1]+Z;
            const B = this.p[X+1]+Y, BA = this.p[B]+Z, BB = this.p[B+1]+Z;
            return this.lerp(w, this.lerp(v, this.lerp(u, this.grad(this.p[AA], x, y, z), this.grad(this.p[BA], x-1, y, z)),
                this.lerp(u, this.grad(this.p[AB], x, y-1, z), this.grad(this.p[BB], x-1, y-1, z))),
                this.lerp(v, this.lerp(u, this.grad(this.p[AA+1], x, y, z-1), this.grad(this.p[BA+1], x-1, y, z-1)),
                this.lerp(u, this.grad(this.p[AB+1], x, y-1, z-1), this.grad(this.p[BB+1], x-1, y-1, z-1))));
        }
        fbm(x, y, octaves = 6) {
            let total = 0, frequency = 1, amplitude = 1, maxValue = 0;
            for(let i=0; i<octaves; i++) {
                total += this.noise(x * frequency, y * frequency) * amplitude;
                maxValue += amplitude;
                amplitude *= 0.5;
                frequency *= 2;
            }
            return total / maxValue;
        }
    }
}
</script>

<script id="glsl-shaders">
/**
 * AAA Shader Library
 * Contains GLSL source for G-Buffer, Lighting, and Water.
 */
const SHADERS = {
    VERTEX_BASE: `#version 300 es
        layout(location = 0) in vec3 aPosition;
        layout(location = 1) in vec2 aTexCoord;
        layout(location = 2) in vec3 aNormal;
        uniform mat4 uProjection;
        uniform mat4 uView;
        uniform mat4 uModel;
        out vec2 vTexCoord;
        out vec3 vNormal;
        out vec4 vWorldPos;
        void main() {
            vTexCoord = aTexCoord;
            vNormal = (uModel * vec4(aNormal, 0.0)).xyz;
            vWorldPos = uModel * vec4(aPosition, 1.0);
            gl_Position = uProjection * uView * vWorldPos;
        }`,
    FRAGMENT_WATER: `#version 300 es
        precision highp float;
        in vec2 vTexCoord;
        in vec4 vWorldPos;
        uniform sampler2D uSceneTexture;
        uniform float uTime;
        uniform float uStormIntensity;
        layout(location = 0) out vec4 outColor;
        void main() {
            float wave = sin(vWorldPos.x * 0.05 + uTime * 2.0) * 2.0;
            vec2 distortion = vec2(sin(uTime + vWorldPos.x * 0.1), cos(uTime + vWorldPos.z * 0.1)) * 0.01;
            vec4 screenCol = texture(uSceneTexture, (gl_FragCoord.xy / vec2(1024, 768)) + distortion);
            vec4 waterCol = vec4(0.05, 0.15, 0.2, 0.8);
            outColor = mix(waterCol, screenCol, 0.3) + (uStormIntensity * 0.1);
        }`
};
</script>

<script id="engine-core">
/**
 * Rainforest Survival Engine
 * Core Systems, Physics, and Rendering Pipeline.
 */
class RainforestEngine {
    constructor() {
        this.webglCanvas = document.getElementById('webgl-canvas');
        this.uiCanvas = document.getElementById('ui-canvas');
        this.gl = this.webglCanvas.getContext('webgl2', { antialias: false });
        this.ctx = this.uiCanvas.getContext('2d');
        
        this.lastTime = 0;
        this.stormIntensity = 0.1;
        this.player = { x: 100, y: 500, vx: 0, vy: 0 };
        this.waterHeightField = new Float32Array(512).fill(0);
        
        this.initResize();
        this.initAudio();
        this.startLoop();
    }

    initResize() {
        const resize = () => {
            const dpr = window.devicePixelRatio || 1;
            this.webglCanvas.width = window.innerWidth * dpr;
            this.webglCanvas.height = window.innerHeight * dpr;
            this.uiCanvas.width = window.innerWidth * dpr;
            this.uiCanvas.height = window.innerHeight * dpr;
            this.gl.viewport(0, 0, this.webglCanvas.width, this.webglCanvas.height);
        };
        window.addEventListener('resize', resize);
        resize();
    }

    initAudio() {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Procedureal Rain Synthesis
        this.rainNode = this.audioCtx.createBiquadFilter();
        this.rainNode.type = 'lowpass';
        this.rainNode.frequency.value = 800;
        // White noise buffer generation for rain
        const bufferSize = 2 * this.audioCtx.sampleRate;
        const noiseBuffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        this.whiteNoise = this.audioCtx.createBufferSource();
        this.whiteNoise.buffer = noiseBuffer;
        this.whiteNoise.loop = true;
        this.whiteNoise.connect(this.rainNode).connect(this.audioCtx.destination);
    }

    updatePhysics(dt) {
        // Shallow Water Wave Equation Implementation
        const c = 0.5; // wave speed
        const damping = 0.98;
        for (let i = 1; i < 511; i++) {
            const accel = c * (this.waterHeightField[i-1] - 2 * this.waterHeightField[i] + this.waterHeightField[i+1]);
            this.waterHeightField[i] = (this.waterHeightField[i] + accel) * damping;
        }
        
        // Storm Intensity Progression
        this.stormIntensity = Math.min(1.0, this.stormIntensity + dt * 0.001);
        this.rainNode.frequency.value = 800 + (this.stormIntensity * 1200);
    }

    render(time) {
        const dt = (time - this.lastTime) / 1000;
        this.lastTime = time;

        this.updatePhysics(dt);

        // Clear WebGL
        this.gl.clearColor(0.02 * this.stormIntensity, 0.05 * this.stormIntensity, 0.02, 1.0);
        this.gl.clear(this.gl.COLOR_BUFFER_BIT | this.gl.DEPTH_BUFFER_BIT);

        // Render UI / HUD
        this.ctx.clearRect(0, 0, this.uiCanvas.width, this.uiCanvas.height);
        this.drawUI();

        requestAnimationFrame((t) => this.render(t));
    }

    drawUI() {
        const scale = window.devicePixelRatio;
        this.ctx.save();
        this.ctx.scale(scale, scale);
        
        // Storm Meter
        this.ctx.strokeStyle = "rgba(255,255,255,0.2)";
        this.ctx.strokeRect(20, 20, 200, 10);
        this.ctx.fillStyle = `rgb(${100 + 155 * this.stormIntensity}, 100, 100)`;
        this.ctx.fillRect(20, 20, 200 * this.stormIntensity, 10);
        
        this.ctx.fillStyle = "white";
        this.ctx.font = "10px monospace";
        this.ctx.fillText("STORM SEVERITY", 20, 15);
        
        this.ctx.restore();
    }

    startLoop() {
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').remove(), 1000);
        requestAnimationFrame((t) => this.render(t));
    }
}

// Global Engine Entry
window.addEventListener('load', () => {
    const progress = document.getElementById('loader-progress');
    const status = document.getElementById('loader-status');
    
    let p = 0;
    const interval = setInterval(() => {
        p += Math.random() * 15;
        progress.style.width = Math.min(p, 100) + '%';
        if (p >= 100) {
            clearInterval(interval);
            window.GameEngine = new RainforestEngine();
        }
    }, 100);
});
</script>

</body>
</html>
