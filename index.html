<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Custom AI</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 450px; height: 70vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #334155; }
        #header { padding: 20px; background: #0ea5e9; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; text-align: center; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; animation: slide 0.3s ease-out; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 2px; border: 1px solid #475569; }
        #input-form { display: flex; padding: 15px; background: #1e293b; border-top: 1px solid #334155; gap: 10px; }
        #user-input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px 18px; border-radius: 30px; outline: none; }
        #user-input:focus { border-color: var(--accent); }
        button { background: var(--accent); border: none; color: white; padding: 0 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .status { font-size: 0.7rem; color: #64748b; padding: 5px 20px; text-align: center; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">BrainJS-Custom v1.0 (Generative)</div>
    <div id="chat-window">
        <div class="msg ai">Systems initialized. I am ready to learn. Talk to me!</div>
    </div>
    <div class="status" id="brain-size">Brain Knowledge: 0 links</div>
    <form id="input-form">
        <input type="text" id="user-input" placeholder="Type something to teach me..." autocomplete="off">
        <button type="submit">Send</button>
    </form>
</div>

<script src="ai-model.js"></script>
<script>
    const chat = document.getElementById('chat-window');
    const form = document.getElementById('input-form');
    const input = document.getElementById('user-input');
    const brainInfo = document.getElementById('brain-size');

    function updateBrainInfo() {
        brainInfo.innerText = `Brain Knowledge: ${CustomAI.getStats()} associations`;
    }

    form.onsubmit = (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        // Add user message
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.innerText = text;
        chat.appendChild(userDiv);
        
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        // Process and Respond
        setTimeout(() => {
            const response = CustomAI.generateResponse(text);
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai';
            aiDiv.innerText = response;
            chat.appendChild(aiDiv);
            chat.scrollTop = chat.scrollHeight;
            updateBrainInfo();
        }, 600);
    };

    updateBrainInfo();
</script>
</body>
</html>
