<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SakugaFlow | Professional Anime Studio</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-color: #2d2d2d;
            --accent-color: #0078d4;
            --text-color: #e0e0e0;
            --border-color: #444;
            --active-color: #ffca28;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Header */
        header {
            height: 40px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            justify-content: space-between;
        }

        .logo { font-weight: bold; color: var(--active-color); letter-spacing: 1px; }

        /* Main Workspace */
        #main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar Tools */
        #toolbar {
            width: 60px;
            background: var(--panel-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap: 15px;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            background: #3d3d3d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: all 0.2s;
        }

        .tool-btn:hover { background: #555; }
        .tool-btn.active { background: var(--accent-color); border-color: white; }

        /* Canvas Area */
        #viewport {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            position: relative;
            outline: none;
            cursor: crosshair;
        }

        #canvas-stack {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: white; /* Paper color */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: pixelated;
        }

        /* Properties Panel */
        #props-panel {
            width: 240px;
            background: var(--panel-color);
            border-left: 1px solid var(--border-color);
            padding: 15px;
            font-size: 13px;
        }

        .prop-group { margin-bottom: 20px; }
        .prop-group label { display: block; margin-bottom: 5px; color: #888; }

        /* Timeline Area */
        #timeline-container {
            height: 180px;
            background: var(--panel-color);
            border-top: 2px solid #111;
            display: flex;
            flex-direction: column;
        }

        #timeline-controls {
            height: 40px;
            background: #252525;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        #frame-strip {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 5px;
            background: #1a1a1a;
        }

        .frame-thumb {
            min-width: 80px;
            height: 45px;
            background: #333;
            border: 2px solid #444;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: #777;
        }

        .frame-thumb.active { border-color: var(--active-color); background: #444; color: white; }

        /* Feedback Notifications */
        #toast {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        /* Layer List */
        .layer-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: #383838;
            margin-bottom: 4px;
            border-radius: 3px;
            cursor: pointer;
        }
        .layer-item.active { background: var(--accent-color); }
        .layer-item span { flex: 1; margin-left: 10px; }

        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

<header>
    <div class="logo">SAKUGA FLOW Pro v1.0</div>
    <div class="menu-bar">
        <button onclick="app.exportProject()">Export Project</button>
        <button onclick="app.clearProject()" style="color: #ff6b6b;">New Project</button>
    </div>
</header>

<div id="main-container">
    <div id="toolbar">
        <div class="tool-btn active" data-tool="brush" title="Brush (B)">🖌️</div>
        <div class="tool-btn" data-tool="eraser" title="Eraser (E)">🧽</div>
        <div class="tool-btn" data-tool="picker" title="Color Picker (P)">🧪</div>
        <div style="margin-top: auto; padding-bottom: 20px;">
            <div class="tool-btn" onclick="app.undo()" title="Undo (Ctrl+Z)">↩️</div>
        </div>
    </div>

    <div id="viewport" tabindex="0">
        <div id="canvas-stack">
            <!-- Layers will be injected here by JS -->
        </div>
    </div>

    <div id="props-panel">
        <div class="prop-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#000000">
        </div>
        <div class="prop-group">
            <label>Brush Size (<span id="sizeVal">5</span>px)</label>
            <input type="range" id="sizeSlider" min="1" max="50" value="5">
        </div>
        <div class="prop-group">
            <label>Layers</label>
            <div id="layer-list">
                <div class="layer-item active" data-layer="2"><span>Lineart (Main)</span></div>
                <div class="layer-item" data-layer="1"><span>Color (Base)</span></div>
                <div class="layer-item" data-layer="0"><span>Sketch (Rough)</span></div>
            </div>
        </div>
        <div class="prop-group">
            <label>Onion Skinning</label>
            <input type="checkbox" id="onionToggle" checked> Enable
        </div>
    </div>
</div>

<div id="timeline-container">
    <div id="timeline-controls">
        <button onclick="app.playPause()" id="playBtn">▶ Play</button>
        <button onclick="app.addNewFrame()">➕ New Frame</button>
        <button onclick="app.deleteCurrentFrame()">🗑️ Delete</button>
        <div style="margin-left: 20px;">
            FPS: <input type="number" id="fpsInput" value="12" style="width: 40px; background: #333; color: white; border: 1px solid #555;">
        </div>
        <div id="playback-status" style="margin-left: auto; font-family: monospace;">Frame: 1 / 1</div>
    </div>
    <div id="frame-strip">
        <!-- Frame thumbnails will be injected here -->
    </div>
</div>

<div id="toast">Message</div>

<script>
/**
 * SAKUGA FLOW PROFESSIONAL 
 * A high-end 2D animation engine written in pure JavaScript.
 */

class AnimeStudio {
    constructor() {
        // Configuration
        this.width = 1920;
        this.height = 1080;
        this.aspectRatio = this.width / this.height;
        
        // State Management
        this.frames = []; // Array of Frame objects
        this.currentFrameIndex = 0;
        this.currentLayerIndex = 2; // Default to Lineart
        this.isDrawing = false;
        this.isPlaying = false;
        this.playInterval = null;
        this.tool = 'brush';
        this.brushColor = '#000000';
        this.brushSize = 5;
        this.zoom = 0.4; // Initial zoom to fit screen
        
        // Undo System
        this.undoStack = [];

        // Core Systems Initialization
        this.initDOM();
        this.initCanvasStack();
        this.addNewFrame(); // Start with one empty frame
        this.setupEventListeners();
        this.renderTimeline();
        
        this.showToast("Studio Ready - Welcome back, Animator.");
    }

    initDOM() {
        this.viewport = document.getElementById('viewport');
        this.canvasStack = document.getElementById('canvas-stack');
        this.frameStrip = document.getElementById('frame-strip');
        this.playBtn = document.getElementById('playBtn');
        this.statusText = document.getElementById('playback-status');
        
        // Set physical size of stack
        this.canvasStack.style.width = this.width + 'px';
        this.canvasStack.style.height = this.height + 'px';
        this.updateZoom();
    }

    initCanvasStack() {
        // We create 5 canvases: 
        // 0: Onion Skin Back, 1: Sketch, 2: Paint, 3: Lineart, 4: Onion Skin Front, 5: UI/Preview
        this.layers = [];
        this.canvasStack.innerHTML = '';
        
        for(let i = 0; i < 6; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = this.width;
            canvas.height = this.height;
            canvas.id = `layer-${i}`;
            
            // Interaction logic only on the top-most visible layer
            if(i === 5) {
                canvas.style.zIndex = 10;
            } else {
                canvas.style.pointerEvents = 'none';
            }

            this.canvasStack.appendChild(canvas);
            this.layers.push({
                el: canvas,
                ctx: canvas.getContext('2d', { willReadFrequently: true })
            });
        }
        
        // Labeling layers for logic
        this.ctxOnionBack = this.layers[0].ctx;
        this.ctxSketch = this.layers[1].ctx;
        this.ctxPaint = this.layers[2].ctx;
        this.ctxLine = this.layers[3].ctx;
        this.ctxOnionFront = this.layers[4].ctx;
        this.ctxUI = this.layers[5].ctx;
        
        this.activeCtxs = [this.ctxSketch, this.ctxPaint, this.ctxLine];
    }

    updateZoom() {
        const availableWidth = this.viewport.clientWidth - 100;
        const availableHeight = this.viewport.clientHeight - 100;
        const scale = Math.min(availableWidth / this.width, availableHeight / this.height);
        this.canvasStack.style.transform = `scale(${scale})`;
    }

    // --- State Management ---

    addNewFrame() {
        const frameData = {
            layers: [null, null, null], // To be stored as ImageBitmap or DataURL
            duration: 1
        };
        
        // Insert frame after current index
        this.frames.splice(this.currentFrameIndex + 1, 0, frameData);
        if (this.frames.length > 1) this.currentFrameIndex++;
        
        this.clearCanvasInternal();
        this.renderTimeline();
        this.updateUI();
        this.showToast("New Frame Added");
    }

    deleteCurrentFrame() {
        if (this.frames.length <= 1) return;
        
        this.frames.splice(this.currentFrameIndex, 1);
        this.currentFrameIndex = Math.max(0, this.currentFrameIndex - 1);
        this.loadFrame(this.currentFrameIndex);
        this.renderTimeline();
        this.showToast("Frame Deleted");
    }

    saveCurrentFrameState() {
        // Saves canvas pixels into the frame object
        const frame = this.frames[this.currentFrameIndex];
        this.activeCtxs.forEach((ctx, idx) => {
            frame.layers[idx] = ctx.getImageData(0, 0, this.width, this.height);
        });
    }

    loadFrame(index) {
        this.saveCurrentFrameState(); // Save old one before switching
        this.currentFrameIndex = index;
        const frame = this.frames[index];
        
        this.clearCanvasInternal();
        
        frame.layers.forEach((data, idx) => {
            if (data) this.activeCtxs[idx].putImageData(data, 0, 0);
        });

        this.renderOnionSkin();
        this.renderTimeline();
        this.updateUI();
    }

    clearCanvasInternal() {
        this.layers.forEach(l => l.ctx.clearRect(0, 0, this.width, this.height));
    }

    // --- Rendering Logic ---

    renderOnionSkin() {
        this.ctxOnionBack.clearRect(0, 0, this.width, this.height);
        this.ctxOnionFront.clearRect(0, 0, this.width, this.height);

        if (!document.getElementById('onionToggle').checked) return;

        // Previous Frame (Reddish tint)
        if (this.currentFrameIndex > 0) {
            this.drawGhost(this.currentFrameIndex - 1, this.ctxOnionBack, 'rgba(255, 0, 0, 0.2)');
        }

        // Next Frame (Greenish tint)
        if (this.currentFrameIndex < this.frames.length - 1) {
            this.drawGhost(this.currentFrameIndex + 1, this.ctxOnionFront, 'rgba(0, 255, 0, 0.2)');
        }
    }

    drawGhost(frameIdx, targetCtx, tint) {
        const frame = this.frames[frameIdx];
        targetCtx.globalAlpha = 0.3;
        frame.layers.forEach(data => {
            if (data) {
                // Create a temporary canvas to apply tint
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = this.width;
                tempCanvas.height = this.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.putImageData(data, 0, 0);
                
                targetCtx.drawImage(tempCanvas, 0, 0);
            }
        });
        targetCtx.globalAlpha = 1.0;
    }

    // --- Input Handling ---

    setupEventListeners() {
        const uiCanvas = this.layers[5].el;

        uiCanvas.addEventListener('pointerdown', (e) => this.startDrawing(e));
        window.addEventListener('pointermove', (e) => this.draw(e));
        window.addEventListener('pointerup', () => this.stopDrawing());

        // UI Listeners
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.tool = btn.dataset.tool;
            });
        });

        document.querySelectorAll('.layer-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.layer-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                this.currentLayerIndex = parseInt(item.dataset.layer);
                this.showToast(`Layer Switched: ${item.innerText}`);
            });
        });

        document.getElementById('colorPicker').addEventListener('input', (e) => {
            this.brushColor = e.target.value;
        });

        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            this.brushSize = e.target.value;
            document.getElementById('sizeVal').innerText = e.target.value;
        });

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') this.undo();
            if (e.key === 'b') document.querySelector('[data-tool="brush"]').click();
            if (e.key === 'e') document.querySelector('[data-tool="eraser"]').click();
            if (e.key === ' ') { e.preventDefault(); this.playPause(); }
        });

        window.addEventListener('resize', () => this.updateZoom());
    }

    getPointerPos(e) {
        const rect = this.layers[5].el.getBoundingClientRect();
        const scale = this.width / rect.width;
        return {
            x: (e.clientX - rect.left) * scale,
            y: (e.clientY - rect.top) * scale,
            pressure: e.pressure || 1.0
        };
    }

    startDrawing(e) {
        if (this.isPlaying) return;
        this.isDrawing = true;
        this.viewport.focus();
        
        // Save state for undo before modification
        this.saveUndoState();

        const pos = this.getPointerPos(e);
        const ctx = this.activeCtxs[this.currentLayerIndex];
        
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    draw(e) {
        if (!this.isDrawing) return;

        const pos = this.getPointerPos(e);
        const ctx = this.activeCtxs[this.currentLayerIndex];
        
        // Dynamic brush size based on pressure
        const currentSize = this.brushSize * (0.5 + pos.pressure);

        ctx.strokeStyle = this.tool === 'eraser' ? '#ffffff' : this.brushColor;
        ctx.globalCompositeOperation = this.tool === 'eraser' ? 'destination-out' : 'source-over';
        ctx.lineWidth = currentSize;

        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        
        // Re-draw line to fix gaps
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    stopDrawing() {
        if (!this.isDrawing) return;
        this.isDrawing = false;
        this.renderOnionSkin(); // Update skins if modified
    }

    // --- Playback System ---

    playPause() {
        if (this.isPlaying) {
            clearInterval(this.playInterval);
            this.isPlaying = false;
            this.playBtn.innerText = "▶ Play";
            this.showToast("Playback Paused");
        } else {
            this.saveCurrentFrameState();
            const fps = parseInt(document.getElementById('fpsInput').value) || 12;
            this.isPlaying = true;
            this.playBtn.innerText = "⏸ Stop";
            this.playInterval = setInterval(() => {
                let nextFrame = this.currentFrameIndex + 1;
                if (nextFrame >= this.frames.length) nextFrame = 0;
                this.loadFrame(nextFrame);
            }, 1000 / fps);
            this.showToast("Playing Animation...");
        }
    }

    // --- UI Helpers ---

    renderTimeline() {
        this.frameStrip.innerHTML = '';
        this.frames.forEach((frame, idx) => {
            const thumb = document.createElement('div');
            thumb.className = `frame-thumb ${idx === this.currentFrameIndex ? 'active' : ''}`;
            thumb.innerText = idx + 1;
            thumb.onclick = () => this.loadFrame(idx);
            this.frameStrip.appendChild(thumb);
        });
        this.statusText.innerText = `Frame: ${this.currentFrameIndex + 1} / ${this.frames.length}`;
    }

    updateUI() {
        // Highlight active layers or tools if they change via shortcuts
    }

    showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    saveUndoState() {
        // Simple pixel-based undo (Memory intensive but stable for one file)
        const frameClone = JSON.parse(JSON.stringify(this.frames[this.currentFrameIndex]));
        this.undoStack.push({
            index: this.currentFrameIndex,
            data: frameClone
        });
        if (this.undoStack.length > 20) this.undoStack.shift();
    }

    undo() {
        if (this.undoStack.length === 0) return;
        const state = this.undoStack.pop();
        this.frames[state.index] = state.data;
        this.loadFrame(state.index);
        this.showToast("Undo Successful");
    }

    exportProject() {
        this.saveCurrentFrameState();
        const projectData = {
            version: "1.0",
            frames: this.frames.map(f => ({
                duration: f.duration,
                layers: f.layers.map(l => l ? this.imageDataToDataURL(l) : null)
            }))
        };
        
        const blob = new Blob([JSON.stringify(projectData)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `anime_project_${Date.now()}.json`;
        a.click();
    }

    imageDataToDataURL(imgData) {
        const canvas = document.createElement('canvas');
        canvas.width = imgData.width;
        canvas.height = imgData.height;
        canvas.getContext('2d').putImageData(imgData, 0, 0);
        return canvas.toDataURL();
    }

    clearProject() {
        if (confirm("Delete everything and start over?")) {
            localStorage.clear();
            location.reload();
        }
    }
}

// Initialize the engine
const app = new AnimeStudio();

</script>
</body>
</html>
