<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URANIUM FORK EATER</title>
    <style>
        body {
            margin: 0;
            background: #050a05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            border: 4px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            background: black;
            cursor: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
        }

        .stats {
            font-size: 1.2rem;
            text-shadow: 2px 2px black;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            text-align: center;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">FORKS CONSUMED: <span id="score">0</span></div>
        <div class="stats">RADIATION LEVEL: <span id="rads">0</span> mSv</div>
    </div>

    <div id="message">CRITICAL MELTDOWN<br><button onclick="location.reload()" style="background:#0f0; border:none; padding:10px; cursor:pointer;">RESTART</button></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const radsEl = document.getElementById('rads');
        const msgEl = document.getElementById('message');

        canvas.width = 800;
        canvas.height = 600;

        let score = 0;
        let radiation = 0;
        let gameOver = false;

        const player = {
            x: 400,
            y: 500,
            size: 40,
            mouthOpen: 0
        };

        const forks = [];

        // Input handling
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            player.y = e.clientY - rect.top;
        });

        function spawnFork() {
            if (gameOver) return;
            forks.push({
                x: Math.random() * (canvas.width - 20),
                y: -50,
                speed: 2 + Math.random() * 4,
                rot: Math.random() * Math.PI * 2
            });
            setTimeout(spawnFork, 1000 - Math.min(score * 10, 800));
        }

        function drawFork(f) {
            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.rotate(f.rot);
            
            // Uranium Glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ff00";
            
            // Fork Handle
            ctx.fillStyle = "#88ff88";
            ctx.fillRect(-2, -20, 4, 30);
            
            // Fork Tines
            ctx.fillRect(-6, -25, 12, 5);
            ctx.fillRect(-6, -35, 2, 10);
            ctx.fillRect(-2, -35, 2, 10);
            ctx.fillRect(2, -35, 2, 10);
            ctx.fillRect(6, -35, 2, 10);
            
            ctx.restore();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // The "Mouth"
            ctx.fillStyle = "#ff5555";
            ctx.beginPath();
            // Mouth animation based on "eating"
            let mouthSize = 0.2 + Math.abs(Math.sin(Date.now() / 200)) * 0.5;
            ctx.arc(0, 0, player.size, mouthSize, Math.PI * 2 - mouthSize);
            ctx.lineTo(0, 0);
            ctx.fill();
            
            // Teeth
            ctx.fillStyle = "white";
            ctx.fillRect(10, -25, 5, 5);
            ctx.fillRect(10, 20, 5, 5);
            
            ctx.restore();
        }

        function update() {
            if (gameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw forks
            for (let i = forks.length - 1; i >= 0; i--) {
                let f = forks[i];
                f.y += f.speed;
                f.rot += 0.05;

                drawFork(f);

                // Collision detection
                let dx = f.x - player.x;
                let dy = f.y - player.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.size) {
                    // EAT IT
                    forks.splice(i, 1);
                    score++;
                    radiation += 1000;
                    scoreEl.innerText = score;
                    radsEl.innerText = radiation;
                    
                    // Flash effect
                    canvas.style.backgroundColor = "#22ff22";
                    setTimeout(() => canvas.style.backgroundColor = "black", 50);

                    if (radiation >= 20000) {
                        endGame();
                    }
                }

                // Remove off-screen forks
                if (f.y > canvas.height + 50) {
                    forks.splice(i, 1);
                }
            }

            drawPlayer();
            requestAnimationFrame(update);
        }

        function endGame() {
            gameOver = true;
            msgEl.style.display = "block";
            canvas.style.filter = "blur(5px) grayscale(1)";
        }

        spawnFork();
        update();
    </script>
</body>
</html>
