<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Drawing Prompter</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-color: #007AFF;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }

        /* Slot Machine Reel */
        #reel-window {
            width: 300px; height: 100px;
            border: 4px solid var(--accent-color);
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            position: relative;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(0,122,255,0.4);
        }

        #reel-container {
            position: absolute; width: 100%; top: 0;
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
            text-align: center;
        }

        .reel-item {
            height: 100px; line-height: 100px;
            font-size: 1.5rem; font-weight: bold;
            border-bottom: 1px solid #333;
        }

        /* Motion Blur Class */
        .spinning {
            filter: blur(6px);
        }

        /* Buttons */
        .btn {
            margin-top: 20px; padding: 15px 40px;
            font-size: 1.2rem; font-weight: 600;
            border: none; border-radius: 30px;
            background: var(--accent-color); color: white;
            pointer-events: auto; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:active { transform: scale(0.95); }
        .hidden { display: none !important; }

        /* Drawing Canvas */
        #drawing-canvas {
            position: absolute; top: 0; left: 0;
            touch-action: none; background: white;
        }

        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.7); padding: 10px;
            text-align: center; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="top-bar" class="hidden">
        <span id="current-theme"></span>
    </div>

    <canvas id="drawing-canvas" class="hidden"></canvas>

    <div id="ui-layer">
        <div id="reel-window">
            <div id="reel-container">
                <!-- Items injected by JS -->
            </div>
        </div>
        
        <button id="roll-btn" class="btn">ROLL PROMPT</button>
        <button id="download-btn" class="btn hidden">SAVE DRAWING</button>
        <button id="clear-btn" class="btn hidden" style="background: #444;">CLEAR</button>
    </div>

    <script src="engine.js"></script>
</body>
</html>
