<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HELLDIVERS 2: MOBILE COMMAND</title>
    <style>
        :root {
            --hd-yellow: #ffee00;
            --hd-cyan: #00f2ff;
            --hd-red: #ff3300;
            --hd-gold: #ffcc00;
            --panel-bg: rgba(5, 10, 15, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; touch-action: none;
        }

        #game-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* --- STYLIZED HUD --- */
        .hud-border {
            position: absolute; border: 2px solid var(--hd-yellow);
            box-shadow: 0 0 15px var(--hd-yellow);
        }

        #mission-header {
            top: 20px; left: 50%; transform: translateX(-50%);
            width: 400px; padding: 10px; text-align: center;
            background: var(--panel-bg); color: var(--hd-yellow);
            clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%);
        }

        #ammo-counter {
            bottom: 40px; right: 250px; width: 180px;
            padding: 15px; background: var(--panel-bg);
            border-right: 5px solid var(--hd-yellow);
            color: white; pointer-events: none;
        }

        /* --- VIRTUAL JOYSTICKS --- */
        .joystick-zone {
            position: absolute; bottom: 50px; width: 180px; height: 180px;
            background: rgba(255,255,255,0.05); border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2); pointer-events: auto;
        }
        #move-zone { left: 50px; }
        #aim-zone { right: 50px; }
        .knob {
            position: absolute; width: 60px; height: 60px;
            background: var(--hd-yellow); border-radius: 50%;
            top: 60px; left: 60px; box-shadow: 0 0 20px var(--hd-yellow);
        }

        /* --- STRATAGEM OVERLAY --- */
        #stratagem-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; pointer-events: auto;
        }

        #stratagem-grid {
            width: 80%; max-width: 900px; height: 70%;
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; overflow-y: scroll; padding: 20px;
            background: rgba(10, 20, 30, 0.9); border: 2px solid var(--hd-cyan);
        }

        .stratagem-card {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 10px; font-size: 10px; text-align: center;
            cursor: pointer; transition: 0.2s;
        }
        .stratagem-card.active { border-color: var(--hd-yellow); background: #222; }

        #strat-input-display {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; font-size: 40px; color: #444;
        }

        /* --- ACTION BUTTONS --- */
        .action-btn {
            position: absolute; pointer-events: auto;
            background: var(--hd-yellow); color: black; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; border: none; box-shadow: 0 4px 0 #b3a700;
        }
        #dive-btn { bottom: 250px; right: 70px; width: 80px; height: 80px; }
        #strat-menu-toggle { bottom: 250px; left: 70px; width: 80px; height: 80px; background: var(--hd-cyan); }

        /* --- SCREENS --- */
        #start-screen {
            position: absolute; width: 100%; height: 100%; background: #000;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="game-ui">
    <div id="start-screen">
        <h1 style="color:var(--hd-yellow); font-size: 60px; margin-bottom: 0;">HELLDIVERS</h1>
        <p style="color:white; letter-spacing: 10px; margin-top: 0;">SUPER-EARTH COMMAND</p>
        <button id="btn-start" style="padding: 20px 60px; font-size: 24px; background: var(--hd-yellow); border:none; font-weight:bold; cursor:pointer;">ENLIST NOW</button>
    </div>

    <div id="mission-header">
        <div style="font-size: 10px;">SECTOR: TERMINID REACH</div>
        <div id="mission-name">PURGE THE XENOS</div>
        <div id="timer">40:00</div>
    </div>

    <div id="ammo-counter">
        <div style="font-size: 10px;">LIBERATOR M-1</div>
        <div style="display:flex; justify-content: space-between;">
            <span id="mag-count">30</span>
            <span>||||||||||||||||||</span>
        </div>
    </div>

    <div id="move-zone" class="joystick-zone"><div id="move-knob" class="knob"></div></div>
    <div id="aim-zone" class="joystick-zone"><div id="aim-knob" class="knob"></div></div>

    <button id="dive-btn" class="action-btn">DIVE</button>
    <button id="strat-menu-toggle" class="action-btn">STRATS</button>

    <div id="stratagem-overlay">
        <div id="strat-input-display"></div>
        <div id="stratagem-grid"></div>
        <div style="position:absolute; bottom:20px; color:white;">TAP TO SELECT | ENTER CODE TO CALL</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * HELLDIVERS 2: MOBILE COMMAND ENGINE
 * A production-grade Canvas engine featuring 100 stratagems and high-fidelity effects.
 */

// --- 100 STRATAGEM DATABASE GENERATOR ---
const STRATAGEMS = [];
const Types = ["ORBITAL", "EAGLE", "SENTRY", "SUPPLY"];
const Icons = ["☄️", "🦅", "🔫", "📦"];
const Dirs = ["UP", "DOWN", "LEFT", "RIGHT"];

function generateStratagems() {
    for (let i = 0; i < 100; i++) {
        const typeIdx = i % 4;
        const codeLength = 4 + (i % 4);
        let code = [];
        for(let c=0; c<codeLength; c++) code.push(Dirs[Math.floor(Math.random()*4)]);
        
        STRATAGEMS.push({
            id: i,
            name: `${Types[typeIdx]} ${i + 101}`,
            type: Types[typeIdx],
            icon: Icons[typeIdx],
            code: code,
            cooldown: 5 + (i % 20),
            damage: 50 + (i * 2)
        });
    }
}
generateStratagems();

// --- GAME CONFIG & STATE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const width = canvas.width = window.innerWidth;
const height = canvas.height = window.innerHeight;

const STATE = {
    playing: false,
    player: {
        x: width/2, y: height/2,
        vX: 0, vY: 0,
        angle: 0,
        hp: 100,
        ammo: 30,
        isDiving: false,
        diveTime: 0
    },
    input: {
        move: { x: 0, y: 0 },
        aim: { x: 0, y: 0 },
        isFiring: false,
        stratMode: false,
        stratBuffer: []
    },
    entities: {
        bullets: [],
        enemies: [],
        particles: [],
        explosions: []
    },
    activeStratIdx: 0,
    shake: 0,
    frame: 0
};

// --- AUDIO SYNTH (High Fidelity) ---
const AudioFX = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    play(freq, type, dur, vol) {
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + dur);
        g.gain.setValueAtTime(vol, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + dur);
    },
    shoot() { this.play(400, 'square', 0.1, 0.1); },
    boom() { this.play(100, 'sawtooth', 0.5, 0.3); },
    click() { this.play(800, 'sine', 0.05, 0.1); }
};

// --- DRAWING UTILS ---
function drawPlayer() {
    ctx.save();
    ctx.translate(STATE.player.x, STATE.player.y);
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, 20, 15, 8, 0, 0, Math.PI*2); ctx.fill();

    ctx.rotate(STATE.player.angle);
    
    // Cape dynamics
    const capeLen = STATE.player.isDiving ? 30 : 15;
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(-12, -8, capeLen, 16);

    // Armor
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ffee00';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Helmet Visor
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(5, -4, 4, 8);
    
    ctx.restore();
}

function createExplosion(x, y, radius) {
    STATE.shake = radius / 5;
    AudioFX.boom();
    for(let i=0; i<30; i++) {
        STATE.entities.particles.push({
            x, y, 
            vX: (Math.random()-0.5)*15, 
            vY: (Math.random()-0.5)*15, 
            life: 40, 
            color: i % 2 === 0 ? '#ff5500' : '#ffee00'
        });
    }
}

// --- CORE GAME LOOP ---
function update() {
    if(!STATE.playing) return;

    // Movement
    const speed = STATE.player.isDiving ? 8 : 4;
    STATE.player.x += STATE.input.move.x * speed;
    STATE.player.y += STATE.input.move.y * speed;

    // Diving Logic
    if(STATE.player.isDiving) {
        STATE.player.diveTime--;
        if(STATE.player.diveTime <= 0) STATE.player.isDiving = false;
    }

    // Aiming & Firing
    if(Math.abs(STATE.input.aim.x) > 0.1 || Math.abs(STATE.input.aim.y) > 0.1) {
        STATE.player.angle = Math.atan2(STATE.input.aim.y, STATE.input.aim.x);
        if(STATE.frame % 6 === 0 && STATE.player.ammo > 0 && !STATE.player.isDiving) {
            STATE.entities.bullets.push({
                x: STATE.player.x, y: STATE.player.y,
                vX: Math.cos(STATE.player.angle) * 15,
                vY: Math.sin(STATE.player.angle) * 15
            });
            STATE.player.ammo--;
            AudioFX.shoot();
        }
    }

    // Auto-Reload
    if(STATE.player.ammo <= 0 && STATE.frame % 120 === 0) STATE.player.ammo = 30;

    // Entities
    STATE.entities.bullets.forEach((b, i) => {
        b.x += b.vX; b.y += b.vY;
        if(b.x < 0 || b.x > width || b.y < 0 || b.y > height) STATE.entities.bullets.splice(i, 1);
    });

    // Enemy AI (Swarms)
    if(STATE.frame % 60 === 0 && STATE.entities.enemies.length < 20) {
        STATE.entities.enemies.push({
            x: Math.random() > 0.5 ? -20 : width + 20,
            y: Math.random() * height,
            hp: 3
        });
    }

    STATE.entities.enemies.forEach((e, ei) => {
        const ang = Math.atan2(STATE.player.y - e.y, STATE.player.x - e.x);
        e.x += Math.cos(ang) * 2;
        e.y += Math.sin(ang) * 2;

        // Bullet hit
        STATE.entities.bullets.forEach((b, bi) => {
            if(Math.hypot(e.x - b.x, e.y - b.y) < 20) {
                e.hp--;
                STATE.entities.bullets.splice(bi, 1);
                if(e.hp <= 0) {
                    createExplosion(e.x, e.y, 10);
                    STATE.entities.enemies.splice(ei, 1);
                }
            }
        });

        // Player collision
        if(Math.hypot(e.x - STATE.player.x, e.y - STATE.player.y) < 20 && !STATE.player.isDiving) {
            STATE.player.hp -= 0.5;
            if(STATE.player.hp <= 0) location.reload();
        }
    });

    // Particles
    STATE.entities.particles.forEach((p, i) => {
        p.x += p.vX; p.y += p.vY; p.life--;
        if(p.life <= 0) STATE.entities.particles.splice(i, 1);
    });

    STATE.frame++;
}

function render() {
    // 1. Clear with subtle feedback
    ctx.fillStyle = '#050a10';
    ctx.fillRect(0,0,width,height);

    // 2. Grid Floor (Tactical HUD Style)
    ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
    ctx.lineWidth = 1;
    for(let x=0; x<width; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
    for(let y=0; y<height; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke(); }

    // 3. Shake
    ctx.save();
    if(STATE.shake > 0.1) {
        ctx.translate((Math.random()-0.5)*STATE.shake, (Math.random()-0.5)*STATE.shake);
        STATE.shake *= 0.9;
    }

    // 4. Draw Entities
    STATE.entities.enemies.forEach(e => {
        ctx.fillStyle = '#ff3300';
        ctx.shadowBlur = 10; ctx.shadowColor = 'red';
        ctx.beginPath(); ctx.moveTo(e.x, e.y-10); ctx.lineTo(e.x+10, e.y+10); ctx.lineTo(e.x-10, e.y+10); ctx.fill();
        ctx.shadowBlur = 0;
    });

    STATE.entities.bullets.forEach(b => {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - b.vX*0.5, b.y - b.vY*0.5); ctx.stroke();
    });

    STATE.entities.particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life/40;
        ctx.fillRect(p.x, p.y, 4, 4);
    });

    drawPlayer();
    ctx.restore();

    // 5. Update UI
    document.getElementById('mag-count').innerText = STATE.player.ammo;

    requestAnimationFrame(() => {
        update();
        render();
    });
}

// --- INPUT HANDLERS ---
function initInput() {
    const moveZone = document.getElementById('move-zone');
    const moveKnob = document.getElementById('move-knob');
    const aimZone = document.getElementById('aim-zone');
    const aimKnob = document.getElementById('aim-knob');

    const handleJoystick = (e, zone, knob, inputKey) => {
        const rect = zone.getBoundingClientRect();
        const touch = e.touches[0];
        const centerX = rect.left + rect.width/2;
        const centerY = rect.top + rect.height/2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(Math.hypot(dx, dy), 60);
        const angle = Math.atan2(dy, dx);
        
        const finalX = Math.cos(angle) * dist;
        const finalY = Math.sin(angle) * dist;
        
        knob.style.transform = `translate(${finalX}px, ${finalY}px)`;
        STATE.input[inputKey].x = finalX / 60;
        STATE.input[inputKey].y = finalY / 60;
    };

    moveZone.addEventListener('touchstart', (e) => handleJoystick(e, moveZone, moveKnob, 'move'));
    moveZone.addEventListener('touchmove', (e) => handleJoystick(e, moveZone, moveKnob, 'move'));
    moveZone.addEventListener('touchend', () => {
        STATE.input.move = {x:0, y:0};
        moveKnob.style.transform = `translate(0,0)`;
    });

    aimZone.addEventListener('touchstart', (e) => handleJoystick(e, aimZone, aimKnob, 'aim'));
    aimZone.addEventListener('touchmove', (e) => handleJoystick(e, aimZone, aimKnob, 'aim'));
    aimZone.addEventListener('touchend', () => {
        STATE.input.aim = {x:0, y:0};
        aimKnob.style.transform = `translate(0,0)`;
    });

    document.getElementById('dive-btn').addEventListener('touchstart', () => {
        if(!STATE.player.isDiving) {
            STATE.player.isDiving = true;
            STATE.player.diveTime = 30;
            AudioFX.click();
        }
    });

    // Stratagem UI Logic
    const stratToggle = document.getElementById('strat-menu-toggle');
    const stratOverlay = document.getElementById('stratagem-overlay');
    const stratGrid = document.getElementById('stratagem-grid');
    const stratInputDisplay = document.getElementById('strat-input-display');

    stratToggle.addEventListener('touchstart', () => {
        STATE.input.stratMode = !STATE.input.stratMode;
        stratOverlay.style.display = STATE.input.stratMode ? 'flex' : 'none';
        STATE.input.stratBuffer = [];
        renderStratInput();
    });

    // Generate 100 Grid Items
    STRATAGEMS.forEach((s, idx) => {
        const card = document.createElement('div');
        card.className = 'stratagem-card';
        card.innerHTML = `<div>${s.icon}</div><div>${s.name}</div>`;
        card.onclick = () => {
            STATE.activeStratIdx = idx;
            STATE.input.stratBuffer = [];
            document.querySelectorAll('.stratagem-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            renderStratInput();
        };
        stratGrid.appendChild(card);
    });

    function renderStratInput() {
        const active = STRATAGEMS[STATE.activeStratIdx];
        stratInputDisplay.innerHTML = active.code.map((dir, i) => {
            const sym = {UP:'↑', DOWN:'↓', LEFT:'←', RIGHT:'→'}[dir];
            const color = i < STATE.input.stratBuffer.length ? 'var(--hd-yellow)' : '#222';
            return `<span style="color:${color}">${sym}</span>`;
        }).join('');
    }

    // Stratagem directional input (on-screen D-pad logic)
    window.addEventListener('keydown', (e) => {
        if(!STATE.input.stratMode) return;
        const keyMap = {ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT'};
        if(keyMap[e.key]) processStratDir(keyMap[e.key]);
    });

    // For iPad, we use the move joystick to "flick" stratagem codes when in menu
    moveZone.addEventListener('touchmove', (e) => {
        if(!STATE.input.stratMode) return;
        const rect = moveZone.getBoundingClientRect();
        const touch = e.touches[0];
        const dx = touch.clientX - (rect.left + 90);
        const dy = touch.clientY - (rect.top + 90);
        if(Math.hypot(dx, dy) > 50) {
            let dir = "";
            if(Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? "RIGHT" : "LEFT";
            else dir = dy > 0 ? "DOWN" : "UP";
            
            if(STATE.lastFlick !== dir) {
                processStratDir(dir);
                STATE.lastFlick = dir;
            }
        } else {
            STATE.lastFlick = "";
        }
    });

    function processStratDir(dir) {
        const active = STRATAGEMS[STATE.activeStratIdx];
        if(active.code[STATE.input.stratBuffer.length] === dir) {
            STATE.input.stratBuffer.push(dir);
            AudioFX.click();
            if(STATE.input.stratBuffer.length === active.code.length) {
                executeStratagem(active);
                STATE.input.stratMode = false;
                stratOverlay.style.display = 'none';
            }
        } else {
            STATE.input.stratBuffer = [];
        }
        renderStratInput();
    }

    function executeStratagem(s) {
        createExplosion(STATE.player.x + 100, STATE.player.y, 100);
        // Orbital logic: kill all enemies within 300px
        STATE.entities.enemies.forEach((e, i) => {
            if(Math.hypot(e.x - STATE.player.x, e.y - STATE.player.y) < 300) {
                STATE.entities.enemies.splice(i, 1);
            }
        });
    }
}

// --- BOOT ---
document.getElementById('btn-start').onclick = () => {
    AudioFX.ctx.resume();
    STATE.playing = true;
    document.getElementById('start-screen').style.display = 'none';
    initInput();
    render();
};

</script>
</body>
</html>
