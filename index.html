<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Quiet Desk - Librarian Simulator</title>
    <style>
        :root {
            --aero-bg: rgba(255, 255, 255, 0.35);
            --aero-border: rgba(255, 255, 255, 0.4);
            --win-blue: #0078d7;
            --win-red: #e81123;
            --taskbar-bg: rgba(10, 20, 40, 0.75);
            --desk-wood: #4d2b1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; background: #111;
        }

        /* --- LIBRARY AMBIENCE --- */
        #library-desk {
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #333, #111);
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .desk-surface {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: var(--desk-wood);
            border-top: 10px solid #3d2114;
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.5);
        }

        .mug {
            position: absolute; bottom: 15%; left: 10%;
            width: 60px; height: 70px; background: #eee;
            border-radius: 5px 5px 20px 20px; z-index: 2;
        }
        .mug::after {
            content: ''; position: absolute; right: -15px; top: 15px;
            width: 25px; height: 35px; border: 6px solid #eee; border-radius: 50%;
        }

        /* --- PC MONITOR --- */
        #monitor-frame {
            width: 95vw; height: 90vh;
            max-width: 1366px; max-height: 1024px;
            background: #222; border: 20px solid #111;
            border-radius: 15px; position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.8), 0 0 20px rgba(100,150,255,0.1);
            display: flex; flex-direction: column; overflow: hidden;
            z-index: 5;
        }

        /* --- WINDOWS 7 DESKTOP --- */
        #desktop {
            flex: 1; position: relative;
            background: radial-gradient(circle at center, #2e7bb0 0%, #0c3a6b 100%);
            overflow: hidden;
        }

        /* Desktop Grid */
        #icon-grid {
            padding: 20px; display: grid;
            grid-auto-flow: column; grid-template-rows: repeat(auto-fill, 100px);
            grid-gap: 20px; pointer-events: none;
        }
        .desktop-icon {
            width: 90px; height: 95px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            color: white; text-shadow: 0 1px 2px black; font-size: 14px;
            pointer-events: auto; border-radius: 3px;
        }
        .desktop-icon:active { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); }
        .desktop-icon .icon-img { width: 48px; height: 48px; margin-bottom: 5px; }

        /* --- TASKBAR --- */
        #taskbar {
            height: 50px; background: var(--taskbar-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 5px; z-index: 9999;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        #start-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: radial-gradient(circle, #5e9eff, #0046b8);
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 0 10px rgba(0,0,0,0.5); margin-right: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        #taskbar-apps { flex: 1; display: flex; gap: 5px; height: 100%; align-items: center; }
        .taskbar-item {
            width: 50px; height: 40px; border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
        }
        .taskbar-item.active { background: rgba(255,255,255,0.2); box-shadow: inset 0 0 5px rgba(255,255,255,0.3); }

        #system-tray {
            padding: 0 15px; color: white; font-size: 13px; text-align: right;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        /* --- WINDOWS AERO --- */
        .window {
            position: absolute; min-width: 300px; min-height: 200px;
            background: #fff; border-radius: 8px 8px 3px 3px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .window.active { z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }

        .titlebar {
            height: 38px; background: var(--aero-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            user-select: none;
        }
        .window.active .titlebar { background: rgba(135, 206, 250, 0.5); }
        .title-text { flex: 1; font-weight: bold; font-size: 14px; color: #111; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        .win-controls { display: flex; gap: 5px; }
        .win-btn {
            width: 30px; height: 22px; border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.2); border: 1px solid rgba(0,0,0,0.1);
        }
        .win-btn.close { background: #e81123cc; color: white; }

        .window-content { flex: 1; position: relative; overflow: auto; background: white; }

        /* --- APP SPECIFIC CSS --- */
        /* WebExplorer */
        .browser-ui { background: #f0f0f0; border-bottom: 1px solid #ccc; padding: 5px; }
        .address-bar-wrap { display: flex; gap: 5px; padding: 5px; }
        .address-bar { flex: 1; height: 34px; padding: 0 10px; border: 1px solid #ccc; font-size: 16px; border-radius: 2px; }
        .browser-go { padding: 0 15px; background: #ddd; border: 1px solid #999; border-radius: 2px; }
        .loading-bar-container { height: 4px; width: 100%; background: #eee; }
        #browser-progress { height: 100%; width: 0%; background: #2e7bb0; transition: width 0.3s; }
        
        .web-frame { padding: 20px; font-family: "Times New Roman", serif; line-height: 1.4; color: #000; }
        .ie-error { text-align: center; padding-top: 50px; font-family: sans-serif; }

        /* Notepad */
        .notepad-textarea { 
            width: 100%; height: 100%; border: none; resize: none; 
            padding: 10px; font-family: monospace; font-size: 16px; outline: none;
        }

        /* --- QUEST NOTIFICATIONS --- */
        #notification-center {
            position: absolute; bottom: 60px; right: 20px;
            width: 320px; z-index: 10000; display: flex; flex-direction: column; gap: 10px;
        }
        .quest-balloon {
            background: #ffffcc; border: 1px solid #666; border-radius: 10px;
            padding: 15px; box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            animation: slideIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative; cursor: pointer;
        }
        @keyframes slideIn { from { transform: translateX(110%); } to { transform: translateX(0); } }
        
        /* --- HUD --- */
        #hud {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #fff; padding: 5px 20px;
            border-radius: 20px; display: flex; gap: 20px; font-weight: bold;
            pointer-events: none; z-index: 10001;
        }

        /* --- SHOP --- */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .shop-item { border: 1px solid #ddd; padding: 10px; border-radius: 5px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .shop-item button { margin-top: 8px; width: 100%; height: 44px; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        .shop-item button:disabled { background: #ccc; }

        /* Context Menu */
        #ctx-menu {
            position: fixed; width: 150px; background: #eee; border: 1px solid #999;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2); z-index: 20000; display: none;
        }
        .ctx-item { padding: 8px 15px; font-size: 14px; cursor: default; }
        .ctx-item:hover { background: #3296fa; color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="library-desk">
        <div class="desk-surface"></div>
        <div class="mug" id="desk-mug"></div>
        
        <div id="hud">
            <span>Library Credits: <span id="stat-lc">0</span> LC</span>
            <span>Quests: <span id="stat-completed">0</span></span>
        </div>

        <div id="monitor-frame">
            <div id="desktop" oncontextmenu="return false;">
                <div id="icon-grid">
                    <!-- Icons generated by JS -->
                </div>

                <div id="window-container"></div>

                <div id="notification-center"></div>
            </div>

            <div id="taskbar">
                <div id="start-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="white" d="M3,12V6.75L9,5.43V12H3M21,12V18.25L10,19.74V12H21M3,13H9V18.57L3,17.25V13M10,4.26L21,5.75V12H10V4.26Z" /></svg>
                </div>
                <div id="taskbar-apps"></div>
                <div id="system-tray">
                    <span id="tray-time">12:00 PM</span><br>
                    <small id="tray-status">Searching...</small>
                </div>
            </div>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" onclick="location.reload()">Refresh</div>
        <div class="ctx-item">New Folder</div>
        <div class="ctx-item">Personalize</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
