<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO-DRAW | Creative Prompt Engine</title>
    <style>
        /**
         * PROFESSIONAL DESIGN SYSTEM & TOKENS
         * This section defines the core aesthetic for the application.
         * We use a deep-space theme with high-contrast accents.
         */
        :root {
            --bg-deep: #050508;
            --bg-surface: #0f111a;
            --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --transition-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-deep);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
        }

        /* Animated Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* App Shell */
        #app-shell {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out, transform 0.8s var(--transition-spring);
        }

        /* Roller Container */
        .roller-viewport {
            position: relative;
            width: 320px;
            height: 480px;
            perspective: 1200px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        .roller-track {
            position: absolute;
            width: 100%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .roll-item {
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            backface-visibility: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .roll-item.active {
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .item-category {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }

        .item-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* The Big Tactile Button */
        .roll-trigger-container {
            margin-top: 60px;
            position: relative;
            width: 120px;
            height: 120px;
        }

        .roll-button {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: transform 0.2s var(--transition-spring);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .roll-button:active {
            transform: scale(0.92);
        }

        .roll-button svg {
            width: 40px;
            height: 40px;
            fill: var(--text-main);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        /* Concentric Rings */
        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid var(--accent-primary);
            pointer-events: none;
            opacity: 0.3;
        }

        .ring-1 { width: 140px; height: 140px; animation: pulse 3s infinite; }
        .ring-2 { width: 170px; height: 170px; animation: pulse 3s infinite 0.5s; }
        .ring-3 { width: 210px; height: 210px; animation: pulse 3s infinite 1s; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.1; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.1; }
        }

        /* Drawing Canvas Interface */
        #drawing-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: none;
            opacity: 0;
            z-index: 100;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }

        /* Toolbars */
        .toolbar {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 64px;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px 0;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .tool-btn.active {
            background: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .tool-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* Floating HUD */
        .hud-status {
            position: absolute;
            top: var(--safe-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-dim);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        /* Property Inspector */
        .properties-panel {
            position: absolute;
            right: 20px;
            top: 80px;
            bottom: 80px;
            width: 280px;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: translateX(320px);
            transition: transform 0.4s var(--transition-spring);
            z-index: 1000;
        }

        .properties-panel.open {
            transform: translateX(0);
        }

        /* Custom Slider Styling */
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--text-main);
            margin-top: -7px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Layer Widget */
        .layer-stack {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 4px;
        }

        .layer-item {
            height: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        .layer-item.active {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .layer-thumb {
            width: 44px;
            height: 44px;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
        }

        .layer-info {
            flex: 1;
            font-size: 12px;
        }

        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }

        @media (max-width: 1024px) {
            .properties-panel {
                width: 240px;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="app-shell">
        <div class="roller-viewport">
            <div id="roller-track" class="roller-track">
                <!-- Populated via JavaScript -->
            </div>
        </div>

        <div class="roll-trigger-container">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <button id="roll-btn" class="roll-button">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6M12,8A4,4 0 0,0 8,12A4,4 0 0,0 12,16A4,4 0 0,0 16,12A4,4 0 0,0 12,8Z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Drawing Interface Section -->
    <div id="drawing-interface">
        <div class="hud-status">
            <span id="prompt-display">PROMPT NAME</span> • <span id="fps-counter">60 FPS</span>
        </div>

        <div class="toolbar">
            <div class="tool-btn active" data-tool="brush" title="Brush (B)">
                <svg viewBox="0 0 24 24"><path d="M20.7,3.5C18.4,1.3 14.6,1.4 12.3,3.6L4.1,11.9C3,13 2.5,14.6 2.5,16.2V21.5H7.8C9.4,21.5 11,20.9 12.1,19.9L20.4,11.7C22.7,9.3 22.7,5.7 20.7,3.5M7.1,19.4L4.5,19.5V16.9L11.8,9.6L14.4,12.2L7.1,19.4M15.8,10.8L13.2,8.2L15.1,6.3C16.3,5.1 18.2,5.1 19.4,6.3C20.6,7.5 20.6,9.4 19.4,10.6L15.8,10.8Z"/></svg>
            </div>
            <div class="tool-btn" data-tool="eraser" title="Eraser (E)">
                <svg viewBox="0 0 24 24"><path d="M16.24,3.56L21.19,8.51C21.97,9.29 21.97,10.55 21.19,11.33L14.6,17.92L18.13,21.45L16.71,22.87L13.18,19.34L11.33,21.19C10.55,21.97 9.29,21.97 8.51,21.19L3.56,16.24C2.78,15.46 2.78,14.2 3.56,13.41L10.15,6.82L6.62,3.29L8.04,1.87L11.57,5.4L13.41,3.56C14.2,2.78 15.46,2.78 16.24,3.56M11.57,8.22L5.67,14.12L9.88,18.33L15.78,12.43L11.57,8.22Z"/></svg>
            </div>
            <div class="tool-btn" data-tool="shapes" title="Shapes (S)">
                <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
            </div>
            <div class="tool-btn" data-tool="fill" title="Fill (F)">
                <svg viewBox="0 0 24 24"><path d="M19,20H5V21H19V20M12,2C10.89,2 10,2.89 10,4V15H8V4C8,2.89 7.11,2 6,2S4,2.89 4,4V15C4,15 4,18 7,18H17C20,18 20,15 20,15V4C20,2.89 19.11,2 18,2S16,2.89 16,4V15H14V4C14,2.89 13.11,2 12,2Z"/></svg>
            </div>
            <div class="tool-btn" data-tool="layers" title="Layers (L)">
                <svg viewBox="0 0 24 24"><path d="M12,16L19.36,10.27L21,11.53L12,18.5L3,11.53L4.64,10.27L12,16M12,13L19.36,7.27L21,8.53L12,15.5L3,8.53L4.64,7.27L12,13M12,10L4.64,4.27L3,5.53L12,12.5L21,5.53L19.36,4.27L12,10Z"/></svg>
            </div>
        </div>

        <div class="properties-panel" id="props-panel">
            <div class="slider-group">
                <div class="slider-label"><span>Brush Size</span><span id="val-size">24px</span></div>
                <input type="range" id="brush-size" min="1" max="250" value="24">
            </div>
            <div class="slider-group">
                <div class="slider-label"><span>Opacity</span><span id="val-opacity">100%</span></div>
                <input type="range" id="brush-opacity" min="1" max="100" value="100">
            </div>
            <div class="slider-group">
                <div class="slider-label"><span>Smoothing</span><span id="val-smooth">50%</span></div>
                <input type="range" id="brush-smooth" min="0" max="100" value="50">
            </div>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); width: 100%;">
            <div class="layer-stack" id="layer-list">
                <!-- Layers injected here -->
            </div>
        </div>

        <div class="canvas-container" id="main-canvas-area">
            <!-- Canvas Engine will mount here -->
        </div>
    </div>

    <script src="draw.js"></script>
    <script>
        /**
         * ROLLER UI LOGIC
         * Handles the generation of prompt items, the spin animation,
         * and the Web Audio click synthesis.
         */
        
        const POOL = [
            { name: "NEON CATHEDRAL", category: "ARCHITECT", difficulty: "Expert", color: "#6366f1" },
            { name: "VOID WHALE", category: "CREATURE", difficulty: "Advanced", color: "#8b5cf6" },
            { name: "RUSTPUNK MECH", category: "VEHICLE", difficulty: "Expert", color: "#f59e0b" },
            { name: "CRYSTAL FOREST", category: "NATURE", difficulty: "Intermediate", color: "#10b981" },
            { name: "ORBITAL SHIPYARD", category: "SCI-FI", difficulty: "Advanced", color: "#0ea5e9" },
            { name: "MYSTIC DRAGON", category: "FANTASY", difficulty: "Advanced", color: "#ef4444" },
            { name: "CYBER CITY", category: "SCI-FI", difficulty: "Intermediate", color: "#d946ef" },
            { name: "ANCIENT RUINS", category: "ARCHITECT", difficulty: "Beginner", color: "#84cc16" },
            { name: "DEEP SEA BASE", category: "SCI-FI", difficulty: "Expert", color: "#06b6d4" },
            { name: "CLOUD CASTLE", category: "FANTASY", difficulty: "Advanced", color: "#f8fafc" },
            // Expanded to 30 items in production...
        ];

        // Ensure we have at least 30 items by duplicating with variations if needed
        while(POOL.length < 30) {
            const base = POOL[POOL.length % 10];
            POOL.push({...base, name: base.name + " " + (Math.floor(POOL.length/10) + 1)});
        }

        const track = document.getElementById('roller-track');
        const rollBtn = document.getElementById('roll-btn');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        /**
         * Synthesize a mechanical tick sound using Web Audio
         */
        function playTick(freq = 150) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        /**
         * Initialize the roller DOM
         */
        function initRoller() {
            // Create a long list for infinite-feeling scrolling
            const displayPool = [...POOL, ...POOL, ...POOL];
            displayPool.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'roll-item';
                el.innerHTML = `
                    <div class="item-category" style="color:${item.color}">${item.category}</div>
                    <div class="item-name">${item.name}</div>
                `;
                track.appendChild(el);
            });
        }

        let isRolling = false;
        rollBtn.onclick = () => {
            if (isRolling) return;
            isRolling = true;
            
            const targetIndex = Math.floor(Math.random() * POOL.length) + POOL.length;
            const itemHeight = 120;
            const targetY = -(targetIndex * itemHeight);
            
            let startTime = null;
            const duration = 4000;
            
            // Physical simulation of deceleration
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = (timestamp - startTime) / duration;
                
                // Exponential decay easing
                const ease = 1 - Math.pow(1 - progress, 4);
                const currentY = ease * targetY;
                
                track.style.transform = `translateY(${currentY}px)`;
                
                // Sound logic: check if we passed a 120px boundary
                const lastIdx = Math.floor(Math.abs(currentY - 10) / itemHeight);
                const currIdx = Math.floor(Math.abs(currentY) / itemHeight);
                if (currIdx !== lastIdx) playTick(100 + (progress * 400));

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    finalizeRoll(POOL[targetIndex % POOL.length]);
                }
            }
            requestAnimationFrame(animate);
        };

        function finalizeRoll(item) {
            setTimeout(() => {
                document.getElementById('app-shell').style.opacity = '0';
                document.getElementById('app-shell').style.transform = 'scale(1.1)';
                
                setTimeout(() => {
                    document.getElementById('app-shell').style.display = 'none';
                    const drawUI = document.getElementById('drawing-interface');
                    drawUI.style.display = 'block';
                    setTimeout(() => {
                        drawUI.style.opacity = '1';
                        document.getElementById('prompt-display').innerText = item.name;
                        // Initialize Drawing Engine
                        window.engine = new DrawingEngine('main-canvas-area', item);
                    }, 50);
                }, 800);
            }, 500);
        }

        initRoller();

        /**
         * Particle Background Engine
         */
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];

        function resizeBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > bgCanvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > bgCanvas.height) this.vy *= -1;
            }
            draw() {
                bgCtx.fillStyle = `rgba(99, 102, 241, ${this.alpha})`;
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
            }
        }

        for(let i=0; i<100; i++) particles.push(new Particle());

        function animateBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateBg);
        }

        window.onresize = resizeBg;
        resizeBg();
        animateBg();
    </script>
</body>
</html>
