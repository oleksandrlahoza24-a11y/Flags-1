<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Librarian - The Unpredictable Archive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
        }
        #game {
            background: #111;
            border: 3px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0, 255, 0, 0.05);
            color: #00ff00;
            position: relative;
            overflow: hidden;
        }
        #game::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
        h1 {
            text-align: center;
            font-size: 1.8em;
            text-shadow: 0 0 10px #00ff00;
            color: #00ff00;
            margin-bottom: 5px;
            letter-spacing: 4px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            font-size: 0.8em;
            color: #0f0;
            opacity: 0.7;
            margin-bottom: 15px;
        }
        #questBox {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 4px;
            padding: 10px 15px;
            margin-bottom: 15px;
            min-height: 60px;
            box-shadow: inset 0 0 5px rgba(0,255,0,0.2);
        }
        #questTitle {
            color: #0f0;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
        }
        #questDesc {
            color: #5f5;
            font-size: 0.85em;
            margin-top: 5px;
        }
        #wordTarget {
            color: #ffff00;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #ffff00;
        }
        #progressArea {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            background: #0a0a0a;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #0f0;
            font-size: 0.9em;
        }
        #scoreDisplay {
            color: #0f0;
        }
        #streakDisplay {
            color: #5f5;
        }
        #bookArea {
            background: #0a0a0a;
            border: 2px solid #0f0;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 12px;
            min-height: 280px;
            max-height: 350px;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.5;
            word-wrap: break-word;
            scrollbar-color: #0f0 #111;
        }
        #bookArea::-webkit-scrollbar {
            width: 6px;
        }
        #bookArea::-webkit-scrollbar-track {
            background: #111;
        }
        #bookArea::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 3px;
        }
        .highlighted {
            background: #003300;
            color: #ffff00;
            padding: 0 2px;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .highlighted:hover {
            background: #006600;
        }
        #inputArea {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        #wordInput {
            flex: 1;
            background: #0a0a0a;
            border: 2px solid #0f0;
            border-radius: 4px;
            padding: 10px 12px;
            color: #0f0;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            outline: none;
        }
        #wordInput::placeholder {
            color: #0f0;
            opacity: 0.4;
        }
        #wordInput:focus {
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }
        #submitBtn {
            background: #0a0a0a;
            border: 2px solid #0f0;
            border-radius: 4px;
            padding: 10px 20px;
            color: #0f0;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        #submitBtn:active {
            background: #003300;
            transform: scale(0.95);
        }
        .buttonRow {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 4px;
            padding: 8px 14px;
            color: #0f0;
            cursor: pointer;
            font-size: 0.85em;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .btn:active {
            background: #003300;
            transform: scale(0.95);
        }
        #messageBox {
            margin-top: 8px;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            min-height: 24px;
            font-size: 0.9em;
        }
        .good {
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        .bad {
            color: #ff4444;
            text-shadow: 0 0 5px #ff4444;
        }
        .special {
            color: #aa00ff;
            text-shadow: 0 0 5px #aa00ff;
        }
        #hintText {
            font-size: 0.75em;
            color: #0f0;
            opacity: 0.6;
            margin-top: 4px;
            text-align: center;
        }
        @media (max-width: 600px) {
            #game {
                padding: 12px;
            }
            h1 {
                font-size: 1.4em;
            }
            #bookArea {
                min-height: 220px;
                max-height: 280px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
<div id="game">
    <h1>// UNPREDICTABLE ARCHIVE //</h1>
    <div class="subtitle">Librarian Terminal v2.1 — Find the required token</div>
    
    <div id="questBox">
        <div id="questTitle">&gt; CURRENT TASK</div>
        <div id="questDesc">Locate the word: <span id="wordTarget">SYZYGY</span> in the document below.</div>
    </div>
    
    <div id="progressArea">
        <span id="scoreDisplay">SCORE: 0</span>
        <span id="streakDisplay">STREAK: 0</span>
    </div>
    
    <div id="bookArea">
        Loading archive node...
    </div>
    
    <div id="inputArea">
        <input type="text" id="wordInput" placeholder="enter search term..." autocomplete="off">
        <button id="submitBtn">SEARCH</button>
    </div>
    
    <div class="buttonRow">
        <button class="btn" id="newBookBtn">LOAD NEW NODE</button>
        <button class="btn" id="skipBtn">SKIP TASK</button>
        <button class="btn" id="resetBtn">INITIALIZE RESET</button>
    </div>
    
    <div id="messageBox"></div>
    <div id="hintText">Task word appears exactly once. Tap highlighted token or type it.</div>
</div>

<script>
// ========== OFFENSIVE MIX: SEXUAL + VIOLENCE + TABOO + ABSURD ==========
const books = [
    `The memoirs of a cannibalistic taxidermist. He describes the taste of human flesh as "like pork, but with a hint of regret". He also keeps a detailed log of the sexual encounters he had with his victims before butchering them, including one instance where he fucked a corpse while whistling "Dixie". The word QUINDECILLION appears in a footnote about the number of nerve endings in a freshly severed finger. Another chapter explains how to properly skin a man alive without tearing the genitals. The final entry is a recipe for testicle stew.`,

    `Excerpt from "The Inquisitor's Handbook". Chapter 7: "On the use of holy water for anal cleansing before exorcism". The procedure involves a priest inserting a brass crucifix into the rectum of a possessed woman while chanting in Latin. The word MNEMONIC appears in a list of memory aids for remembering the seven deadly sins by associating each with a specific bodily fluid. One sidebar describes a rape committed during a church service—the victim was a choirboy, the perpetrator a bishop. The illustration shows a detailed diagram of a flayed penis.`,

    `Field notes from a serial killer who only kills people born on leap day. He writes about the feeling of climax while strangling a virgin with a rosary. He keeps their heads in a freezer and fucks the mouths at night. The word SYZYGY is mentioned in a passage about the full moon aligning with the rotation of his bloodstained hands. Another page details the exact pressure needed to crush a windpipe while ejaculating. He signs off with "see you in hell."`,

    `A user manual for a sex doll made entirely of human bones and latex. The instructions include "lubricate the skull cavity before insertion" and "do not leave the doll in direct sunlight as it may develop consciousness." The word KLEPTOMANIA appears in a warning about the doll's tendency to steal small children. One section describes how to fuck the doll while wearing a crown of thorns. The warranty is void if you attempt to baptize the doll.`,

    `Diary of a mongrel priest who performs exorcisms using his own cum. He believes that his semen is holy because he has never masturbated to completion without a prayer. The word ZUGZWANG is used when he describes a chess match with a demon where the only winning move was to cum on the Bible. He also recounts a time he ate a communion wafer that had been shoved up a dead prostitute's ass. The last entry is a poem about necrophilia written in the margins of a missal.`,

    `Transcript of an interrogation of a man who claims to have fucked a bear. The officer asks for details. The man describes the bear's vagina as "warm and tight, smelled like old meat." The word QUINDECILLION is used when the man tries to estimate the number of calories he burned during the encounter. A forensic report mentions traces of bear semen mixed with human feces on the suspect's trousers. The case was dismissed due to lack of jurisdiction over bear-human sodomy.`,

    `The Codex of Profane Inventions. One device is a dildo that shoots holy water when you press the base. Another is a guillotine that only decapitates non-believers. The word MNEMONIC appears in a prayer to help remember the order of the Stations of the Cross while being tortured. There is a blueprint for a clockwork mouth that sings Gregorian chants while performing fellatio. The inventor claims to have used the "whore of Babylon" as a prototype.`,

    `A scholarly dissertation on the history of scatological blasphemy in medieval art. The author spends 50 pages analyzing a fresco of a monk defecating on a crucifix. The word SYZYGY is used to describe the alignment of a bishop's anus with the sun during an eclipse. One chapter includes a vivid description of a ritual where nuns drink urine from a chalice while chanting. The conclusion argues that "shit is the most honest substance."`,

    `Prison diary of a convicted infant cannibal. He writes about the taste of baby fat and how he would rape the corpses before cooking them. The word KLEPTOMANIA appears in a note about stealing baby pacifiers as souvenirs. He describes a method for making a bong out of a fetal skull. The final entry mentions a dream where he fucked the Pope while stabbing a newborn. The page is stained with blood and semen.`,

    `The book of forbidden surgeries. A step-by-step guide to grafting a human penis onto a goat. The procedure involves ritual chanting and drinking the blood of a virgin. The word ZUGZWANG is used in a footnote about the chess move that led to the fall of Constantinople. One section describes "holy fisting" as a cure for demonic possession. The author was excommunicated but continued to practice on cadavers donated by the local morgue.`
];

// ========== TARGET WORD POOL (obscure, non-offensive) ==========
const targetWords = [
    'QUINDECILLION', 'SYZYGY', 'MNEMONIC', 'KLEPTOMANIA', 'ZUGZWANG',
    'XYLOPHONE', 'ASTEROID', 'CHRYSALIS', 'NEBULA', 'ESCHATON',
    'GELATINOUS', 'PARADIGM', 'QUASAR', 'RHOMBUS', 'SYNECDOCHE',
    'THESAURUS', 'VORTEX', 'WYVERN', 'ZOETROPE', 'BIOPSY'
];

// ========== GAME STATE ==========
let currentBookIndex = 0;
let currentTargetWord = '';
let currentBookContent = '';
let score = 0;
let streak = 0;
let maxStreak = 0;
let tasksCompleted = 0;
let foundInCurrentTask = false;

// ========== DOM REFERENCES ==========
const bookArea = document.getElementById('bookArea');
const wordTarget = document.getElementById('wordTarget');
const questDesc = document.getElementById('questDesc');
const scoreDisplay = document.getElementById('scoreDisplay');
const streakDisplay = document.getElementById('streakDisplay');
const wordInput = document.getElementById('wordInput');
const submitBtn = document.getElementById('submitBtn');
const messageBox = document.getElementById('messageBox');
const hintText = document.getElementById('hintText');

// ========== FUNCTIONS ==========

function getRandomWord() {
    return targetWords[Math.floor(Math.random() * targetWords.length)];
}

function getRandomBookText() {
    return books[Math.floor(Math.random() * books.length)];
}

function insertWordIntoText(text, word) {
    const sentences = text.match(/[^.!?]*[.!?]/g) || [text];
    if (text.toUpperCase().includes(word.toUpperCase())) {
        return text;
    }
    const insertIdx = Math.floor(Math.random() * sentences.length);
    const insertSentence = ` This document contains the token "${word}" as per archival requirement. `;
    sentences.splice(insertIdx, 0, insertSentence);
    return sentences.join(' ');
}

function generateBookWithWord(word) {
    let base = getRandomBookText();
    return insertWordIntoText(base, word);
}

function highlightWord(text, word) {
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`\\b${escaped}\\b`, 'gi');
    return text.replace(regex, (match) => {
        return `<span class="highlighted" data-word="${word.toUpperCase()}">${match}</span>`;
    });
}

function showMessage(text, type = 'good') {
    messageBox.innerHTML = text;
    messageBox.className = type;
    setTimeout(() => {
        if (messageBox.innerHTML === text) {
            messageBox.innerHTML = '';
            messageBox.className = '';
        }
    }, 3000);
}

function newTask() {
    currentTargetWord = getRandomWord().toUpperCase();
    wordTarget.textContent = currentTargetWord;
    
    const nodeNum = Math.floor(Math.random() * 999999);
    questDesc.innerHTML = `Node #${nodeNum}: Find the token <strong>${currentTargetWord}</strong> in the document.`;
    
    currentBookContent = generateBookWithWord(currentTargetWord);
    const highlighted = highlightWord(currentBookContent, currentTargetWord);
    bookArea.innerHTML = highlighted;
    bookArea.scrollTop = 0;
    
    foundInCurrentTask = false;
    wordInput.value = '';
    wordInput.focus();
    hintText.textContent = `Search for exactly: ${currentTargetWord}`;
    
    document.querySelectorAll('.highlighted').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            const word = this.getAttribute('data-word');
            handleFound(word);
        });
    });
}

function handleFound(word) {
    if (foundInCurrentTask) return;
    if (word.toUpperCase() === currentTargetWord.toUpperCase()) {
        foundInCurrentTask = true;
        const points = 10 + (streak * 5);
        score += points;
        streak++;
        if (streak > maxStreak) maxStreak = streak;
        tasksCompleted++;
        updateDisplay();
        showMessage(`[FOUND] +${points} points. Streak: ${streak}`, 'good');
        
        bookArea.innerHTML += `<br><span style="color: #ffff00; display: block; text-align: center; font-size: 1.1em;">&gt; TOKEN ACQUIRED &lt;</span>`;
        
        setTimeout(() => {
            newTask();
        }, 1400);
    }
}

function updateDisplay() {
    scoreDisplay.textContent = `SCORE: ${score}`;
    streakDisplay.textContent = `STREAK: ${streak} (MAX: ${maxStreak})`;
}

function resetGame() {
    score = 0;
    streak = 0;
    maxStreak = 0;
    tasksCompleted = 0;
    updateDisplay();
    showMessage('[RESET] All archives cleared.', 'bad');
    newTask();
}

function skipTask() {
    if (streak > 0) streak = 0;
    updateDisplay();
    showMessage(`[SKIP] Streak broken. New task loaded.`, 'bad');
    setTimeout(() => newTask(), 400);
}

function loadNewBook() {
    if (streak > 0) streak = 0;
    updateDisplay();
    showMessage('[NODE CHANGE] New document loaded.', 'special');
    setTimeout(() => newTask(), 300);
}

// ========== EVENT LISTENERS ==========

submitBtn.addEventListener('click', function() {
    const input = wordInput.value.trim().toUpperCase();
    if (!input) {
        showMessage('[ERROR] No input.', 'bad');
        return;
    }
    if (input === currentTargetWord) {
        handleFound(input);
    } else {
        if (streak > 0) streak = 0;
        updateDisplay();
        showMessage(`[WRONG] "${input}" does not match token. Streak broken.`, 'bad');
        wordInput.value = '';
        wordInput.focus();
    }
});

wordInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        submitBtn.click();
    }
});

document.getElementById('newBookBtn').addEventListener('click', loadNewBook);
document.getElementById('skipBtn').addEventListener('click', skipTask);
document.getElementById('resetBtn').addEventListener('click', resetGame);

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('highlighted')) {
        const word = e.target.getAttribute('data-word');
        if (word) handleFound(word);
    }
});

// ========== INIT ==========
newTask();
updateDisplay();
showMessage('[SYSTEM] Welcome, Librarian. Locate the tokens.', 'special');
</script>
</body>
</html>
