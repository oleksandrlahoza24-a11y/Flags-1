<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK: Hollow Purple Animation</title>
    <style>
        :root {
            --red-color: #ff003c;
            --blue-color: #0084ff;
            --purple-color: #bc00ff;
            --bg-color: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Gojo Silhouette / Center Point */
        #gojo {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            z-index: 10;
        }

        /* Orbs */
        .orb {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            filter: blur(5px);
            opacity: 0;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
        }

        #blue-orb {
            background: var(--blue-color);
            box-shadow: 0 0 40px var(--blue-color), 0 0 80px var(--blue-color);
            transform: translateX(-300px);
        }

        #red-orb {
            background: var(--red-color);
            box-shadow: 0 0 40px var(--red-color), 0 0 80px var(--red-color);
            transform: translateX(300px);
        }

        /* Impact Flash */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }

        /* Canvas for Particles & Beam */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        #ui-text {
            position: absolute;
            bottom: 50px;
            color: white;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        /* Animation States */
        .active #blue-orb, .active #red-orb {
            opacity: 1;
        }

        .converge #blue-orb, .converge #red-orb {
            transform: translateX(0px) scale(1.5);
        }
    </style>
</head>
<body>

<div id="scene">
    <div id="ui-text">Click to activate: Hollow Purple</div>
    <div id="gojo"></div>
    <div id="blue-orb" class="orb"></div>
    <div id="red-orb" class="orb"></div>
    <div id="flash"></div>
    <canvas id="canvas"></canvas>
</div>

<script>
    const scene = document.getElementById('scene');
    const flash = document.getElementById('flash');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let beamActive = false;
    let animationFrame;

    // Resize canvas
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(x, y, color, speed, angle, size) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.size = size;
            this.life = 1;
            this.decay = Math.random() * 0.02 + 0.005;
        }

        draw() {
            ctx.globalAlpha = this.life;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            // Glow effect
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
        }
    }

    function createExplosion(x, y, color, count = 50) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 8 + 2;
            const size = Math.random() * 4 + 1;
            particles.push(new Particle(x, y, color, speed, angle, size));
        }
    }

    function fireBeam() {
        beamActive = true;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Sound simulation or intensity frames could go here
        let frameCount = 0;
        
        function animateBeam() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (beamActive) {
                frameCount++;
                
                // Draw Purple Core
                const gradient = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, 150 + Math.random() * 50);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.2, '#bc00ff');
                gradient.addColorStop(0.5, 'rgba(188, 0, 255, 0.4)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(centerX, centerY, 200, 0, Math.PI * 2);
                ctx.fill();

                // Fire particles forward (simulating the destruction path)
                for(let i=0; i<15; i++){
                    const pX = centerX;
                    const pY = centerY;
                    const angle = (Math.random() - 0.5) * 0.5; // Narrow spread
                    const speed = Math.random() * 20 + 10;
                    particles.push(new Particle(pX, pY, '#bc00ff', speed, angle, Math.random() * 8));
                }
            }

            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (frameCount < 120) { // Duration of the beam
                animationFrame = requestAnimationFrame(animateBeam);
            } else {
                beamActive = false;
                setTimeout(() => {
                    scene.classList.remove('active', 'converge');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles = [];
                }, 1000);
            }
        }
        animateBeam();
    }

    scene.addEventListener('click', () => {
        if (scene.classList.contains('active')) return;

        // Phase 1: Summon Blue and Red
        scene.classList.add('active');
        
        setTimeout(() => {
            // Phase 2: Converge
            scene.classList.add('converge');
        }, 1000);

        setTimeout(() => {
            // Phase 3: Collision & Flash
            flash.style.opacity = '1';
            createExplosion(window.innerWidth/2, window.innerHeight/2, '#ffffff', 100);
            
            setTimeout(() => {
                flash.style.opacity = '0';
                // Phase 4: Release Hollow Purple
                fireBeam();
            }, 100);
        }, 2500); // Timing of collision
    });
</script>

</body>
</html>
