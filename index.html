<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Nuke Test Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            -webkit-tap-highlight-color: transparent;
        }
        button:active { background: rgba(255, 0, 0, 1); transform: scale(0.95); }
    </style>
</head>
<body>

<div id="ui">
    <button onclick="detonate()">DETONATE</button>
</div>

<!-- Load Three.js and OrbitControls from CDN -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Configuration ---
    let scene, camera, renderer, controls, clock;
    let fireball, stem, cap, shockwave, flashLight, ground;
    let isExploding = false;
    let startTime = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.002);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 100, 400);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimized for Retina
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.1; // Prevent going underground
        controls.minDistance = 50;
        controls.maxDistance = 1500;

        clock = new THREE.Clock();

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(2000, 2000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3d3321 }); // Desert dust
        ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const ambient = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        flashLight = new THREE.PointLight(0xffffff, 0, 5000);
        flashLight.position.set(0, 50, 0);
        scene.add(flashLight);

        window.addEventListener('resize', onWindowResize);
    }

    // --- Custom Shaders ---
    const cloudVertexShader = `
        varying vec2 vUv;
        varying vec3 vPosition;
        void main() {
            vUv = uv;
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `;

    const cloudFragmentShader = `
        uniform float time;
        uniform vec3 baseColor;
        uniform float opacity;
        varying vec3 vPosition;

        // Simple noise function for displacement
        float noise(vec3 p) {
            return fract(sin(dot(p, vec3(12.9898, 78.233, 45.164))) * 43758.5453);
        }

        void main() {
            float n = noise(vPosition * 0.05 + time * 0.2);
            vec3 color = mix(baseColor, vec3(0.1), n * 0.5);
            gl_FragColor = vec4(color, opacity);
        }
    `;

    function createNukeAssets() {
        // 1. Fireball
        const fireGeo = new THREE.SphereGeometry(1, 32, 32);
        const fireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true });
        fireball = new THREE.Mesh(fireGeo, fireMat);
        fireball.position.y = 10;
        fireball.visible = false;
        scene.add(fireball);

        // 2. Stem (The trunk)
        const stemGeo = new THREE.CylinderGeometry(1, 1, 1, 32, 1, true);
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x555555, transparent: true, opacity: 0 });
        stem = new THREE.Mesh(stemGeo, stemMat);
        stem.visible = false;
        scene.add(stem);

        // 3. Cap (The mushroom top)
        const capGeo = new THREE.TorusGeometry(1, 0.5, 16, 100);
        const capMat = new THREE.MeshStandardMaterial({ color: 0x444444, transparent: true, opacity: 0 });
        cap = new THREE.Mesh(capGeo, capMat);
        cap.rotation.x = Math.PI / 2;
        cap.visible = false;
        scene.add(cap);

        // 4. Shockwave
        const ringGeo = new THREE.RingGeometry(1, 2, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
        shockwave = new THREE.Mesh(ringGeo, ringMat);
        shockwave.rotation.x = -Math.PI / 2;
        shockwave.position.y = 1;
        shockwave.visible = false;
        scene.add(shockwave);
    }

    window.detonate = function() {
        if (isExploding) return;
        
        // Reset scene for new explosion
        if (fireball) scene.remove(fireball, stem, cap, shockwave);
        createNukeAssets();

        isExploding = true;
        startTime = clock.getElapsedTime();
    };

    function updateSimulation() {
        if (!isExploding) return;

        const t = clock.getElapsedTime() - startTime;

        // Stage 1: The Flash (0 - 0.5s)
        if (t < 0.5) {
            flashLight.intensity = Math.pow(1.0 - t/0.5, 2) * 500;
            scene.background.setHex(0xffffff);
        } else {
            scene.background.lerp(new THREE.Color(0x87CEEB), 0.1);
        }

        // Stage 2: Fireball Growth (0 - 3s)
        if (t < 4) {
            fireball.visible = true;
            let scale = Math.pow(t, 0.7) * 80;
            fireball.scale.set(scale, scale, scale);
            
            // Color transition: White -> Yellow -> Red -> Dark Smoke
            if (t < 0.5) fireball.material.color.set(0xffffff);
            else if (t < 1.5) fireball.material.color.lerp(new THREE.Color(0xffaa00), 0.1);
            else {
                fireball.material.color.lerp(new THREE.Color(0x222222), 0.05);
                fireball.material.opacity = Math.max(0, 1.2 - t/4);
            }
        }

        // Stage 3: Stem & Cap (0.5s - end)
        if (t > 0.5) {
            stem.visible = true;
            cap.visible = true;

            // Rise velocity
            const height = Math.pow(t - 0.5, 0.8) * 40;
            const width = Math.pow(t - 0.5, 0.5) * 15;

            stem.scale.set(width, height, width);
            stem.position.y = height / 2;
            stem.material.opacity = Math.min(0.8, (t - 0.5) * 0.5);

            cap.position.y = height;
            const capScale = Math.pow(t - 0.5, 0.6) * 20;
            cap.scale.set(capScale, capScale, capScale);
            cap.material.opacity = Math.min(0.8, (t - 0.5) * 0.5);
        }

        // Stage 4: Shockwave
        if (t > 0.1 && t < 6) {
            shockwave.visible = true;
            const waveScale = t * 300;
            shockwave.scale.set(waveScale, waveScale, 1);
            shockwave.material.opacity = Math.max(0, 0.5 - t/6);
        }

        if (t > 15) isExploding = false;
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        updateSimulation();
        controls.update();
        renderer.render(scene, camera);
    }
</script>

</body>
</html>
