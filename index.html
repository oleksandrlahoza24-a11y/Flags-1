<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gacha Draw - iPad</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #1a1a1e;
            --accent: #7000ff;
            --text: #ffffff;
            --safe-area-top: env(safe-area-inset-top);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* View Management */
        .view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s;
        }

        .view.hidden {
            display: none;
            opacity: 0;
            pointer-events: none;
        }

        /* Landing Page Styles */
        #landing-view { background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); }

        .gacha-container {
            width: 300px;
            height: 100px;
            overflow: hidden;
            position: relative;
            background: #000;
            border: 4px solid #333;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .spinner-track {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0s linear;
        }

        .spinner-item {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
        }

        .roll-btn {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #7000ff 0%, #4a00aa 100%);
            border: none;
            border-radius: 50px;
            color: white;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
            transition: transform 0.1s, box-shadow 0.3s;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .roll-btn:active { transform: scale(0.92); }
        .roll-btn.glowing { box-shadow: 0 0 40px rgba(112, 0, 255, 0.8); }

        #start-drawing-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: white;
            color: black;
            border-radius: 12px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s all ease;
        }

        #start-drawing-btn.visible { opacity: 1; transform: translateY(0); }

        /* Drawing View Styles */
        #drawing-view { background: #111; z-index: 10; transform: translateY(100%); }
        #drawing-view.active { transform: translateY(0); }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 24px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .tool-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: none;
            background: #2a2a30;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .palette { display: flex; gap: 8px; }
        .swatch {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid transparent;
        }
        .swatch.active { border-color: white; transform: scale(1.1); }

        .slider-container { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; }
        input[type=range] { width: 100px; }
    </style>
</head>
<body>

    <!-- Landing View -->
    <section id="landing-view" class="view">
        <h1 id="main-title" style="margin-bottom: 50px; font-weight: 200; letter-spacing: 4px;">PROJECT: GACHA</h1>
        
        <div class="gacha-container">
            <div id="spinner" class="spinner-track"></div>
        </div>

        <button id="roll-btn" class="roll-btn">ROLL</button>
        <button id="start-drawing-btn">START DRAWING</button>
    </section>

    <!-- Drawing View -->
    <section id="drawing-view" class="view">
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
            
            <div class="toolbar">
                <div class="slider-container">
                    <input type="range" id="brush-size" min="1" max="50" value="5">
                    <span>SIZE</span>
                </div>
                
                <div id="palette" class="palette"></div>
                
                <button class="tool-btn" id="eraser-btn">Eraser</button>
                <button class="tool-btn" id="undo-btn">⤺</button>
                <button class="tool-btn" id="clear-btn">Clear</button>
                <button class="tool-btn" style="background: var(--accent); width: auto; padding: 0 15px;" id="download-btn">Save</button>
            </div>
        </div>
    </section>

    <script type="module">
        import { initDrawingEngine } from './draw.js';

        const items = [
            { name: "Castle", colors: ["#7d7d7d", "#4a4a4a", "#ffd700", "#c0c0c0", "#333"], theme: "stone" },
            { name: "Spaceship", colors: ["#000080", "#00ffff", "#ffffff", "#333333", "#1a1a1a"], theme: "space" },
            { name: "Dragon", colors: ["#dc143c", "#ff4500", "#8b0000", "#ffd700", "#000"], theme: "fire" },
            { name: "Treehouse", colors: ["#8b4513", "#228b22", "#deb887", "#006400", "#556b2f"], theme: "forest" },
            { name: "Robot", colors: ["#c0c0c0", "#00ff00", "#333333", "#808080", "#4682b4"], theme: "tech" },
            { name: "Lighthouse", colors: ["#005b96", "#ffffff", "#ff0000", "#f0e68c", "#002b5b"], theme: "ocean" },
            { name: "Cyberpunk", colors: ["#ff00ff", "#00ffff", "#ffff00", "#121212", "#0000ff"], theme: "neon" },
            { name: "Undersea", colors: ["#00008b", "#20b2aa", "#ff7f50", "#48d1cc", "#0000cd"], theme: "deep" },
            { name: "Volcano", colors: ["#4b0082", "#ff0000", "#ff8c00", "#000000", "#696969"], theme: "magma" },
            { name: "Cloud City", colors: ["#87ceeb", "#f0f8ff", "#ffd700", "#ffffff", "#b0c4de"], theme: "sky" },
            { name: "Ice Palace", colors: ["#e0ffff", "#00ced1", "#ffffff", "#4682b4", "#b0e0e6"], theme: "ice" },
            { name: "Jungle", colors: ["#006400", "#32cd32", "#8b4513", "#ffd700", "#2e8b57"], theme: "nature" },
            { name: "Moon Base", colors: ["#d3d3d3", "#000000", "#ffffff", "#696969", "#708090"], theme: "lunar" },
            { name: "Clockwork", colors: ["#b8860b", "#8b4513", "#000000", "#cd7f32", "#5f9ea0"], theme: "steam" },
            { name: "Wizard Tower", colors: ["#483d8b", "#9400d3", "#ffd700", "#000000", "#6a5acd"], theme: "magic" }
        ];

        const spinner = document.getElementById('spinner');
        const rollBtn = document.getElementById('roll-btn');
        const startBtn = document.getElementById('start-drawing-btn');
        let selectedItem = null;

        // Populate Spinner
        function setupSpinner() {
            const list = [...items, ...items, ...items]; // Triple for scroll length
            spinner.innerHTML = list.map(item => `
                <div class="spinner-item" style="color: ${item.colors[0]}">${item.name}</div>
            `).join('');
        }

        rollBtn.addEventListener('click', () => {
            rollBtn.disabled = true;
            rollBtn.classList.add('glowing');
            startBtn.classList.remove('visible');
            
            const randomIndex = Math.floor(Math.random() * items.length);
            selectedItem = items[randomIndex];
            
            // Animation values
            const itemHeight = 100;
            const stopAt = (items.length * 2 + randomIndex) * itemHeight;
            const duration = 4000;

            spinner.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0, 0.15, 1)`;
            spinner.style.filter = 'blur(8px)';
            spinner.style.transform = `translateY(-${stopAt}px)`;

            setTimeout(() => {
                spinner.style.filter = 'blur(0px)';
                rollBtn.classList.remove('glowing');
                startBtn.classList.add('visible');
                
                // Highlight flash
                const finalItems = document.querySelectorAll('.spinner-item');
                const target = finalItems[items.length * 2 + randomIndex];
                target.style.transition = 'all 0.3s';
                target.style.transform = 'scale(1.2)';
                target.style.textShadow = `0 0 20px ${selectedItem.colors[0]}`;
            }, duration);
        });

        startBtn.addEventListener('click', () => {
            document.getElementById('drawing-view').classList.add('active');
            initDrawingEngine('mainCanvas', selectedItem.name, selectedItem);
        });

        setupSpinner();
    </script>
</body>
</html>
