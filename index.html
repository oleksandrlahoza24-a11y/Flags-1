<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Rock & Cotton iPad Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            overflow: hidden; /* Prevents scrolling */
            font-family: 'Arial', sans-serif;
            touch-action: none; /* Disables double-tap zoom */
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
        }

        #message {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #bdc3c7;
            font-size: 18px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        Rocks Broken: <span id="rockScore">0</span><br>
        Cotton Picked: <span id="cottonScore">0</span>
    </div>

    <div id="message">Tap 🪨 (3 taps to break) and ☁️ (1 tap to pick)!</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const rockScoreEl = document.getElementById('rockScore');
        const cottonScoreEl = document.getElementById('cottonScore');

        let rocksBroken = 0;
        let cottonPicked = 0;
        let gameObjects = [];

        // Game settings
        const SPAWN_RATE = 0.02; // Probability of spawning per frame
        const MAX_OBJECTS = 10;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class GameObject {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = Math.random() * (canvas.height - 150) + 100;
                this.size = 60;
                this.health = (type === 'rock') ? 3 : 1;
                this.alive = true;
                this.scale = 0; // For pop-in animation
            }

            draw() {
                if (!this.alive) return;
                
                // Pop-in effect
                if (this.scale < 1) this.scale += 0.1;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '50px Arial';

                if (this.type === 'rock') {
                    // Visual damage indicator
                    ctx.globalAlpha = this.health / 3; 
                    ctx.fillText('🪨', 0, 0);
                    // Add crack overlay if damaged
                    if (this.health < 3) {
                        ctx.strokeStyle = 'black';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(-10, -10); ctx.lineTo(10, 10);
                        ctx.stroke();
                    }
                } else {
                    ctx.fillText('☁️', 0, 0);
                }

                ctx.restore();
            }

            checkTap(tx, ty) {
                const dist = Math.sqrt((tx - this.x)**2 + (ty - this.y)**2);
                if (dist < this.size / 2) {
                    this.health--;
                    if (this.health <= 0) {
                        this.alive = false;
                        if (this.type === 'rock') {
                            rocksBroken++;
                            rockScoreEl.innerText = rocksBroken;
                        } else {
                            cottonPicked++;
                            cottonScoreEl.innerText = cottonPicked;
                        }
                    }
                    return true;
                }
                return false;
            }
        }

        function handleInput(e) {
            e.preventDefault();
            // Supports multi-touch
            const touches = e.changedTouches ? e.changedTouches : [e];
            
            for (let i = 0; i < touches.length; i++) {
                const tx = touches[i].clientX;
                const ty = touches[i].clientY;

                // Check objects from top to bottom (most recently spawned)
                for (let j = gameObjects.length - 1; j >= 0; j--) {
                    if (gameObjects[j].checkTap(tx, ty)) {
                        break; // Only hit one object per tap
                    }
                }
            }
        }

        // Listen for both touch and mouse (for testing)
        canvas.addEventListener('touchstart', handleInput, { passive: false });
        canvas.addEventListener('mousedown', handleInput);

        function spawn() {
            if (gameObjects.length < MAX_OBJECTS && Math.random() < SPAWN_RATE) {
                const type = Math.random() > 0.5 ? 'rock' : 'cotton';
                gameObjects.push(new GameObject(type));
            }
        }

        function update() {
            // Remove dead objects
            gameObjects = gameObjects.filter(obj => obj.alive);
            spawn();
        }

        function draw() {
            // Create a grass-like background
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw objects
            gameObjects.forEach(obj => obj.draw());
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
