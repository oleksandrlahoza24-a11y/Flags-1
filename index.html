<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Voxel Farm & Craft</title>
    <style>
        :root { --pixel-border: 4px solid #fff; --bg-ui: rgba(0,0,0,0.8); }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        
        /* UI Overlays */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        .panel { pointer-events: auto; background: var(--bg-ui); border: var(--pixel-border); padding: 15px; }

        #stats { position: absolute; top: 20px; left: 20px; font-size: 20px; text-shadow: 2px 2px 0 #000; }
        
        #inventory { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; padding: 10px; align-items: center;
        }
        .slot { 
            width: 60px; height: 60px; background: #444; border: 2px solid #888;
            display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative;
        }
        .count { position: absolute; bottom: 2px; right: 4px; font-size: 14px; color: #0f0; font-weight: bold; }

        /* Crafting Menu */
        #kitchen-btn { position: absolute; top: 20px; right: 20px; font-size: 40px; cursor: pointer; }
        #craft-menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; width: 300px; text-align: center;
        }
        .recipe { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; background: #333; padding: 10px; border: 1px solid #555;
        }
        button { background: #2ecc71; border: none; color: white; padding: 8px; cursor: pointer; font-family: inherit; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }

        canvas { image-rendering: pixelated; display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="stats">
            Gatherer Level: <span id="level">1</span><br>
            EXP: <span id="exp">0</span>/100
        </div>

        <div id="kitchen-btn" onclick="toggleMenu('craft-menu')">🍳</div>

        <div id="craft-menu" class="panel">
            <h3>VOXEL KITCHEN</h3>
            <div class="recipe">
                <span>🍉 Juice (1 WM)</span>
                <button onclick="craft('juice')">CRAFT</button>
            </div>
            <div class="recipe">
                <span>🥗 Salad (1 WM + 1 CT)</span>
                <button onclick="craft('salad')">CRAFT</button>
            </div>
            <button onclick="toggleMenu('craft-menu')" style="background:#e74c3c; margin-top:10px;">CLOSE</button>
        </div>

        <div id="inventory" class="panel">
            <div class="slot" onclick="consume('rock')">🪨<span class="count" id="inv-rock">0</span></div>
            <div class="slot" onclick="consume('cotton')">☁️<span class="count" id="inv-cotton">0</span></div>
            <div class="slot" onclick="consume('watermelon')">🍉<span class="count" id="inv-watermelon">0</span></div>
            <div class="slot" onclick="consume('juice')">🍹<span class="count" id="inv-juice">0</span></div>
            <div class="slot" onclick="consume('salad')">🥗<span class="count" id="inv-salad">0</span></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- GAME DATA ---
        const inv = { rock: 0, cotton: 0, watermelon: 0, juice: 0, salad: 0 };
        let exp = 0; let level = 1;

        // --- 3D ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 30);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        const pScale = 3; // Pixelation scale
        renderer.setSize(window.innerWidth / pScale, window.innerHeight / pScale, false);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(5, 10, 5); scene.add(sun);

        // --- WORLD ---
        const worldGroup = new THREE.Group(); scene.add(worldGroup);
        const gameObjects = [];

        // Ground
        const grass = new THREE.Mesh(new THREE.BoxGeometry(20, 1, 20), new THREE.MeshLambertMaterial({color: 0x4CAF50}));
        grass.position.y = -0.5; scene.add(grass);

        // Farming Dirt Patch
        const dirt = new THREE.Mesh(new THREE.BoxGeometry(6, 1.1, 6), new THREE.MeshLambertMaterial({color: 0x5d4037}));
        dirt.position.set(0, -0.5, 3);
        dirt.userData = { type: 'soil' };
        scene.add(dirt);
        gameObjects.push(dirt);

        // --- FACTORIES ---
        const createVoxelObj = (type, x, z) => {
            const group = new THREE.Group();
            let geo, mat;

            if(type === 'rock') {
                mat = new THREE.MeshLambertMaterial({color: 0x95a5a6});
                for(let i=0; i<3; i++) {
                    const b = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), mat);
                    b.position.set(Math.random()*0.4, 0.4, Math.random()*0.4);
                    group.add(b);
                }
                group.userData = { type, health: 3 };
            } else if(type === 'cotton') {
                const stem = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshLambertMaterial({color: 0x27ae60}));
                const puff = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshLambertMaterial({color: 0xffffff}));
                puff.position.y = 0.5; group.add(stem, puff);
                group.userData = { type, health: 1 };
            } else if(type === 'seed') {
                const seed = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshLambertMaterial({color: 0x1e8449}));
                group.add(seed);
                group.userData = { type: 'plant', stage: 0, timer: 0 };
            }

            group.position.set(x, 0, z);
            worldGroup.add(group);
            gameObjects.push(group);
            return group;
        };

        // Initial Spawns
        for(let i=0; i<6; i++) {
            createVoxelObj('rock', Math.random()*16-8, Math.random()*-6-2);
            createVoxelObj('cotton', Math.random()*16-8, Math.random()*-6-2);
        }

        // --- INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function handleTouch(e) {
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(gameObjects, true);

            if(hits.length > 0) {
                let obj = hits[0].object;
                while(obj.parent && !obj.userData.type) obj = obj.parent;
                
                const type = obj.userData.type;
                if(type === 'rock' || type === 'cotton') harvest(obj);
                if(type === 'soil') plantSeed(hits[0].point);
                if(type === 'plant' && obj.userData.stage >= 2) pickWatermelon(obj);
            }
        }

        function harvest(obj) {
            obj.userData.health--;
            obj.scale.multiplyScalar(1.1);
            setTimeout(() => obj.scale.set(1,1,1), 50);

            if(obj.userData.health <= 0) {
                inv[obj.userData.type]++;
                gainExp(20);
                removeObj(obj);
                setTimeout(() => createVoxelObj(obj.userData.type, Math.random()*16-8, Math.random()*-6-2), 3000);
            }
            updateUI();
        }

        function plantSeed(point) {
            createVoxelObj('seed', point.x, point.z);
        }

        function pickWatermelon(obj) {
            inv.watermelon++;
            gainExp(30);
            removeObj(obj);
            updateUI();
        }

        function removeObj(obj) {
            worldGroup.remove(obj);
            const idx = gameObjects.indexOf(obj);
            if(idx > -1) gameObjects.splice(idx, 1);
        }

        // --- GAME LOGIC ---
        function gainExp(amt) {
            exp += amt;
            if(exp >= 100) { exp = 0; level++; }
            updateUI();
        }

        function updateUI() {
            document.getElementById('inv-rock').innerText = inv.rock;
            document.getElementById('inv-cotton').innerText = inv.cotton;
            document.getElementById('inv-watermelon').innerText = inv.watermelon;
            document.getElementById('inv-juice').innerText = inv.juice;
            document.getElementById('inv-salad').innerText = inv.salad;
            document.getElementById('exp').innerText = exp;
            document.getElementById('level').innerText = level;
        }

        window.toggleMenu = (id) => {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        };

        window.craft = (item) => {
            if(item === 'juice' && inv.watermelon >= 1) {
                inv.watermelon--; inv.juice++; gainExp(50);
            } else if(item === 'salad' && inv.watermelon >= 1 && inv.cotton >= 1) {
                inv.watermelon--; inv.cotton--; inv.salad++; gainExp(80);
            }
            updateUI();
        };

        window.consume = (item) => {
            if(inv[item] > 0) {
                inv[item]--;
                camera.position.y += 0.5; // "Jump" effect
                setTimeout(() => camera.position.y -= 0.5, 100);
                updateUI();
            }
        };

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Grow plants
            gameObjects.forEach(obj => {
                if(obj.userData.type === 'plant' && obj.userData.stage < 2) {
                    obj.userData.timer += 0.01;
                    if(obj.userData.timer > 2 && obj.userData.stage === 0) {
                        obj.userData.stage = 1;
                        obj.children[0].scale.set(2, 4, 2); // Grow sprout
                        obj.children[0].material.color.set(0x2ecc71);
                    }
                    if(obj.userData.timer > 5 && obj.userData.stage === 1) {
                        obj.userData.stage = 2;
                        // Turn into big Watermelon block
                        obj.children[0].scale.set(4, 3, 5); 
                        obj.children[0].material.color.set(0x1d8348);
                    }
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouch(e); }, { passive: false });
        window.addEventListener('mousedown', handleTouch);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth / pScale, window.innerHeight / pScale, false);
        });

        animate();
        updateUI();
    </script>
</body>
</html>
