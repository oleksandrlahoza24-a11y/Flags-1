<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glow Hunter - Silhouette World</title>
    <style>
        :root {
            --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --accent: #7de8ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            user-select: none;
            touch-action: none;
            font-family: var(--ui-font);
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .inventory-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            font-size: 0.9em;
            opacity: 0.8;
        }

        #merchant-ui {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            pointer-events: auto;
        }

        .btn {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 0 20px rgba(125, 232, 255, 0.4);
            cursor: pointer;
        }

        /* Touch Controls */
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: auto;
        }

        #joystick-knob {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        #action-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            pointer-events: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #action-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        .notif {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="stats">
            <div style="font-size: 0.8em; opacity: 0.7;">LIGHT SHARDS</div>
            <div id="currency" style="font-size: 1.8em; font-weight: bold;">0</div>
        </div>

        <div class="inventory-hint" id="inv-display">
            Scrap: 0 | Coins: 0 | Stones: 0
        </div>

        <div id="merchant-ui">
            <button class="btn" id="sell-btn">SELL ALL ITEMS</button>
        </div>

        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>

        <div id="action-btn">DIG</div>

        <div id="notification" class="notif">Obtained Scrap!</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const sellBtn = document.getElementById('sell-btn');
    const actionBtn = document.getElementById('action-btn');
    const joystickContainer = document.getElementById('joystick-container');
    const joystickKnob = document.getElementById('joystick-knob');

    // Game Constants
    const WORLD_WIDTH = 3000;
    const WORLD_HEIGHT = 1000;
    const GROUND_LEVEL = 800;

    // Game State
    let width, height;
    let time = 0;
    const player = {
        x: 400,
        y: GROUND_LEVEL - 60,
        w: 30,
        h: 60,
        vx: 0,
        speed: 5,
        isDigging: false,
        digTimer: 0
    };

    const camera = { x: 0, y: 0 };
    const inventory = { scrap: 0, coins: 0, stones: 0 };
    let currency = 0;

    const particles = [];
    const digSpots = [];
    const trees = [];
    const merchant = { x: 400, y: GROUND_LEVEL, w: 50, h: 90 };

    // Joystick State
    let joyActive = false;
    let joyOrigin = { x: 0, y: 0 };
    let joyMove = { x: 0, y: 0 };

    // --- Initialization ---

    function init() {
        resize();
        generateWorld();
        loop();
    }

    function generateWorld() {
        // Create trees
        for (let i = 0; i < 40; i++) {
            trees.push({
                x: Math.random() * WORLD_WIDTH,
                size: 40 + Math.random() * 100,
                type: Math.floor(Math.random() * 2)
            });
        }
        // Create dig spots
        for (let i = 0; i < 15; i++) {
            spawnDigSpot();
        }
    }

    function spawnDigSpot() {
        digSpots.push({
            x: 100 + Math.random() * (WORLD_WIDTH - 200),
            y: GROUND_LEVEL,
            radius: 25 + Math.random() * 15,
            active: true
        });
    }

    // --- Core Systems ---

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    window.addEventListener('resize', resize);

    // --- Input Handling ---

    joystickContainer.addEventListener('touchstart', (e) => {
        joyActive = true;
        const rect = joystickContainer.getBoundingClientRect();
        joyOrigin = { x: rect.left + 60, y: rect.top + 60 };
    });

    window.addEventListener('touchmove', (e) => {
        if (!joyActive) return;
        const touch = e.touches[0];
        const dist = Math.hypot(touch.clientX - joyOrigin.x, touch.clientY - joyOrigin.y);
        const maxDist = 50;
        const angle = Math.atan2(touch.clientY - joyOrigin.y, touch.clientX - joyOrigin.x);
        
        const moveDist = Math.min(dist, maxDist);
        joyMove.x = Math.cos(angle) * (moveDist / maxDist);
        
        joystickKnob.style.transform = `translate(${joyMove.x * maxDist}px, ${Math.sin(angle) * moveDist}px)`;
        player.vx = joyMove.x * player.speed;
    });

    window.addEventListener('touchend', () => {
        joyActive = false;
        joyMove = { x: 0, y: 0 };
        player.vx = 0;
        joystickKnob.style.transform = `translate(0,0)`;
    });

    actionBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        tryDig();
    });

    sellBtn.addEventListener('click', () => {
        const total = (inventory.scrap * 10) + (inventory.coins * 50) + (inventory.stones * 150);
        if (total > 0) {
            currency += total;
            inventory.scrap = 0;
            inventory.coins = 0;
            inventory.stones = 0;
            updateUI();
            createExplosion(merchant.x, merchant.y - 50, '#7de8ff', 20);
        }
    });

    // --- Game Logic ---

    function tryDig() {
        if (player.isDigging) return;

        let nearSpot = null;
        digSpots.forEach(spot => {
            if (spot.active && Math.abs(player.x - spot.x) < 40) {
                nearSpot = spot;
            }
        });

        player.isDigging = true;
        player.digTimer = 60; // 1 second at 60fps

        if (nearSpot) {
            setTimeout(() => finishDig(nearSpot), 600);
        } else {
            setTimeout(() => {
                player.isDigging = false;
                showNotification("Nothing here...");
            }, 600);
        }
    }

    function finishDig(spot) {
        player.isDigging = false;
        spot.active = false;
        
        // Random loot
        const rand = Math.random();
        let item = "";
        if (rand < 0.6) {
            inventory.scrap++;
            item = "Scrap";
        } else if (rand < 0.9) {
            inventory.coins++;
            item = "Ancient Coin";
        } else {
            inventory.stones++;
            item = "Glow-stone";
            createExplosion(spot.x, spot.y - 10, '#7de8ff', 15);
        }
        
        createExplosion(spot.x, spot.y - 10, '#555', 10);
        showNotification(`Found ${item}!`);
        updateUI();

        // Respawn spot elsewhere
        setTimeout(spawnDigSpot, 5000);
    }

    function updateUI() {
        document.getElementById('currency').innerText = currency;
        document.getElementById('inv-display').innerText = 
            `Scrap: ${inventory.scrap} | Coins: ${inventory.coins} | Stones: ${inventory.stones}`;
    }

    function showNotification(text) {
        const n = document.getElementById('notification');
        n.innerText = text;
        n.style.opacity = "1";
        setTimeout(() => n.style.opacity = "0", 2000);
    }

    function createExplosion(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 1) * 8,
                life: 1.0,
                color: color
            });
        }
    }

    function update() {
        time += 0.002;

        // Move Player
        if (!player.isDigging) {
            player.x += player.vx;
        }
        
        // Clamp Player
        if (player.x < 50) player.x = 50;
        if (player.x > WORLD_WIDTH - 50) player.x = WORLD_WIDTH - 50;

        // Camera follow
        const targetCamX = player.x - width / 2;
        camera.x += (targetCamX - camera.x) * 0.1;
        camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH - width));

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2; // gravity
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // Merchant Proximity
        const distToMerchant = Math.abs(player.x - merchant.x);
        document.getElementById('merchant-ui').style.display = distToMerchant < 80 ? 'block' : 'none';
    }

    // --- Rendering ---

    function draw() {
        // 1. Draw Background (Day/Night Cycle)
        const dayProgress = (Math.sin(time) + 1) / 2; // 0 to 1
        const skyTop = `rgb(5, 5, ${20 + dayProgress * 40})`;
        const skyBot = `rgb(${10 + dayProgress * 20}, ${5 + dayProgress * 10}, ${20 + dayProgress * 30})`;
        
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, skyTop);
        grad.addColorStop(1, skyBot);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // 2. Draw Trees (Silhouettes)
        ctx.fillStyle = "black";
        trees.forEach(t => {
            ctx.beginPath();
            if (t.type === 0) {
                ctx.moveTo(t.x, GROUND_LEVEL);
                ctx.lineTo(t.x + t.size/2, GROUND_LEVEL - t.size * 1.5);
                ctx.lineTo(t.x + t.size, GROUND_LEVEL);
            } else {
                ctx.fillRect(t.x, GROUND_LEVEL - t.size, t.size/4, t.size);
                ctx.arc(t.x + t.size/8, GROUND_LEVEL - t.size, t.size/2, 0, Math.PI * 2);
            }
            ctx.fill();
        });

        // 3. Draw Merchant
        ctx.fillStyle = "black";
        ctx.fillRect(merchant.x - merchant.w/2, merchant.y - merchant.h, merchant.w, merchant.h);
        // Merchant Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = "white";
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.strokeRect(merchant.x - merchant.w/2, merchant.y - merchant.h, merchant.w, merchant.h);
        ctx.shadowBlur = 0;

        // 4. Draw Dig Spots
        digSpots.forEach(spot => {
            if (!spot.active) return;
            
            // Subtle pulse glow
            const pulse = Math.sin(Date.now() / 400) * 5;
            ctx.fillStyle = "rgba(125, 232, 255, 0.2)";
            ctx.beginPath();
            ctx.ellipse(spot.x, spot.y, spot.radius + pulse, spot.radius/3 + pulse/3, 0, 0, Math.PI * 2);
            ctx.fill();

            // Tufts of grass
            ctx.fillStyle = "black";
            ctx.fillRect(spot.x - 10, spot.y - 5, 2, -8);
            ctx.fillRect(spot.x, spot.y - 5, 2, -12);
            ctx.fillRect(spot.x + 10, spot.y - 5, 2, -8);
        });

        // 5. Draw Ground
        ctx.fillStyle = "black";
        ctx.fillRect(camera.x, GROUND_LEVEL, width, WORLD_HEIGHT - GROUND_LEVEL);

        // 6. Draw Player
        ctx.save();
        ctx.translate(player.x, player.y);
        if (player.isDigging) {
            ctx.rotate(Math.sin(Date.now() / 50) * 0.2); // Shake effect
        }
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.roundRect(-player.w/2, -player.h, player.w, player.h, 10);
        ctx.fill();
        
        // Player "Eyes" (Glow)
        ctx.fillStyle = "white";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "white";
        ctx.beginPath();
        ctx.arc(-5, -player.h + 15, 3, 0, Math.PI * 2);
        ctx.arc(8, -player.h + 15, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // 7. Particles
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            if (p.color !== 'black') {
                ctx.shadowBlur = 5;
                ctx.shadowColor = p.color;
            }
            ctx.fillRect(p.x, p.y, 4, 4);
            ctx.shadowBlur = 0;
        });
        ctx.globalAlpha = 1.0;

        ctx.restore();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // Polyfill for roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            return this;
        }
    }

    init();
</script>
</body>
</html>
