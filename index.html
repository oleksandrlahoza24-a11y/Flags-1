<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Quiet Desk - Library PC Simulator</title>
    <style>
        :root {
            --win-blue: #004e98;
            --win-glass: rgba(255, 255, 255, 0.3);
            --win-border: rgba(255, 255, 255, 0.4);
            --win-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --taskbar-bg: rgba(20, 40, 60, 0.85);
            --aero-glow: 0 0 15px rgba(0, 150, 255, 0.8);
            --font-main: 'Segoe UI', Tahoma, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a1a1a;
            font-family: var(--font-main);
        }

        /* --- THE AMBIENT DESK --- */
        #game-world {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #4a3728; /* Wood color */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 10s ease;
        }

        #desk-surface {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.4) 100%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 10px),
                linear-gradient(90deg, #5d4037, #3e2723);
        }

        .desk-item {
            position: absolute;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        #coffee-mug { width: 60px; height: 60px; top: 15%; right: 5%; display: none; }
        #lamp { width: 100px; height: 150px; top: 5%; left: 5%; display: none; opacity: 0.8; }
        #sticky-note { width: 70px; height: 70px; bottom: 20%; left: 8%; background: #ffff88; padding: 5px; font-size: 10px; transform: rotate(-5deg); box-shadow: 2px 2px 2px rgba(0,0,0,0.2); pointer-events: auto; }

        /* --- THE MONITOR --- */
        #monitor-bezel {
            position: relative;
            width: 95vw;
            height: 85vh;
            background: #222;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 10px rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #pc-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #004e98;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: default;
        }

        /* --- WINDOWS 7 UI ELEMENTS --- */
        #desktop {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #1e90ff 0%, #003366 100%);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            grid-template-rows: repeat(auto-fill, 100px);
            grid-auto-flow: column;
            gap: 15px;
        }

        .desktop-icon {
            width: 80px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 2px black;
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 13px;
            padding: 5px;
        }

        .desktop-icon:active {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            margin-bottom: 5px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Taskbar */
        #taskbar {
            height: 48px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 9999;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        #start-button {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #4CAF50, #2E7D32);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #taskbar-apps {
            display: flex;
            gap: 5px;
            flex-grow: 1;
            height: 100%;
            align-items: center;
        }

        .taskbar-item {
            width: 44px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .taskbar-item.active {
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: inset 0 0 5px rgba(255,255,255,0.5);
        }

        #system-tray {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 12px;
            padding: 0 10px;
            border-left: 1px solid rgba(255,255,255,0.2);
        }

        /* --- WINDOW SYSTEM --- */
        .window {
            position: absolute;
            min-width: 300px;
            min-height: 200px;
            background: #f0f0f0;
            border-radius: 8px 8px 0 0;
            box-shadow: var(--win-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--win-border);
        }

        .window.active {
            z-index: 1000;
        }

        .window-titlebar {
            height: 35px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.5), rgba(255,255,255,0.2));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: #000;
            font-weight: 600;
            cursor: move;
        }

        .window.active .window-titlebar {
            background: linear-gradient(to bottom, rgba(0,120,215,0.7), rgba(0,120,215,0.5));
            color: white;
        }

        .window-controls {
            margin-left: auto;
            display: flex;
            gap: 5px;
        }

        .win-btn {
            width: 30px;
            height: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 2px;
            font-size: 14px;
            font-weight: bold;
        }

        .win-close { background: #e81123; color: white; }
        .win-min { background: rgba(0,0,0,0.1); }
        .win-max { background: rgba(0,0,0,0.1); }

        .window-content {
            flex-grow: 1;
            background: white;
            position: relative;
            overflow: auto;
        }

        /* --- WEBEXPLORER STYLING --- */
        .browser-ui {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .browser-toolbar {
            background: #f0f0f0;
            padding: 5px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .address-bar {
            flex-grow: 1;
            height: 30px;
            border: 1px solid #aaa;
            padding: 0 10px;
            display: flex;
            align-items: center;
            background: white;
        }

        .browser-viewport {
            flex-grow: 1;
            background: #fff;
            overflow-y: scroll;
            padding: 20px;
        }

        /* --- NOTIFICATIONS --- */
        #notification-center {
            position: absolute;
            bottom: 60px;
            right: 20px;
            width: 300px;
            z-index: 10000;
        }

        .notification {
            background: #fff;
            border: 1px solid #888;
            border-radius: 5px;
            padding: 15px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
            border-left: 5px solid #004e98;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- HUD --- */
        #top-hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: rgba(0,0,0,0.5);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            z-index: 10001;
            pointer-events: none;
        }

        .hud-stat { margin-right: 20px; display: flex; align-items: center; gap: 5px; }

        /* iPad specific adjustments */
        @media (orientation: landscape) {
            .desktop-icon { width: 100px; height: 110px; font-size: 15px; }
            .win-btn { width: 44px; height: 35px; } /* Larger touch targets */
        }

        /* Shop Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }
        .shop-item {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .shop-item button {
            margin-top: 10px;
            padding: 8px 15px;
            background: #0078d7;
            color: white;
            border: none;
            border-radius: 3px;
        }
        .shop-item button:disabled { background: #ccc; }

        /* Progress Bar for Slow Internet */
        #browser-loading-bar {
            height: 3px;
            background: #0078d7;
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>

    <div id="game-world">
        <div id="desk-surface"></div>
        
        <div id="sticky-note">
            <b>TODO:</b><br>
            - Help patrons<br>
            - Check local business info<br>
            - Upgrade router
        </div>

        <div id="monitor-bezel">
            <div id="pc-screen">
                <div id="top-hud">
                    <div class="hud-stat">💰 <span id="lc-balance">0</span> LC</div>
                    <div class="hud-stat">📅 <span id="game-date">Monday</span></div>
                    <div class="hud-stat" id="save-indicator" style="opacity:0">💾 Saving...</div>
                </div>

                <div id="desktop">
                    <!-- Icons generated by JS -->
                </div>

                <div id="notification-center"></div>

                <div id="taskbar">
                    <div id="start-button">
                        <svg viewBox="0 0 100 100" width="20" height="20">
                            <path d="M5 20 L45 15 L45 45 L5 45 Z" fill="#f35325"/>
                            <path d="M55 14 L95 10 L95 45 L55 45 Z" fill="#81bc06"/>
                            <path d="M5 55 L45 55 L45 85 L5 80 Z" fill="#05a6f0"/>
                            <path d="M55 55 L95 55 L95 90 L55 86 Z" fill="#ffba08"/>
                        </svg>
                    </div>
                    <div id="taskbar-apps"></div>
                    <div id="system-tray">
                        <span id="tray-wifi">📶</span>
                        <span id="tray-vol">🔊</span>
                        <span id="tray-clock">00:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
