<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gen-3: Behavior Engine</title>
    <style>
        :root { --neon: #00d4ff; --bg: #080a0f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #ai-wrap { width: 95%; max-width: 600px; height: 80vh; background: #11141b; border: 1px solid #222; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 12px 18px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; max-width: 80%; }
        .user { align-self: flex-end; background: var(--neon); color: #000; font-weight: 500; }
        .ai { align-self: flex-start; background: #1e232d; border: 1px solid #2d343f; }
        #input-area { padding: 20px; background: #0c0f14; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1f26; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--neon); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .label { font-size: 0.7rem; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .value { color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

<div id="ai-wrap">
    <div id="header">
        <div>
            <div class="label">Identity</div>
            <div class="value">Nexus v3.0</div>
        </div>
        <div style="text-align: right;">
            <div class="label">Learned Behaviors</div>
            <div id="b-count" class="value">0</div>
        </div>
    </div>

    <div id="chat-window">
        <div class="msg ai">My social protocols are empty. Tell me how to interact with you (e.g., "Respond to 'Hi' with 'Hello there!'") or teach me facts.</div>
    </div>

    <form id="input-area">
        <input type="text" id="user-input" placeholder="Interact or Teach..." autocomplete="off">
        <button type="submit">SEND</button>
    </form>
</div>

<script src="ai-model.js"></script>
<script>
    const chat = document.getElementById('chat-window');
    const form = document.getElementById('input-area');
    const input = document.getElementById('user-input');
    const bCount = document.getElementById('b-count');

    form.onsubmit = (e) => {
        e.preventDefault();
        const val = input.value.trim();
        if(!val) return;

        chat.innerHTML += `<div class="msg user">${val}</div>`;
        input.value = "";
        
        setTimeout(() => {
            const response = CustomAI.process(val);
            chat.innerHTML += `<div class="msg ai">${response}</div>`;
            chat.scrollTop = chat.scrollHeight;
            bCount.innerText = CustomAI.getComplexity();
        }, 400);
    };
</script>
</body>
</html>
