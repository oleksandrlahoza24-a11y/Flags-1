function toggleAssets() {
  const panel = document.getElementById('assets-panel');
  panel.classList.toggle('open');
}

function handleFileUpload(event) {
  const files = event.target.files;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const data = e.target.result;
      const name = file.name;
      if (file.type.startsWith('image/')) {
        const img = new Image();
        img.src = data;
        state.assets[name] = { type: 'image', url: data, __img: img };
      } else if (file.type.startsWith('audio/')) {
        const audio = new Audio(data);
        state.assets[name] = { type: 'audio', url: data, __audio: audio };
      } else {
        state.assets[name] = { type: 'data', data };
      }
      renderAssets();
      showToast(`✓ Loaded: ${name}`, 'success');
    };
    reader.readAsDataURL(file);
  }
  event.target.value = '';
}

function renderAssets() {
  const zone = document.getElementById('asset-drop-zone');
  const keys = Object.keys(state.assets);
  document.getElementById('sb-assets').innerHTML = `<b>${keys.length}</b> asset${keys.length !== 1 ? 's' : ''}`;
  if (keys.length === 0) {
    zone.classList.remove('has-assets');
    zone.innerHTML = '<span style="font-size:24px">📂</span><span>Drop files or tap to upload</span>';
    zone.onclick = () => document.getElementById('file-upload').click();
    return;
  }
  zone.classList.add('has-assets');
  zone.innerHTML = keys.map(k => {
    const a = state.assets[k];
    const icon = a.type === 'image' ? '🖼️' : a.type === 'audio' ? '🎵' : '📄';
    return `<div class="asset-item" title="${k}"><span class="asset-icon">${icon}</span><span class="asset-name">${k}</span></div>`;
  }).join('');
  // Re-attach click to items, not zone
  zone.onclick = null;
  document.querySelectorAll('.asset-item').forEach((el, i) => {
    el.onclick = () => {
      const name = keys[i];
      const snippet = state.assets[name].type === 'image' ? `c.image("${name}", 0, 0)` : `let snd = Audio.new("${name}")\nsnd.play()`;
      if (state.editor) state.editor.replaceSelection(snippet);
      showToast(`Inserted: ${name}`, 'success');
    };
  });
}

// Drag-and-drop on asset zone
document.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('asset-drop-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; });
  zone.addEventListener('dragleave', () => zone.style.borderColor = '');
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor = '';
    const input = document.getElementById('file-upload');
    const dt = new DataTransfer();
    for (const f of e.dataTransfer.files) dt.items.add(f);
    input.files = dt.files;
    handleFileUpload({ target: input });
  });
});

function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const icons = { success: '✓', error: '✕', warn: '⚠', info: 'ℹ' };
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span>${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2500);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); showCommandPalette(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrentFile(); }
});

function initDragHandles() {
  // Sidebar resize
  const sbHandle = document.getElementById('sidebar-handle');
  let dragging = false, startX, startW;
  sbHandle.addEventListener('mousedown', (e) => {
    dragging = true; startX = e.clientX;
    startW = document.getElementById('sidebar').offsetWidth;
    document.body.style.cursor = 'col-resize';
  });
  // Output panel resize
  const outHandle = document.getElementById('output-handle');
  let outDragging = false, outStartX, outStartW;
  outHandle.addEventListener('mousedown', (e) => {
    outDragging = true; outStartX = e.clientX;
    const panel = document.getElementById('output-panel');
    outStartW = panel.offsetWidth;
    document.body.style.cursor = 'col-resize';
  });

  document.addEventListener('mousemove', (e) => {
    if (dragging) {
      const newW = Math.max(120, Math.min(400, startW + (e.clientX - startX)));
      document.getElementById('sidebar').style.width = newW + 'px';
    }
    if (outDragging) {
      const panel = document.getElementById('output-panel');
      const total = document.getElementById('main-area').offsetWidth;
      const delta = outStartX - e.clientX;
      const newW = Math.max(200, Math.min(total - 300, outStartW + delta));
      panel.style.width = newW + 'px';
      panel.classList.remove('hidden');
    }
  });
  document.addEventListener('mouseup', () => {
    dragging = false; outDragging = false; document.body.style.cursor = '';
  });

  // Console resize
  const consoleResize = document.getElementById('console-resize');
  let cDragging = false, cStartY, cStartH;
  consoleResize.addEventListener('mousedown', (e) => {
    cDragging = true; cStartY = e.clientY;
    cStartH = document.getElementById('console-area').offsetHeight;
    document.body.style.cursor = 'row-resize';
  });
  document.addEventListener('mousemove', (e) => {
    if (cDragging) {
      const newH = Math.max(60, Math.min(400, cStartH - (e.clientY - cStartY)));
      document.getElementById('console-area').style.height = newH + 'px';
    }
  });
  document.addEventListener('mouseup', () => { cDragging = false; });

  // Touch support for handles
  [sbHandle, outHandle].forEach(handle => {
    handle.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      const event = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
      handle.dispatchEvent(event);
    }, { passive: true });
  });
  document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    const event = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
    document.dispatchEvent(event);
  }, { passive: true });
  document.addEventListener('touchend', () => {
    dragging = false; outDragging = false; cDragging = false;
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}
