<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 80%; line-height: 1.4; font-size: 0.95rem; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { border-top: 1px solid #eee; padding: 15px; display: flex; gap: 10px; }
        #user-input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        #send-btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Nexus AI (Custom Model)</div>
    <div id="chat-window">
        <div class="message ai-msg">Hello! I am Nexus, a custom-coded AI. How can I help you today?</div>
    </div>
    <form id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
    </form>
</div>

<!-- Link the custom AI model script -->
<script src="ai-model.js"></script>

<script>
    const chatWindow = document.getElementById('chat-window');
    const inputForm = document.getElementById('input-area');
    const userInput = document.getElementById('user-input');

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-msg`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    inputForm.onsubmit = (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;

        // User Message
        appendMessage(text, 'user');
        userInput.value = '';

        // AI "Thinking" and Response
        setTimeout(() => {
            // Call the function from ai-model.js
            const response = NexusAI.process(text);
            appendMessage(response, 'ai');
        }, 500);
    };
</script>

</body>
</html>
