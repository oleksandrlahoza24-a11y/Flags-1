<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Relational AI</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat-box { width: 90%; max-width: 500px; height: 60vh; background: #1e1e1e; border-radius: 10px; overflow-y: auto; padding: 20px; border: 1px solid #333; margin-bottom: 10px; }
        .msg { margin-bottom: 15px; line-height: 1.5; padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .user { background: #0056b3; align-self: flex-end; margin-left: auto; }
        .ai { background: #333; align-self: flex-start; }
        #input-area { width: 90%; max-width: 500px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #222; color: white; }
        button { padding: 10px 20px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .stats { font-size: 0.8rem; color: #777; margin-top: 10px; }
        #clear-btn { background: #441111; font-size: 0.7rem; margin-left: 10px; }
    </style>
</head>
<body>

    <h2>Nexus Relational AI</h2>
    <div id="chat-box">
        <div class="msg ai">I have no pre-programmed answers. Teach me things by talking to me. My brain is empty until you speak.</div>
    </div>

    <form id="input-area">
        <input type="text" id="user-input" placeholder="Say something..." autocomplete="off">
        <button type="submit">Send</button>
    </form>

    <div class="stats">
        Known Associations: <span id="conn-count">0</span>
        <button id="clear-btn" onclick="CustomAI.forget()">Reset Brain</button>
    </div>

    <script src="ai-model.js"></script>
    <script>
        const chatBox = document.getElementById('chat-box');
        const form = document.getElementById('input-area');
        const input = document.getElementById('user-input');
        const connDisplay = document.getElementById('conn-count');

        function updateStats() {
            connDisplay.innerText = CustomAI.getMemorySize();
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const val = input.value.trim();
            if(!val) return;

            // User Message UI
            chatBox.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = "";

            // AI Response Logic
            setTimeout(() => {
                const response = CustomAI.think(val);
                chatBox.innerHTML += `<div class="msg ai">${response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                updateStats();
            }, 500);
        };

        updateStats();
    </script>
</body>
</html>
