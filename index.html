<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HELLDIVERS 3D: CUSTOM ENGINE</title>
    <style>
        :root {
            --hd-yellow: #ffee00;
            --hd-cyan: #00f2ff;
            --hd-red: #ff3300;
            --hd-bg: #020406;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--hd-bg);
            font-family: 'Courier New', Courier, monospace;
            user-select: none; touch-action: none;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* UI HUD */
        #hud {
            position: absolute; inset: 0; pointer-events: none;
            color: var(--hd-yellow); text-shadow: 0 0 5px black;
        }

        .stratagem-overlay {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            display: none; flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid var(--hd-yellow);
            border-radius: 10px; pointer-events: auto;
        }

        .code-row { display: flex; gap: 10px; margin-top: 10px; font-size: 30px; }

        /* CONTROLS */
        .ctrl-zone {
            position: absolute; bottom: 40px; width: 200px; height: 200px;
            background: rgba(255,255,255,0.05); border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: auto;
        }
        #move-zone { left: 40px; }
        #aim-zone { right: 40px; }
        .knob {
            position: absolute; width: 60px; height: 60px; background: var(--hd-yellow);
            border-radius: 50%; top: 70px; left: 70px; box-shadow: 0 0 20px var(--hd-yellow);
        }

        #action-buttons {
            position: absolute; bottom: 260px; right: 40px; display: flex; flex-direction: column; gap: 20px;
        }

        .btn {
            width: 80px; height: 80px; border-radius: 15px; border: 2px solid var(--hd-yellow);
            background: rgba(0,0,0,0.6); color: var(--hd-yellow); font-weight: bold;
            pointer-events: auto; display: flex; align-items: center; justify-content: center;
        }

        #stratagem-dpad {
            position: absolute; bottom: 40px; left: 40px; width: 250px; height: 250px;
            display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; pointer-events: auto;
        }
        .d-btn { background: rgba(255, 238, 0, 0.2); border: 2px solid var(--hd-yellow); color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="screen"></canvas>

<div id="hud">
    <div id="stratagem-ui" class="stratagem-overlay">
        <div id="strat-name">ORBITAL PRECISION STRIKE</div>
        <div id="strat-code" class="code-row"></div>
    </div>

    <div id="move-zone" class="ctrl-zone"><div class="knob"></div></div>
    <div id="aim-zone" class="ctrl-zone"><div class="knob"></div></div>

    <div id="stratagem-dpad">
        <div></div><div class="d-btn" data-dir="UP">↑</div><div></div>
        <div class="d-btn" data-dir="LEFT">←</div><div class="d-btn" style="border:none"></div><div class="d-btn" data-dir="RIGHT">→</div>
        <div></div><div class="d-btn" data-dir="DOWN">↓</div><div></div>
    </div>

    <div id="action-buttons">
        <div id="btn-strat" class="btn">STRAT</div>
        <div id="btn-dive" class="btn">DIVE</div>
    </div>

    <div style="position:absolute; top:20px; left:20px;">
        <div>OBJECTIVE: ELIMINATE XENO MENACE</div>
        <div id="ammo">AMMO: 30 / 30</div>
    </div>
</div>

<script>
/**
 * CUSTOM 3D ENGINE - "DEMOCRACY RASTERIZER"
 * No WebGL. No libraries. Pure Canvas 2D math.
 */

// --- 1. VECTOR & MATRIX MATH LIBRARY ---
const M3D = {
    project(v, camera, w, h) {
        // Translate relative to camera
        let x = v.x - camera.x;
        let y = v.y - camera.y;
        let z = v.z - camera.z;

        // Rotate based on camera yaw (horizontal)
        let cos = Math.cos(camera.yaw);
        let sin = Math.sin(camera.yaw);
        let tx = x * cos - z * sin;
        let tz = x * sin + z * cos;
        
        // Simple perspective projection
        if (tz < 0.1) return null; // Clipping
        const fov = 400;
        const scale = fov / tz;
        return {
            x: (w / 2) + tx * scale,
            y: (h / 2) + y * scale,
            scale: scale,
            z: tz
        };
    }
};

// --- 2. GAME CONFIG & 100 STRATAGEMS ---
const STRATAGEMS = [];
const DIRS = ["UP", "DOWN", "LEFT", "RIGHT"];
for(let i=0; i<100; i++) {
    let code = [];
    for(let j=0; j<4+(i%4); j++) code.push(DIRS[Math.floor(Math.random()*4)]);
    STRATAGEMS.push({
        name: `COMMAND ${101+i}: ${["STRIKE", "POD", "SENTRY", "BOMB"][i%4]}`,
        code: code,
        type: i % 2 === 0 ? 'ATTACK' : 'SUPPORT'
    });
}

// --- 3. ENGINE STATE ---
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
let width, height;

const STATE = {
    camera: { x: 0, y: -200, z: -400, yaw: 0 },
    player: { x: 0, y: 0, z: 0, yaw: 0, ammo: 30 },
    input: { move: {x:0, y:0}, aim: {x:0, y:0}, stratMode: false, codeIdx: 0, activeStrat: 0 },
    entities: [], // {x, y, z, type, model}
    bullets: [],
    frame: 0
};

// Procedural Models (Vertices)
const MODELS = {
    player: [[-10,0,-10], [10,0,-10], [10,0,10], [-10,0,10], [0,-40,0]], // Pyramid
    enemy: [[-15,0,0], [0,0,15], [15,0,0], [0,0,-15], [0,-30,0]],
    pod: [[-20,-100,-20], [20,-100,-20], [20,0,20], [-20,0,20]], // Dropping Box
    beacon: [[-2,-2,-2], [2,2,2]]
};

// --- 4. CORE ENGINE FUNCTIONS ---
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function spawnEnemy() {
    const ang = Math.random() * Math.PI * 2;
    const dist = 600 + Math.random() * 400;
    STATE.entities.push({
        x: Math.cos(ang) * dist,
        y: 0,
        z: Math.sin(ang) * dist,
        type: 'enemy',
        hp: 3
    });
}

function update() {
    // 1. Move Player
    const moveX = STATE.input.move.x * 5;
    const moveZ = -STATE.input.move.y * 5;
    STATE.player.x += moveX;
    STATE.player.z += moveZ;

    // 2. Camera follows player
    STATE.camera.x += (STATE.player.x - STATE.camera.x) * 0.1;
    STATE.camera.z += (STATE.player.z - 400 - STATE.camera.z) * 0.1;

    // 3. Bullets
    if (Math.abs(STATE.input.aim.x) > 0.1 || Math.abs(STATE.input.aim.y) > 0.1) {
        STATE.player.yaw = Math.atan2(STATE.input.aim.x, -STATE.input.aim.y);
        if (STATE.frame % 10 === 0 && STATE.player.ammo > 0) {
            STATE.bullets.push({
                x: STATE.player.x, y: -20, z: STATE.player.z,
                vx: Math.sin(STATE.player.yaw) * 15,
                vz: Math.cos(STATE.player.yaw) * 15,
                life: 60
            });
            STATE.player.ammo--;
        }
    }
    if (STATE.player.ammo <= 0 && STATE.frame % 120 === 0) STATE.player.ammo = 30;

    STATE.bullets.forEach((b, i) => {
        b.x += b.vx; b.z += b.vz; b.life--;
        if(b.life <= 0) STATE.bullets.splice(i, 1);
    });

    // 4. Enemy Logic
    STATE.entities.forEach((e, i) => {
        if(e.type === 'enemy') {
            const dx = STATE.player.x - e.x;
            const dz = STATE.player.z - e.z;
            const dist = Math.hypot(dx, dz);
            e.x += (dx / dist) * 2;
            e.z += (dz / dist) * 2;

            // Collision with bullets
            STATE.bullets.forEach((b, bi) => {
                if(Math.hypot(e.x - b.x, e.z - b.z) < 30) {
                    e.hp--;
                    STATE.bullets.splice(bi, 1);
                    if(e.hp <= 0) STATE.entities.splice(i, 1);
                }
            });
        }
        
        // Stratagem Pod Logic
        if(e.type === 'pod') {
            if(e.y < 0) e.y += 20; // Falling physics
            else {
                // Slam effect
                if(!e.landed) { e.landed = true; spawnExplosion(e.x, e.z); }
            }
        }
    });

    if(STATE.frame % 100 === 0 && STATE.entities.length < 20) spawnEnemy();
    STATE.frame++;
}

function render() {
    // Clear
    ctx.fillStyle = '#020406';
    ctx.fillRect(0,0,width,height);

    // Draw Floor (3D Grid)
    ctx.strokeStyle = '#0a1520';
    ctx.lineWidth = 1;
    for(let i=-2000; i<=2000; i+=100) {
        // X lines
        drawLine3D(i, 0, -2000, i, 0, 2000, '#0a1520');
        // Z lines
        drawLine3D(-2000, 0, i, 2000, 0, i, '#0a1520');
    }

    // Render Entities
    const allDrawables = [
        ...STATE.entities,
        {x: STATE.player.x, y: STATE.player.y, z: STATE.player.z, type: 'player'}
    ];

    // Z-Sorting (Painter's Algorithm)
    allDrawables.sort((a, b) => {
        const distA = Math.hypot(a.x - STATE.camera.x, a.z - STATE.camera.z);
        const distB = Math.hypot(b.x - STATE.camera.x, b.z - STATE.camera.z);
        return distB - distA;
    });

    allDrawables.forEach(e => {
        const model = MODELS[e.type];
        if(!model) return;
        
        const color = e.type === 'player' ? '#ffee00' : (e.type === 'enemy' ? '#ff3300' : '#00f2ff');
        
        // Draw Model Wireframe
        for(let i=0; i<model.length; i++) {
            const p1 = model[i];
            const p2 = model[(i+1)%model.length];
            drawLine3D(e.x+p1[0], e.y+p1[1], e.z+p1[2], e.x+p2[0], e.y+p2[1], e.z+p2[2], color);
        }
    });

    // Draw Bullets
    STATE.bullets.forEach(b => {
        drawLine3D(b.x, b.y, b.z, b.x-b.vx, b.y, b.z-b.vz, '#fff');
    });

    document.getElementById('ammo').innerText = `AMMO: ${STATE.player.ammo} / 30`;
    requestAnimationFrame(() => { update(); render(); });
}

function drawLine3D(x1, y1, z1, x2, y2, z2, color) {
    const p1 = M3D.project({x:x1, y:y1, z:z1}, STATE.camera, width, height);
    const p2 = M3D.project({x:x2, y:y2, z:z2}, STATE.camera, width, height);

    if (p1 && p2) {
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
}

function spawnExplosion(x, z) {
    // Visual wipe of nearby enemies
    STATE.entities.forEach((e, i) => {
        if(e.type === 'enemy' && Math.hypot(e.x - x, e.z - z) < 150) {
            STATE.entities.splice(i, 1);
        }
    });
}

// --- 5. INPUT SYSTEM ---
function initInput() {
    const setupJoy = (id, key) => {
        const zone = document.getElementById(id);
        zone.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = zone.getBoundingClientRect();
            const process = (t) => {
                const dx = t.clientX - (rect.left + 100);
                const dy = t.clientY - (rect.top + 100);
                const dist = Math.min(Math.hypot(dx, dy), 70);
                const ang = Math.atan2(dy, dx);
                STATE.input[key] = { x: (Math.cos(ang)*dist)/70, y: (Math.sin(ang)*dist)/70 };
                zone.querySelector('.knob').style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
            };
            process(touch);
            const moveSub = (me) => process(me.touches[0]);
            const endSub = () => {
                STATE.input[key] = {x:0, y:0};
                zone.querySelector('.knob').style.transform = `translate(0,0)`;
                window.removeEventListener('touchmove', moveSub);
                window.removeEventListener('touchend', endSub);
            };
            window.addEventListener('touchmove', moveSub);
            window.addEventListener('touchend', endSub);
        });
    };

    setupJoy('move-zone', 'move');
    setupJoy('aim-zone', 'aim');

    // Stratagem Toggle
    document.getElementById('btn-strat').addEventListener('touchstart', () => {
        STATE.input.stratMode = !STATE.input.stratMode;
        document.getElementById('stratagem-ui').style.display = STATE.input.stratMode ? 'flex' : 'none';
        document.getElementById('stratagem-dpad').style.display = STATE.input.stratMode ? 'grid' : 'none';
        document.getElementById('move-zone').style.display = STATE.input.stratMode ? 'none' : 'block';
        if(STATE.input.stratMode) {
            STATE.input.activeStrat = Math.floor(Math.random()*100);
            STATE.input.codeIdx = 0;
            renderStratCode();
        }
    });

    document.querySelectorAll('.d-btn').forEach(btn => {
        btn.addEventListener('touchstart', (e) => {
            const dir = e.target.dataset.dir;
            const strat = STRATAGEMS[STATE.input.activeStrat];
            if(strat.code[STATE.input.codeIdx] === dir) {
                STATE.input.codeIdx++;
                if(STATE.input.codeIdx === strat.code.length) {
                    // CALL DOWN POD
                    STATE.entities.push({
                        x: STATE.player.x + Math.sin(STATE.player.yaw)*100,
                        y: -1000, // Sky
                        z: STATE.player.z + Math.cos(STATE.player.yaw)*100,
                        type: 'pod'
                    });
                    // Close UI
                    document.getElementById('btn-strat').dispatchEvent(new Event('touchstart'));
                }
            } else {
                STATE.input.codeIdx = 0;
            }
            renderStratCode();
        });
    });
}

function renderStratCode() {
    const strat = STRATAGEMS[STATE.input.activeStrat];
    document.getElementById('strat-name').innerText = strat.name;
    document.getElementById('strat-code').innerHTML = strat.code.map((d, i) => {
        const color = i < STATE.input.codeIdx ? 'var(--hd-yellow)' : '#333';
        const sym = {UP:'↑', DOWN:'↓', LEFT:'←', RIGHT:'→'}[d];
        return `<span style="color:${color}">${sym}</span>`;
    }).join('');
}

// Start Engine
initInput();
render();

</script>
</body>
</html>
