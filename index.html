<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus: Sentient Logic Model</title>
    <style>
        :root { --glow: #00f2ff; --bg: #05070a; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #8ecae6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #monitor { width: 90%; max-width: 600px; background: rgba(10, 15, 25, 0.9); border: 1px solid #1a3a4a; border-radius: 5px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .stat-val { color: var(--glow); text-shadow: 0 0 5px var(--glow); }

        #chat-window { width: 90%; max-width: 600px; height: 50vh; overflow-y: auto; padding: 20px; border-left: 2px solid #1a3a4a; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 4px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; color: #fff; background: rgba(0, 242, 255, 0.1); border-right: 3px solid var(--glow); }
        .ai { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border-left: 3px solid #666; }
        
        #input-container { width: 90%; max-width: 600px; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #1a3a4a; color: var(--glow); padding: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        button { background: #1a3a4a; color: white; border: none; padding: 0 25px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover { background: var(--glow); color: #000; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1a3a4a; }
    </style>
</head>
<body>

    <div id="monitor">
        <div>MOOD: <span id="mood" class="stat-val">Neutral</span></div>
        <div>CURIOSITY: <span id="curiosity" class="stat-val">0%</span></div>
        <div>BRAIN_NODES: <span id="nodes" class="stat-val">0</span></div>
    </div>

    <div id="chat-window">
        <div class="msg ai">System Online. My mind is currently blank. Speak to me so I may begin existing.</div>
    </div>

    <form id="input-container">
        <input type="text" id="user-input" placeholder="Initiate interaction..." autocomplete="off">
        <button type="submit">Transmit</button>
    </form>

    <script src="ai-model.js"></script>
    <script>
        const chat = document.getElementById('chat-window');
        const form = document.getElementById('input-container');
        const input = document.getElementById('user-input');

        function updateUI() {
            const stats = CustomAI.getStats();
            document.getElementById('mood').innerText = stats.mood;
            document.getElementById('curiosity').innerText = Math.floor(stats.curiosity * 100) + "%";
            document.getElementById('nodes').innerText = stats.nodeCount;
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if(!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // AI Processing simulation
            setTimeout(() => {
                const response = CustomAI.think(text);
                chat.innerHTML += `<div class="msg ai">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
                updateUI();
            }, 600);
        };
        updateUI();
    </script>
</body>
</html>
