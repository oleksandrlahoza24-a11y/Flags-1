<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tsar-Chan: Meltdown of the Heart</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* UI Overlay */
        #game-ui {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end;
            z-index: 10;
        }

        /* Dialogue Box */
        #dialogue-container {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 3px solid #ff4d6d;
            padding: 20px;
            height: 180px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            color: white;
        }

        #character-name { font-weight: bold; color: #ff4d6d; font-size: 20px; margin-bottom: 5px; }
        #text-box { font-size: 18px; line-height: 1.4; flex-grow: 1; }

        /* Input Area */
        #input-area {
            display: flex; gap: 10px; margin-top: 10px;
        }
        input {
            flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid #555;
            color: white; padding: 12px; border-radius: 8px; font-size: 16px;
        }
        button {
            background: #ff4d6d; border: none; color: white; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Stats */
        #stats {
            position: fixed; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px;
            color: white; pointer-events: none;
        }
        #affection-bar {
            width: 150px; height: 10px; background: #333; border-radius: 5px; margin-top: 5px;
        }
        #affection-fill {
            width: 20%; height: 100%; background: #ff4d6d; border-radius: 5px; transition: 0.5s;
        }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="stats">
    Affection: <span id="affection-val">20</span>%
    <div id="affection-bar"><div id="affection-fill"></div></div>
</div>

<div id="game-ui">
    <div id="dialogue-container">
        <div id="character-name">Tsar-Chan</div>
        <div id="text-box">...H-hello? Is someone there? Don't look at me, I'm just a weapon of mass destruction...</div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type to chat..." onkeypress="handleKey(event)">
            <button onclick="processInput()">SEND</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Shader Logic ---
    const CloudShader = {
        uniforms: { time: { value: 0 }, uColor: { value: new THREE.Color(0.2, 0.2, 0.2) }, uHeat: { value: 0.0 }, uOpacity: { value: 1.0 } },
        vertexShader: `varying vec3 vNormal; varying vec3 vViewPosition; uniform float time;
            void main() { vNormal = normal; vec4 mvPosition = modelViewMatrix * vec4(position + normal * sin(position.y + time) * 0.5, 1.0);
            vViewPosition = -mvPosition.xyz; gl_Position = projectionMatrix * mvPosition; }`,
        fragmentShader: `varying vec3 vNormal; varying vec3 vViewPosition; uniform vec3 uColor; uniform float uHeat; uniform float uOpacity;
            void main() { float fres = pow(1.0 - dot(normalize(vNormal), normalize(vViewPosition)), 3.0);
            gl_FragColor = vec4(mix(uColor, vec3(1.0,0.4,0.1), uHeat) + (fres * 0.2), uOpacity); }`
    };

    let scene, camera, renderer, composer, clock, nukeModel, mushroomCap, stem, shockwave;
    let affection = 20;
    let isExploding = false;
    let hasProposed = false;

    // --- "AI" Logic Engine ---
    const responses = {
        positive: ["Baka! Don't say such sweet things...", "You really mean that?", "I feel my core temperature rising...", "Maybe being a bomb isn't so bad if you're here."],
        negative: ["Shut up! You're just like the others!", "Do you want to see my payload?!", "I wasn't built for insults!", "I'm reaching critical mass..."],
        neutral: ["I'm just a 50-megaton gravity bomb.", "The desert is lonely, isn't it?", "Processing your data...", "Wait, what did you say?"]
    };

    const keywords = {
        love: 15, cute: 10, beautiful: 12, marry: 20, smile: 8,
        ugly: -20, hate: -25, stupid: -15, explode: -10, mean: -10
    };

    window.handleKey = (e) => { if(e.key === 'Enter') processInput(); };

    window.processInput = () => {
        const input = document.getElementById('user-input');
        const text = input.value.toLowerCase();
        if(!text) return;
        input.value = '';

        let score = 0;
        Object.keys(keywords).forEach(k => { if(text.includes(k)) score += keywords[k]; });

        affection = Math.max(0, Math.min(100, affection + score));
        updateUI();

        let reply = "";
        if (score > 0) reply = responses.positive[Math.floor(Math.random()*responses.positive.length)];
        else if (score < 0) reply = responses.negative[Math.floor(Math.random()*responses.negative.length)];
        else reply = responses.neutral[Math.floor(Math.random()*responses.neutral.length)];

        // Win Condition
        if (affection >= 90 && !hasProposed) {
            hasProposed = true;
            triggerProposal();
            return;
        }

        // Lose Condition
        if (affection <= 0) {
            typeWriter("I CAN'T TAKE THIS ANYMORE! GOODBYE WORLD!");
            setTimeout(detonate, 1500);
            return;
        }

        typeWriter(reply);
    };

    function updateUI() {
        document.getElementById('affection-val').innerText = affection;
        document.getElementById('affection-fill').style.width = affection + '%';
        if(nukeModel) {
            const s = 1 + (affection / 100);
            nukeModel.scale.set(s,s,s);
            nukeModel.material.emissive.setHex(affection > 50 ? 0xff0000 : 0x000000);
            nukeModel.material.emissiveIntensity = affection / 100;
        }
    }

    function typeWriter(text) {
        const box = document.getElementById('text-box');
        box.innerText = text;
    }

    function triggerProposal() {
        typeWriter("Listen... we've spent so much time together in this desert. I don't want to be a weapon anymore. I want to be yours. Will you marry me?");
        const area = document.getElementById('input-area');
        area.innerHTML = `
            <button onclick="endGame(true)" style="background:green">YES, I DO</button>
            <button onclick="endGame(false)" style="background:black">NO (DECLINE)</button>
        `;
    }

    window.endGame = (married) => {
        if(married) {
            typeWriter("Oh my god! I'm so happy! Let's go live in a fallout shelter together forever! ❤️");
            document.getElementById('input-area').innerHTML = "";
            scene.background.setHex(0xffc0cb);
        } else {
            typeWriter("Fine. If I can't have your heart... NO ONE CAN HAVE ANYTHING!");
            document.getElementById('input-area').innerHTML = "";
            setTimeout(detonate, 1000);
        }
    };

    // --- Three.js Scene Setup ---
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
        camera.position.set(0, 30, 100);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const composer_ = new EffectComposer(renderer);
        composer_.addPass(new RenderPass(scene, camera));
        composer_.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85));
        composer = composer_;

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // The Nuke Model
        const geometry = new THREE.CapsuleGeometry(5, 10, 8, 20);
        const material = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.2 });
        nukeModel = new THREE.Mesh(geometry, material);
        nukeModel.position.y = 10;
        scene.add(nukeModel);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x111111}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        clock = new THREE.Clock();
        animate();
    }

    function detonate() {
        if(isExploding) return;
        isExploding = true;
        scene.remove(nukeModel);
        
        const capMat = new THREE.ShaderMaterial({ uniforms: THREE.UniformsUtils.clone(CloudShader.uniforms), vertexShader: CloudShader.vertexShader, fragmentShader: CloudShader.fragmentShader, transparent: true });
        mushroomCap = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), capMat);
        scene.add(mushroomCap);

        stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1, 1, 32), capMat.clone());
        scene.add(stem);

        shockwave = new THREE.Mesh(new THREE.TorusGeometry(1, 0.1, 16, 100), new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true}));
        shockwave.rotation.x = Math.PI/2;
        scene.add(shockwave);

        startTime = clock.getElapsedTime();
        document.getElementById('flash').style.opacity = '1';
        setTimeout(() => { document.getElementById('flash').style.transition = 'opacity 4s'; document.getElementById('flash').style.opacity = '0'; }, 100);
    }

    let startTime = 0;
    function animate() {
        requestAnimationFrame(animate);
        if(isExploding) {
            const t = clock.getElapsedTime() - startTime;
            const h = Math.pow(t, 0.7) * 60;
            mushroomCap.scale.set(h, h*0.6, h);
            mushroomCap.position.y = h;
            mushroomCap.material.uniforms.uHeat.value = Math.max(0, 1-t/5);
            stem.scale.set(h*0.2, h, h*0.2);
            stem.position.y = h/2;
            shockwave.scale.set(t*100, t*100, 1);
            shockwave.material.opacity = Math.max(0, 1-t/3);
        } else if(nukeModel) {
            nukeModel.rotation.y += 0.01;
            nukeModel.position.y = 10 + Math.sin(clock.getElapsedTime()) * 2;
        }
        composer.render();
    }

    init();
</script>
</body>
</html>
