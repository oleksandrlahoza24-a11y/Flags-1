<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Picker Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; /* Prevents scrolling on iPad */
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #ecf0f1;
        }

        canvas {
            background-color: #27ae60; /* Grass color */
            display: block;
            image-rendering: pixelated; /* Keeps it pixelated */
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }

        #message {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">Score: 0</div>
    <canvas id="gameCanvas"></canvas>
    <div id="message">Touch & Drag to Move</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('ui');

    // Sprite Data (8x8 pixel grids)
    const Sprites = {
        player: [
            "  XXXX  ",
            " XXXXXX ",
            "XXYXYYXX",
            "XXXXXXXX",
            " XXXXXX ",
            "  BBBB  ",
            " BBBBBB ",
            " B    B "
        ],
        cotton: [
            "  WWWW  ",
            " WWWWWW ",
            "WWWWWWWW",
            "WWWWWWWW",
            "WWWWWWWW",
            "WWWWWWWW",
            " WWWWWW ",
            "  WWWW  "
        ],
        watermelon: [
            "  GGGG  ",
            " GGGGGG ",
            "GRRRRRRG",
            "GRRRRRRG",
            "GRRRRRRG",
            "GRRRRRRG",
            " GGGGGG ",
            "  GGGG  "
        ],
        chicken: [
            "  RR    ",
            " CCCCC  ",
            "CCCCCCC ",
            "CCYCCCCC",
            " CCCCCCC",
            "  CCCCC ",
            "   Y Y  ",
            "   Y Y  "
        ]
    };

    const Colors = {
        'X': '#f1c40f', // Yellow Skin
        'Y': '#e67e22', // Orange/Beak
        'B': '#2980b9', // Blue Pants
        'W': '#ecf0f1', // White Cotton
        'G': '#2ecc71', // Green Rind
        'R': '#e74c3c', // Red Watermelon/Comb
        'C': '#ffffff', // Chicken White
        ' ': null       // Transparent
    };

    let score = 0;
    let width, height;
    let items = [];
    const player = { x: 0, y: 0, size: 40, targetX: 0, targetY: 0 };
    const pixelSize = 5; // Scale for the 8x8 sprites

    function init() {
        // Adjust for iPad screen size
        width = window.innerWidth * 0.9;
        height = window.innerHeight * 0.8;
        canvas.width = width;
        canvas.height = height;

        player.x = width / 2;
        player.y = height / 2;
        player.targetX = player.x;
        player.targetY = player.y;

        // Start spawning items
        for(let i = 0; i < 5; i++) spawnItem();
        
        requestAnimationFrame(gameLoop);
    }

    function drawSprite(spriteKey, x, y) {
        const sprite = Sprites[spriteKey];
        sprite.forEach((row, rowIndex) => {
            row.split('').forEach((pixel, colIndex) => {
                const color = Colors[pixel];
                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(x + colIndex * pixelSize, y + rowIndex * pixelSize, pixelSize, pixelSize);
                }
            });
        });
    }

    function spawnItem() {
        const types = ['cotton', 'watermelon', 'chicken'];
        const type = types[Math.floor(Math.random() * types.length)];
        items.push({
            x: Math.random() * (width - 40),
            y: Math.random() * (height - 40),
            type: type,
            id: Date.now() + Math.random()
        });
    }

    function gameLoop() {
        // Clear screen
        ctx.fillStyle = '#27ae60'; // Grass
        ctx.fillRect(0, 0, width, height);

        // Move Player towards target (Touch location)
        const dx = player.targetX - (player.x + 20);
        const dy = player.targetY - (player.y + 20);
        player.x += dx * 0.15;
        player.y += dy * 0.15;

        // Draw and Check Items
        items.forEach((item, index) => {
            drawSprite(item.type, item.x, item.y);

            // Simple Circle Collision
            const dist = Math.hypot((player.x + 20) - (item.x + 20), (player.y + 20) - (item.y + 20));
            if (dist < 30) {
                items.splice(index, 1);
                score += 10;
                scoreElement.innerText = `Score: ${score}`;
                spawnItem();
            }
        });

        // Draw Player
        drawSprite('player', player.x, player.y);

        requestAnimationFrame(gameLoop);
    }

    // Touch Event Listeners for iPad
    function handleTouch(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        player.targetX = touch.clientX - rect.left;
        player.targetY = touch.clientY - rect.top;
    }

    canvas.addEventListener('touchstart', handleTouch);
    canvas.addEventListener('touchmove', handleTouch);

    // Mouse support for testing on computer
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        player.targetX = e.clientX - rect.left;
        player.targetY = e.clientY - rect.top;
    });

    window.onload = init;
</script>

</body>
</html>
